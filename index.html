<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>DS Assistant</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin:0;
        font-family: Tahoma, Arial;
        background: linear-gradient(135deg, #1e88e5, #42a5f5);
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        padding:20px;
        box-sizing:border-box;
    }

    .card {
        width:100%;
        max-width:380px;
        background:#fff;
        padding:25px;
        border-radius:20px;
        box-shadow:0 10px 25px rgba(0,0,0,0.15);
        animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
        from { opacity:0; transform:translateY(20px); }
        to   { opacity:1; transform:translateY(0); }
    }

    h2 {
        margin:0 0 15px;
        text-align:center;
        color:#1565c0;
        font-size:22px;
    }

    input {
        width:100%;
        padding:12px;
        margin-top:10px;
        border-radius:12px;
        border:1px solid #b0bec5;
        font-size:15px;
        box-sizing:border-box;
    }

    button {
        width:100%;
        padding:12px;
        margin-top:12px;
        border:none;
        border-radius:12px;
        font-size:16px;
        cursor:pointer;
        font-weight:bold;
    }

    .btn-primary { background:#1e88e5; color:#fff; }
    .btn-secondary { background:#90a4ae; color:#fff; }
    .btn-danger { background:#e53935; color:#fff; }

    .hidden { display:none; }

    .title {
        font-weight:bold;
        color:#1565c0;
        margin-bottom:5px;
    }

    .row {
        background:#f5f5f5;
        padding:12px;
        border-radius:12px;
        margin-bottom:10px;
    }

    .tabs {
        display:flex;
        gap:5px;
        margin-bottom:10px;
    }

    .tab-btn {
        flex:1;
        padding:10px;
        border:none;
        border-radius:10px;
        background:#bbdefb;
        font-weight:bold;
    }

    .tab-btn.active {
        background:#1e88e5;
        color:#fff;
    }
</style>
</head>

<body>

<!-- اختيار الدور -->
<div class="card" id="roleCard">
    <h2>DS Assistant</h2>
    <button class="btn-primary" onclick="showStudentLogin()">دخول الطالب</button>
    <button class="btn-secondary" onclick="showAdminLogin()">دخول المدير</button>
</div>

<!-- دخول الطالب -->
<div class="card hidden" id="studentLoginCard">
    <h2>دخول الطالب</h2>
    <input id="studentLoginName" placeholder="اسم الطالب">
    <input id="studentLoginPass" type="password" placeholder="الرقم السري">
    <button class="btn-primary" onclick="loginStudent()">دخول</button>
    <button class="btn-secondary" onclick="showStudentRegister()">تسجيل طالب جديد</button>
    <button class="btn-secondary" onclick="backToRole()">رجوع</button>
</div>

<!-- تسجيل طالب -->
<div class="card hidden" id="studentRegisterCard">
    <h2>تسجيل طالب</h2>
    <input id="studentRegName" placeholder="اسم الطالب">
    <input id="studentRegPass" type="password" placeholder="الرقم السري">
    <button class="btn-primary" onclick="registerStudent()">تسجيل</button>
    <button class="btn-secondary" onclick="backToStudentLogin()">رجوع</button>
</div>

<!-- واجهة الطالب -->
<div class="card hidden" id="studentArea">
    <h2>مرحباً <span id="studentNameLabel"></span></h2>
    <button class="btn-secondary" onclick="studentLogout()">خروج</button>
    <hr>
    <h3 style="color:#1565c0;">الحالات</h3>
    <div id="studentCasesList"></div>
</div>

<!-- دخول المدير -->
<div class="card hidden" id="adminLoginCard">
    <h2>دخول المدير</h2>
    <input id="adminPass" type="password" placeholder="كلمة السر">
    <button class="btn-primary" onclick="loginAdmin()">دخول</button>
    <button class="btn-secondary" onclick="backToRole()">رجوع</button>
</div>

<!-- لوحة المدير -->
<div class="card hidden" id="adminPanel">
    <h2>لوحة المدير</h2>

    <div class="tabs">
        <button id="tabStudents" class="tab-btn active" onclick="showAdminSection('studentsAdmin')">الطلاب</button>
        <button id="tabCases" class="tab-btn" onclick="showAdminSection('casesAdmin')">الحالات</button>
        <button id="tabInfo" class="tab-btn" onclick="showAdminSection('infoAdmin')">معلومات</button>
    </div>

    <button class="btn-secondary" onclick="logoutAdmin()">خروج</button>

    <!-- الطلاب -->
    <div id="studentsAdmin">
        <h3 style="color:#1565c0;">الطلاب</h3>
        <button class="btn-primary" onclick="loadStudents()">تحديث</button>
        <div id="studentsList"></div>
    </div>

    <!-- الحالات -->
    <div id="casesAdmin" class="hidden">
        <h3 style="color:#1565c0;">الحالات</h3>
        <button class="btn-primary" onclick="loadCases()">تحديث</button>
        <div id="casesList"></div>
        <hr>
        <input id="caseTitle" placeholder="عنوان الحالة">
        <textarea id="caseDetails" placeholder="تفاصيل الحالة" style="width:100%;height:80px;margin-top:10px;border-radius:12px;border:1px solid #b0bec5;padding:10px;"></textarea>
        <button class="btn-primary" onclick="addCase()">إضافة</button>
    </div>

    <!-- معلومات -->
    <div id="infoAdmin" class="hidden">
        <h3 style="color:#1565c0;">معلومات</h3>
        <p>نسخة محسّنة — تصميم موبايل حديث</p>
        <p>دخول إدارة بكلمة سر: <b>salem1959</b></p>
        <p>البيانات محفوظة في Firebase Realtime Database</p>
    </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
// إعداد Firebase
const firebaseConfig = {
  apiKey: "AIzaSyCb9VELSLmljq9IKmLZFfJgT3zvq9q22HE",
  authDomain: "diagnosis-6ea4b.firebaseapp.com",
  databaseURL: "https://diagnosis-6ea4b-default-rtdb.firebaseio.com",
  projectId: "diagnosis-6ea4b",
  storageBucket: "diagnosis-6ea4b.firebasestorage.app",
  messagingSenderId: "1014263737561",
  appId: "1:1014263737561:web:ca8affac416227be8862c8"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// كلمة سر المدير
const ADMIN_PASSWORD = "salem1959";

// إظهار الشاشات
function showStudentLogin(){ hideAll(); studentLoginCard.classList.remove("hidden"); }
function showStudentRegister(){ hideAll(); studentRegisterCard.classList.remove("hidden"); }
function showAdminLogin(){ hideAll(); adminLoginCard.classList.remove("hidden"); }
function backToRole(){ hideAll(); roleCard.classList.remove("hidden"); }
function backToStudentLogin(){ hideAll(); studentLoginCard.classList.remove("hidden"); }

function hideAll(){
    roleCard.classList.add("hidden");
    studentLoginCard.classList.add("hidden");
    studentRegisterCard.classList.add("hidden");
    studentArea.classList.add("hidden");
    adminLoginCard.classList.add("hidden");
    adminPanel.classList.add("hidden");
}

// تسجيل طالب
function registerStudent(){
    let name = studentRegName.value.trim();
    let pass = studentRegPass.value.trim();
    if(!name || !pass){ alert("أدخل الاسم والرقم السري"); return; }
    db.ref("students").push({name, password:pass});
    alert("تم التسجيل");
    backToStudentLogin();
}

// دخول طالب
let currentStudentName = "";
function loginStudent(){
    let name = studentLoginName.value.trim();
    let pass = studentLoginPass.value.trim();
    if(!name || !pass){ alert("أدخل البيانات"); return; }

    db.ref("students").orderByChild("name").equalTo(name).once("value", snap=>{
        let data = snap.val();
        if(!data){ alert("الاسم غير موجود"); return; }

        let ok = false;
        Object.keys(data).forEach(id=>{
            if(data[id].password === pass){
                ok = true;
                currentStudentName = name;
            }
        });

        if(!ok){ alert("الرقم السري غير صحيح"); return; }

        hideAll();
        studentNameLabel.textContent = currentStudentName;
        studentArea.classList.remove("hidden");
        loadCasesForStudent();
    });
}

function studentLogout(){
    hideAll();
    roleCard.classList.remove("hidden");
}

// تحميل الحالات للطالب
function loadCasesForStudent(){
    studentCasesList.innerHTML = "";
    db.ref("cases").once("value", snap=>{
        let data = snap.val() || {};
        let html = "";
        Object.keys(data).forEach(id=>{
            html += `<div class="row"><div class="title">${data[id].title}</div>${data[id].details}</div>`;
        });
        studentCasesList.innerHTML = html || "لا توجد حالات";
    });
}

// دخول المدير
function loginAdmin(){
    if(adminPass.value === ADMIN_PASSWORD){
        hideAll();
        adminPanel.classList.remove("hidden");
        showAdminSection('studentsAdmin');
        loadStudents();
    } else alert("كلمة السر غير صحيحة");
}

function logoutAdmin(){
    hideAll();
    roleCard.classList.remove("hidden");
}

// تبويبات المدير
function showAdminSection(id){
    studentsAdmin.classList.add("hidden");
    casesAdmin.classList.add("hidden");
    infoAdmin.classList.add("hidden");

    document.getElementById(id).classList.remove("hidden");

    tabStudents.classList.remove("active");
    tabCases.classList.remove("active");
    tabInfo.classList.remove("active");

    if(id==="studentsAdmin") tabStudents.classList.add("active");
    if(id==="casesAdmin") tabCases.classList.add("active");
    if(id==="infoAdmin") tabInfo.classList.add("active");
}

// إدارة الطلاب
function loadStudents(){
    studentsList.innerHTML = "";
    db.ref("students").once("value", snap=>{
        let data = snap.val() || {};
        let html = "";
        Object.keys(data).forEach(id=>{
            html += `
            <div class="row">
                <div class="title">${data[id].name}</div>
                <div>رقم سري: ${data[id].password}</div>
                <button class="btn-danger" onclick="deleteStudent('${id}')">حذف</button>
            </div>`;
        });
        studentsList.innerHTML = html || "لا يوجد طلاب";
    });
}

function deleteStudent(id){
    if(confirm("حذف الطالب؟")){
        db.ref("students/"+id).remove();
        loadStudents();
    }
}

// إدارة الحالات
function loadCases(){
    casesList.innerHTML = "";
    db.ref("cases").once("value", snap=>{
        let data = snap.val() || {};
        let html = "";
        Object.keys(data).forEach(id=>{
            html += `
            <div class="row">
                <div class="title">${data[id].title}</div>
                <div>${data[id].details}</div>
                <button class="btn-danger" onclick="deleteCase('${id}')">حذف</button>
            </div>`;
        });
        casesList.innerHTML = html || "لا توجد حالات";
    });
}

function addCase(){
    let title = caseTitle.value.trim();
    let details = caseDetails.value.trim();
    if(!title || !details){ alert("أدخل البيانات"); return; }
    db.ref("cases").push({title, details});
    caseTitle.value = "";
    caseDetails.value = "";
    loadCases();
}

function deleteCase(id){
    if(confirm("حذف الحالة؟")){
        db.ref("cases/"+id).remove();
        loadCases();
    }
}
</script>

</body>
</html>
