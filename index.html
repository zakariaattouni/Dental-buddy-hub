<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>DS Assistant</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:Tahoma,Arial,sans-serif;background:#e3edf7;margin:0;padding:16px}
.card{background:#e3edf7;padding:18px;margin-bottom:18px;border-radius:20px;box-shadow:8px 8px 16px #c2ccd8,-8px -8px 16px #fff}
h2,h3{margin-top:0;color:#1e3a5f}
button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:12px;background:#1e88e5;color:#fff;font-size:15px;cursor:pointer;box-shadow:4px 4px 10px #c2ccd8,-4px -4px 10px #fff}
button:active{box-shadow:inset 4px 4px 10px #c2ccd8,inset -4px -4px 10px #fff}
input{width:100%;padding:10px;margin-top:8px;border-radius:12px;border:none;background:#e3edf7;box-shadow:inset 4px 4px 10px #c2ccd8,inset -4px -4px 10px #fff}
#studentsList{max-height:200px;overflow-y:auto;font-size:14px}
.accordion-item{margin-bottom:10px}
.accordion-title{width:100%;text-align:right;background:#e3edf7;color:#1e3a5f;padding:10px;border-radius:12px;border:none;font-size:14px;cursor:pointer;box-shadow:4px 4px 10px #c2ccd8,-4px -4px 10px #fff}
.accordion-title:active{box-shadow:inset 4px 4px 10px #c2ccd8,inset -4px -4px 10px #fff}
.accordion-content{margin-top:6px;padding:10px;border-radius:12px;background:#e3edf7;box-shadow:inset 4px 4px 10px #c2ccd8,inset -4px -4px 10px #fff;font-size:13px;display:none}
.hidden{display:none}
.small-note{font-size:12px;color:#555;margin-top:6px}
</style>
</head>
<body>

<!-- مؤشر الاتصال -->
<div id="statusBar" style="display:flex;align-items:center;gap:10px;margin-bottom:15px">
  <div id="statusDot" style="width:14px;height:14px;border-radius:50%;background:#aaa;box-shadow:0 0 6px #999"></div>
  <span id="statusText" style="font-size:14px;color:#444">جاري التحقق من الاتصال...</span>
</div>

<!-- الصفحة الرئيسية -->
<div id="home" class="card">
  <h2>DS Assistant</h2>
  <button onclick="showAdminLogin()">دخول المدير</button>
  <button onclick="showUserLogin()">دخول الطالب</button>
  <button onclick="showRegister()">تسجيل حساب جديد</button>
</div>

<!-- دخول المدير -->
<div id="adminLogin" class="card hidden">
  <h3>دخول المدير</h3>
  <input id="adminPass" type="password" placeholder="كلمة السر (للمدير فقط)">
  <button onclick="adminLogin()">دخول</button>
  <button onclick="goHome()">رجوع</button>
</div>

<!-- لوحة المدير -->
<div id="adminPanel" class="hidden">
  <div class="card"><h3>لوحة المدير</h3></div>
  <div class="card">
    <h3>إضافة طالب</h3>
    <input id="stName" placeholder="اسم الطالب">
    <input id="stPhone" placeholder="رقم الهاتف">
    <button onclick="addStudent()">إضافة الطالب</button>
  </div>
  <div class="card">
    <h3>قائمة الطلاب</h3>
    <div id="studentsList"></div>
    <button onclick="loadStudents()">تحديث القائمة</button>
  </div>
  <div class="card">
    <button onclick="goHome()">خروج من لوحة المدير</button>
  </div>
</div>

<!-- دخول الطالب -->
<div id="userLogin" class="card hidden">
  <h3>دخول الطالب</h3>
  <input id="userEmail" type="email" placeholder="البريد الإلكتروني">
  <input id="userPass" type="password" placeholder="كلمة السر">
  <button onclick="loginUser()">دخول</button>
  <button onclick="showRegister()">إنشاء حساب جديد</button>
  <button onclick="goHome()">رجوع</button>
</div>

<!-- تسجيل طالب جديد -->
<div id="register" class="card hidden">
  <h3>إنشاء حساب طالب</h3>
  <input id="regName" placeholder="الاسم الكامل">
  <input id="regEmail" type="email" placeholder="البريد الإلكتروني">
  <input id="regPass" type="password" placeholder="كلمة السر">
  <button onclick="registerUser()">تسجيل</button>
  <button onclick="showUserLogin()">رجوع</button>
</div>

<!-- لوحة الطالب -->
<div id="studentPanel" class="hidden">
  <div class="card">
    <h3>لوحة الطالب</h3>
    <button onclick="toggleEmergencies()">موسوعة حالات الطوارئ</button>
  </div>
  <div id="emergenciesCard" class="card hidden">
    <h3>حالات الطوارئ (50 حالة)</h3>
    <p class="small-note">اضغط على عنوان الحالة لعرض الوصف المختصر.</p>
    <div id="accordionContainer"></div>
  </div>
  <div class="card">
    <button onclick="studentLogout()">تسجيل الخروج</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
// Firebase
const firebaseConfig={
  apiKey:"AIzaSyCb9VELSLmljq9IKmLZFfJgT3zvq9q22HE",
  authDomain:"diagnosis-6ea4b.firebaseapp.com",
  databaseURL:"https://diagnosis-6ea4b-default-rtdb.firebaseio.com",
  projectId:"diagnosis-6ea4b",
  storageBucket:"diagnosis-6ea4b.firebasestorage.app",
  messagingSenderId:"1014263737561",
  appId:"1:1014263737561:web:ca8affac416227be8862c8"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

// مؤشر الاتصال
function checkFirebaseConnection(){
  const dot=document.getElementById("statusDot");
  const text=document.getElementById("statusText");
  db.ref(".info/connected").on("value",snap=>{
    if(snap.val()===true){
      dot.style.background="#00c853";
      text.textContent="متصل بـ Firebase";
    }else{
      dot.style.background="#d50000";
      text.textContent="غير متصل بـ Firebase";
    }
  });
}
checkFirebaseConnection();

// DOM
const homeDiv=document.getElementById("home");
const adminLoginDiv=document.getElementById("adminLogin");
const adminPanel=document.getElementById("adminPanel");
const userLoginDiv=document.getElementById("userLogin");
const registerDiv=document.getElementById("register");
const studentPanel=document.getElementById("studentPanel");
const emergenciesCard=document.getElementById("emergenciesCard");
const accordionContainer=document.getElementById("accordionContainer");

// تنقل الصفحات
function hideAll(){
  homeDiv.classList.add("hidden");
  adminLoginDiv.classList.add("hidden");
  adminPanel.classList.add("hidden");
  userLoginDiv.classList.add("hidden");
  registerDiv.classList.add("hidden");
  studentPanel.classList.add("hidden");
}
function goHome(){hideAll();homeDiv.classList.remove("hidden");}
function showAdminLogin(){hideAll();adminLoginDiv.classList.remove("hidden");}
function showUserLogin(){hideAll();userLoginDiv.classList.remove("hidden");}
function showRegister(){hideAll();registerDiv.classList.remove("hidden");}

// دخول المدير
function adminLogin(){
  const pass=document.getElementById("adminPass").value;
  if(pass==="salem1959"){
    hideAll();
    adminPanel.classList.remove("hidden");
    loadStudents();
  }else alert("كلمة السر غير صحيحة");
}

// تسجيل طالب
function registerUser(){
  const name=regName.value;
  const email=regEmail.value;
  const pass=regPass.value;
  if(!name||!email||!pass){alert("يرجى تعبئة جميع الحقول");return;}
  firebase.auth().createUserWithEmailAndPassword(email,pass)
    .then(cred=>{
      db.ref("DS-Assistant/users/"+cred.user.uid).set({name,email,role:"student"});
      alert("تم التسجيل بنجاح");
      showUserLogin();
    })
    .catch(err=>alert(err.message));
}

// دخول الطالب
function loginUser(){
  const email=userEmail.value;
  const pass=userPass.value;
  firebase.auth().signInWithEmailAndPassword(email,pass)
    .then(cred=>{
      db.ref("DS-Assistant/users/"+cred.user.uid).once("value",snap=>{
        const data=snap.val();
        if(data&&data.role==="student"){
          hideAll();
          studentPanel.classList.remove("hidden");
          buildEmergenciesAccordion();
        }else{
          alert("هذا الحساب ليس طالباً أو لم يتم ضبط الصلاحيات.");
          firebase.auth().signOut();
        }
      });
    })
    .catch(err=>alert(err.message));
}

// خروج الطالب
function studentLogout(){
  firebase.auth().signOut().then(goHome);
}

// إضافة طالب
function addStudent(){
  const name=stName.value;
  const phone=stPhone.value;
  if(!name||!phone){alert("يرجى إدخال اسم ورقم الطالب");return;}
  db.ref("DS-Assistant/students").push({name,phone});
  alert("تمت إضافة الطالب");
  stName.value="";stPhone.value="";
  loadStudents();
}

// عرض الطلاب
function loadStudents(){
  const box=document.getElementById("studentsList");
  box.innerHTML="";
  db.ref("DS-Assistant/students").once("value",snap=>{
    snap.forEach(child=>{
      const s=child.val();
      const line=document.createElement("div");
      line.textContent="- "+(s.name||"")+" ("+(s.phone||"")+")";
      box.appendChild(line);
    });
    if(!box.innerHTML) box.innerHTML="<div class='small-note'>لا يوجد طلاب مسجلون بعد.</div>";
  });
}

// إظهار/إخفاء الحالات
function toggleEmergencies(){
  emergenciesCard.classList.toggle("hidden");
}

// بناء الـ Accordion
function buildEmergenciesAccordion(){
  if(accordionContainer.dataset.built==="1")return;
  accordionContainer.innerHTML="";
  emergencies.forEach((item,i)=>{
    const wrap=document.createElement("div");
    wrap.className="accordion-item";
    const btn=document.createElement("button");
    btn.className="accordion-title";
    btn.textContent=(i+1)+". "+item.t;
    const content=document.createElement("div");
    content.className="accordion-content";
    content.textContent=item.d;
    btn.addEventListener("click",()=>{
      const all=accordionContainer.querySelectorAll(".accordion-content");
      all.forEach(c=>c.style.display="none");
      content.style.display=(content.style.display==="block")?"none":"block";
    });
    wrap.appendChild(btn);
    wrap.appendChild(content);
    accordionContainer.appendChild(wrap);
  });
  accordionContainer.dataset.built="1";
}
</script>

</body>
</html>
