<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DS ASSISTANCE - مساعد الطالب الطبيب</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <style>
        /* نفس الأنماط السابقة مع بعض التحسينات */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: #ecf9f0; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .wrapper { max-width: 1400px; width: 100%; margin: 0 auto; }
        .login-card { background: white; border-radius: 48px; max-width: 400px; margin: 2rem auto; padding: 2rem; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .role-buttons { display: flex; gap: 1rem; margin: 1rem 0; }
        .role-btn { flex: 1; padding: 12px; border-radius: 60px; border: none; background: #e0f3e8; color: #1f6e43; font-weight: bold; cursor: pointer; }
        .role-btn.active { background: #2b9e5e; color: white; }
        .login-field { display: none; margin-top: 1rem; }
        .login-field input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 60px; border: 1px solid #cbdfd1; }
        .register-field { margin-top: 1rem; border-top: 1px solid #cbdfd1; padding-top: 1rem; }
        .btn { background: #2b9e5e; border: none; padding: 12px; border-radius: 50px; color: white; font-weight: bold; width: 100%; cursor: pointer; margin-top: 8px; }
        .btn-outline { background: transparent; border: 1px solid #2b9e5e; color: #2b9e5e; }
        .error { color: #c5452f; margin-top: 8px; font-size: 0.85rem; }
        .app-main { background: white; border-radius: 40px; overflow: hidden; display: none; }
        .header { background: linear-gradient(135deg,#e0f3e8,#c8e6d9); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .logo h1 { color: #1f6e43; font-size: 1.8rem; display: flex; align-items: center; gap: 8px; }
        .logo h1::before { content: "🦷"; }
        .logout-btn { background: none; border: none; color: #c5452f; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .student-dashboard { padding: 1.5rem; }
        .welcome { background: #e0f3e8; border-radius: 30px; padding: 1rem; text-align: center; margin-bottom: 1.5rem; }
        .big-buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.8rem; margin-bottom: 1.5rem; }
        .big-btn { background: white; border: 2px solid #2b9e5e; border-radius: 25px; padding: 1rem 0.3rem; text-align: center; cursor: pointer; transition: 0.2s; font-weight: bold; font-size: 1rem; color: #1f6e43; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .big-btn span:first-child { font-size: 1.6rem; }
        .big-btn:hover { background: #2b9e5e; color: white; transform: translateY(-2px); }
        .content-area { background: #f9fefb; border-radius: 30px; padding: 1rem; border: 1px solid #cde5d4; min-height: 300px; }
        .card { background: #fff; border: 1px solid #e1f0e4; border-radius: 24px; padding: 1rem; margin-bottom: 1rem; }
        .btn-primary { background: #2b9e5e; padding: 6px 12px; border-radius: 30px; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 0.8rem; }
        .btn-danger { background: #e76f51; }
        .btn-whatsapp { background: #25D366; }
        .table-responsive { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; min-width: 500px; border-collapse: collapse; font-size: 0.85rem; }
        th, td { padding: 8px 6px; border-bottom: 1px solid #eef3ec; text-align: right; white-space: nowrap; }
        .emergency-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 0.6rem; margin-bottom: 1rem; max-height: 400px; overflow-y: auto; }
        .emergency-card { background: #fff; border: 1px solid #cde5d4; border-radius: 18px; padding: 0.6rem; text-align: center; cursor: pointer; transition: 0.2s; font-size: 0.8rem; }
        .emergency-card strong { display: block; }
        .message-bubble { background: #eef6f2; border-radius: 18px; padding: 8px 12px; margin: 6px 0; }
        .todo-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #e1f0e4; }
        .todo-text { flex: 1; margin-right: 8px; font-size: 0.9rem; }
        .todo-text.completed { text-decoration: line-through; color: #888; }
        .todo-actions button { margin-right: 6px; background: none; border: none; cursor: pointer; font-size: 1rem; }
        .accordion-item { border: 1px solid #cde5d4; border-radius: 20px; margin-bottom: 1rem; overflow: hidden; }
        .accordion-header { background: #e0f3e8; padding: 1rem; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .accordion-header:hover { background: #c8e6d9; }

        footer { background: #e9f3ec; text-align: center; padding: 0.8rem; font-size: 0.7rem; margin-top: 1rem; }
        @media (max-width: 700px) {
            .student-dashboard { padding: 1rem; }

            .big-btn { padding: 0.8rem 0.2rem; font-size: 0.9rem; }
            .big-btn span:first-child { font-size: 1.4rem; }
            .emergency-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
        }

</head>
<body>
<div class="wrapper">
    <div id="loginScreen" class="login-card">
        <h2>DS ASSISTANCE</h2>
        <p>مساعد الطالب الطبيب</p>

            <button id="studentRoleBtn" class="role-btn">👩‍🎓 طالب</button>
        </div>
        <div id="adminLoginFields" class="login-field">
            <input type="email" id="adminEmail" placeholder="البريد الإلكتروني" value="admin@sdassistant.com">
            <input type="password" id="adminPassword" placeholder="كلمة السر">
        </div>
        <div id="studentLoginFields" class="login-field" style="display:none;">
            <input type="email" id="studentEmail" placeholder="البريد الإلكتروني">
            <input type="password" id="studentPassword" placeholder="كلمة السر">
        </div>
        <button id="loginActionBtn" class="btn">دخول</button>

        <div class="register-field">

                <input type="text" id="regName" placeholder="الاسم الكامل">
                <input type="tel" id="regPhone" placeholder="رقم الهاتف">
                <input type="email" id="regEmail" placeholder="البريد الإلكتروني">
                <input type="password" id="regPassword" placeholder="كلمة السر">
                <button id="doRegisterBtn" class="btn">تسجيل</button>
                <div id="regError" class="error"></div>
            </div>
        </div>
    </div>

    <div id="appMain" class="app-main">
        <div class="header">
            <div class="logo"><h1>DS ASSISTANCE</h1><small id="userRoleLabel"></small></div>
            <button class="logout-btn" id="logoutBtn">🚪 خروج</button>
        </div>
        <div id="dynamicContent"></div>
        <footer>نظام إدارة العيادة | مساعد طوارئ ذكي محلي | دعم 50+ حالة</footer>
    </div>

<script>
    // ------------------- إعداد Firebase (استبدل config بقيم مشروعك) -------------------
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT_ID.firebasestorage.app",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };
    
    // تهيئة Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    // ------------------- دوال مساعدة Firebase -------------------
    // إضافة طالب جديد (يتم إنشاء حساب Auth ثم إضافة وثيقة)
    async function addStudent(name, phone, email, password) {
        try {
            const userCred = await auth.createUserWithEmailAndPassword(email, password);
            const uid = userCred.user.uid;
            await db.collection("students").doc(uid).set({
                name: name,
                phone: phone,
                email: email,
                status: "active",
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            return true;
        } catch (error) {
            console.error(error);
            return false;
        }
    }
    
    // حذف طالب (حذف الوثيقة وحساب Auth)
    async function deleteStudent(uid) {
        try {
            // حذف وثيقة الطالب
            await db.collection("students").doc(uid).delete();
            // حذف مرضاه
            const patientsSnap = await db.collection("patients").where("studentId", "==", uid).get();
            patientsSnap.forEach(doc => doc.ref.delete());
            // حذف مهامه
            const todosSnap = await db.collection("todos").where("studentId", "==", uid).get();
            todosSnap.forEach(doc => doc.ref.delete());
            // حذف حساب Auth
            const user = auth.currentUser;
            if (user && user.uid === uid) await user.delete();
            else {
                // إذا لم يكن المسجل هو نفسه، نستخدم Admin SDK غير متاح هنا، لذا نطلب من المدير تسجيل الدخول بحساب المدير
                alert("لا يمكن حذف حساب الطالب تلقائياً من الواجهة الأمامية بسبب قيود الأمان. يرجى حذفه من لوحة تحكم Firebase Auth.");
            }
            return true;
        } catch (error) {
            console.error(error);
            return false;
        }
    }
    
    // تبديل حالة الترقين
    async function toggleSuspend(uid, currentStatus) {
        const newStatus = currentStatus === "active" ? "suspended" : "active";
        await db.collection("students").doc(uid).update({ status: newStatus });
    }
    
    // إضافة مريض لطالب
    async function addPatientToStudent(studentId, name, phone, diagnosis) {
        await db.collection("patients").add({
            studentId: studentId,
            name: name,
            phone: phone,
            diagnosis: diagnosis || "",
            addedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
    }
    
    // حذف مريض
    async function deletePatient(patientId) {
        await db.collection("patients").doc(patientId).delete();
    }
    
    // إضافة مهمة
    async function addTodo(studentId, text) {
        await db.collection("todos").add({
            studentId: studentId,
            text: text,
            completed: false,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
    }
    
    // تبديل حالة المهمة
    async function toggleTodo(todoId, completed) {
        await db.collection("todos").doc(todoId).update({ completed: !completed });
    }
    
    // حذف مهمة
    async function deleteTodo(todoId) {
        await db.collection("todos").doc(todoId).delete();
    }
    
    // ------------------- 50 حالة طوارئ (نفس السابق) -------------------
    const emergencyCases = [
        { title: "نزيف حاد بعد القلع", steps: "🩸 اضغط بشاش معقم بقوة 5 دقائق، استخدم إسفنجة جيلاتين، لا مضمضة، استدع مشرفاً إذا استمر." },
        { title: "إغماء المريض", steps: "😵 افتح المجرى الهوائي، ارفع الرجلين، أرخِ الملابس، نادِ مشرفاً، أعطِ أكسجين." },
        { title: "كسر إبرة تخدير", steps: "⚠️ لا تحاول الإخراج، ثبّت المريض، استخدم ملقط معقم إذا ظاهر، أشعة، استدع مشرفاً." },
        { title: "حساسية لاتكس", steps: "🤚 أزل القفازات، استخدم قفازات خالية من اللاتكس، مضاد هيستامين، راقب التنفس، استدع مشرفاً." },
        { title: "انكسار أداة ضمن القناة", steps: "🛠️ لا تحاول الإخراج بدون تصوير، أشعة فورية، أبلغ المشرف، لا تكمل العلاج." },
        { title: "ابتلاع أداة صغيرة", steps: "⚠️ تهدئة المريض، لا تسبب تقيؤ، أشعة صدر وبطن فوراً، استدع مشرفاً وجراحة." },
        { title: "احتراق كيميائي", steps: "🔥 اغسل بكمية كبيرة من الماء 20 دقيقة، انزع القفازات الملوثة، استدع مشرفاً، سجل المادة." },
        { title: "طفل غير متعاون", steps: "🧸 تقنية أخبر-أظهر-نفذ، كافئ السلوك، تثبيت لطيف مع موافقة ولي الأمر." },
        { title: "جرح لسان عميق", steps: "👅 نظف بمحلول ملحي، اضغط بشاش، إذا لا يتوقف نزيف أرسل للمستشفى لخياطة." },
        { title: "جرح شفة نافذ", steps: "👄 نظف، ضغط بارد، أرسل للمستشفى لخياطة إذا كان نافذاً." },
        { title: "خدر العصب الوجهي", steps: "😐 طمئن المريض، عادة مؤقت بسبب التخدير، راقب التنفس، أبلغ المشرف." },
        { title: "تجاوز ذروة السن بالمواد", steps: "📏 أشعة، لا تحاول الإزالة، أبلغ المشرف، راقب أعراض التهاب." },
        { title: "انثقاب الجيب الفكي", steps: "🕳️ لا تنظف القناة، لا ضغط هواء، مضاد حيوي، تجنب العطس، أرسل للمشرف." },
        { title: "خلع سن مؤقت في غير وقته", steps: "🦷 لا تقلعه، طمئن الطفل، طبّق ضغط بارد، استشر المشرف لتركيب حافظ مسافة." },
        { title: "كسر تاج سن حي", steps: "🦷 احفظ القطعة في حليب بارد، قم بتغطية السن بالكالسيوم هيدروكسيد، أرسل لترميم." },
        { title: "نزيف تحت اللسان (ورم دموي)", steps: "🩸 ضغط بارد، مراقبة مجرى الهواء، إذا كبر أرسل للمستشفى." },
        { title: "قلع ضرس مع جيوب صديدية", steps: "🦠 أعطِ مضاد حيوي قبل وبعد القلع، نظف الجيب بلطف، استدع مشرفاً." },
        { title: "كسر الفك السفلي المشتبه", steps: "🦴 ثبّت الفك برباط، ضغط بارد، أشعة بانورامية، إحالة فورية." },
        { title: "خلع جزئي للسن (النزوح)", steps: "🦷 حاول إعادة وضعه بلطف، ثبّته، أشعة، أرسل لأخصائي." },
        { title: "انسداد مجرى الهواء بجسم غريب", steps: "🚨 مناورة هايمليش، اتصل بالإسعاف، لا تترك المريض." },
        { title: "نوبة صرع داخل العيادة", steps: "⚡ أزل الأدوات من الفم، ضع المريض على جانبه، لا تضع شيئاً بين أسنانه، اتصل بالإسعاف." },
        { title: "صدمة الحساسية (Anaphylaxis)", steps: "💉 أدرينالين (حقنة) فوراً، أكسجين، استلقاء، إسعاف، إنعاش." },
        { title: "ارتفاع ضغط الدم الحاد", steps: "📈 أريح المريض، لا تعالج تحت الضغط، قس الضغط، استدع مشرفاً." },

        { title: "تخدير زائد (سمية المخدر)", steps: "💊 أكسجين، بنزوديازبين للتشنجات، دعم حيوي، استدع مشرفاً." },
        { title: "كسر طرف بروي داخل القناة", steps: "🦷 لا تحاول إزالتها بدون ميكروسكوب، أشعة، أحيل للمختص." },

        { title: "التهاب النسيج الخلوي للوجه", steps: "🦷 مضاد حيوي وريدي، أشعة، استدع مشرفاً فوراً." },
        { title: "ضعف تخثر الدم", steps: "💊 خذ تاريخاً دوائياً، استشر طبيب، تجنب الجراحة." },
        { title: "مرضى زراعة القلب (مضادات تخثر)", steps: "❤️ استشر طبيب القلب، أوقف وارفارين قبل الجراحة، غطِ بمضادات حيوية." },

        { title: "سكتة دماغية مشتبهة", steps: "🧠 FAST: وجه، ذراع، كلام، وقت. استدع إسعاف، لا تعالج." },

        { title: "كسر الطرف السني للمشرط", steps: "🦷 لا تحاول الحفر، أشعة، أزل باستخدام الموجات فوق الصوتية." },
        { title: "نزيف من الوريد الحنكي", steps: "🩸 اضغط بشاش مرقئ، غرز إذا لزم، استدع مشرفاً." },
        { title: "تقيح العظم السنخي", steps: "🦷 صرف مضاد حيوي، كشط العظم، أرسل لعينة." },

    function getEmergencyResponse(title) {
        const found = emergencyCases.find(e => e.title === title);
        return found ? found.steps : "لم نتعرف على الحالة.";
    }
    
    // ------------------- واجهة المدير -------------------
    let unsubscribeStudents = null;
    let currentAdminUser = null;
    
    async function renderAdminDashboard() {
        const container = document.getElementById('dynamicContent');
        container.innerHTML = `
            <div style="padding:1.5rem;">
                <div class="card">
                    <h3>➕ إضافة مشترك (طالب) جديد</h3>
                    <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:1rem;">
                        <input type="text" id="newStdName" placeholder="الاسم" style="flex:1; padding:8px; border-radius:30px;">
                        <input type="tel" id="newStdPhone" placeholder="رقم الهاتف" style="flex:1; padding:8px; border-radius:30px;">
                        <input type="email" id="newStdEmail" placeholder="البريد الإلكتروني" style="flex:1; padding:8px; border-radius:30px;">
                        <input type="password" id="newStdPassword" placeholder="كلمة السر" style="flex:1; padding:8px; border-radius:30px;">
                        <button id="addStudentAdminBtn" class="btn-primary">إضافة</button>
                    </div>
                </div>
                <div class="card">
                    <h3>📋 سجل المشتركين (الطلاب)</h3>
                    <div id="accordionStudents">جاري التحميل...</div>
                </div>
            </div>
        `;
        
        // تحميل الطلاب من Firestore
        if (unsubscribeStudents) unsubscribeStudents();
        unsubscribeStudents = db.collection("students").onSnapshot(async (snapshot) => {
            const studentsList = [];
            snapshot.forEach(doc => {
                studentsList.push({ id: doc.id, ...doc.data() });
            });
            renderAccordion(studentsList);
        });
        
        document.getElementById('addStudentAdminBtn').onclick = async () => {
            const name = document.getElementById('newStdName').value.trim();
            const phone = document.getElementById('newStdPhone').value.trim();
            const email = document.getElementById('newStdEmail').value.trim();
            const pwd = document.getElementById('newStdPassword').value.trim();
            if (name && phone && email && pwd) {
                const success = await addStudent(name, phone, email, pwd);
                if (success) {
                    alert('تمت إضافة الطالب');
                    document.getElementById('newStdName').value = '';
                    document.getElementById('newStdPhone').value = '';
                    document.getElementById('newStdEmail').value = '';
                    document.getElementById('newStdPassword').value = '';
                } else {
                    alert('البريد الإلكتروني موجود مسبقاً أو حدث خطأ');
                }
            } else {
                alert('املأ جميع الحقول');
            }
        };
    }
    
    async function renderAccordion(studentsList) {
        const container = document.getElementById('accordionStudents');
        if (!container) return;
        if (studentsList.length === 0) {
            container.innerHTML = '<p>لا يوجد مشتركين بعد. أضف طالباً جديداً.</p>';
            return;
        }
        let html = '';
        for (const student of studentsList) {
            // جلب مرضى الطالب
            const patientsSnap = await db.collection("patients").where("studentId", "==", student.id).get();
            const patients = patientsSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            const patientListHtml = patients.map(p => `<li>${escapeHtml(p.name)} (${p.phone}) - ${escapeHtml(p.diagnosis)}</li>`).join('');
            html += `
                <div class="accordion-item">
                    <div class="accordion-header" data-id="${student.id}">
                        <span><strong>${escapeHtml(student.name)}</strong> (📞 ${student.phone}) - ${student.status === 'active' ? '🟢 نشط' : '🔴 مُرقن'}</span>
                        <span>▼</span>
                    </div>
                    <div class="accordion-content" id="accordionContent${student.id.replace(/[.#$/]/g, '_')}">
                        <div style="margin-bottom: 10px;">
                            <button class="btn-primary btn-danger" onclick="window.toggleSuspendStudent('${student.id}', '${student.status}')">${student.status === 'active' ? '🔴 ترقين (تعطيل)' : '🟢 تفعيل'}</button>
                            <button class="btn-primary" style="background:#aaa;" onclick="window.deleteStudentById('${student.id}')">🗑 حذف المشترك</button>
                        </div>
                        <h4>مرضى هذا المشترك:</h4>
                        <ul>${patientListHtml || '<li>لا يوجد مرضى مسجلون</li>'}</ul>
                        <button class="btn-primary" onclick="window.showAdminAddPatient('${student.id}')">➕ إضافة مريض لهذا المشترك</button>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
        // ربط أحداث الطي
        document.querySelectorAll('.accordion-header').forEach(header => {
            header.addEventListener('click', () => {
                const id = header.dataset.id;
                const content = document.getElementById(`accordionContent${id.replace(/[.#$/]/g, '_')}`);
                content.classList.toggle('open');
                const arrow = header.querySelector('span:last-child');
                arrow.textContent = content.classList.contains('open') ? '▲' : '▼';
            });
        });
    }
    
    window.toggleSuspendStudent = async (uid, currentStatus) => {
        await toggleSuspend(uid, currentStatus);
    };
    window.deleteStudentById = async (uid) => {
        if (confirm('حذف المشترك سيؤدي لحذف جميع مرضاه ومهامه وحسابه. هل أنت متأكد؟')) {
            await deleteStudent(uid);
        }
    };
    window.showAdminAddPatient = async (studentId) => {
        const name = prompt('اسم المريض:');
        if (!name) return;
        const phone = prompt('رقم واتساب المريض:');
        if (!phone) return;
        const diag = prompt('التشخيص (اختياري):');
        await addPatientToStudent(studentId, name, phone, diag);
        // تحديث العرض (إعادة تحميل القائمة)
        const snapshot = await db.collection("students").get();
        const studentsList = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderAccordion(studentsList);
    };
    
    // ------------------- واجهة الطالب -------------------
    let currentStudent = null;
    let activeContent = 'welcome';
    let unsubscribePatients = null;
    let unsubscribeTodos = null;
    
    async function renderStudentDashboard(student) {
        currentStudent = student;
        const container = document.getElementById('dynamicContent');
        container.innerHTML = `
            <div class="student-dashboard">
                <div class="welcome"><h2>✨ أهلاً بك، ${escapeHtml(student.name)} ✨</h2></div>
                <div class="big-buttons">
                    <div class="big-btn" data-action="patients"><span>📋</span> <span>مرضاي</span></div>
                    <div class="big-btn" data-action="assistant"><span>🚑</span> <span>مساعدي الذكي</span></div>
                    <div class="big-btn" data-action="addPatient"><span>➕</span> <span>أضف مريض</span></div>
                    <div class="big-btn" data-action="todo"><span>📅</span> <span>ماذا اليوم</span></div>
                </div>
                <div id="studentContentArea" class="content-area"><p style="text-align:center; color:#2b9e5e;">اختر أحد الأزرار أعلاه</p></div>
            </div>
        `;
        
        document.querySelectorAll('.big-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const action = btn.dataset.action;
                activeContent = action;
                if (action === 'patients') showPatientsList();
                else if (action === 'assistant') showAssistant();
                else if (action === 'addPatient') showAddPatientForm();
                else if (action === 'todo') showTodoList();
            });
        });
        
        if (activeContent !== 'welcome') {
            if (activeContent === 'patients') showPatientsList();
            else if (activeContent === 'assistant') showAssistant();
            else if (activeContent === 'addPatient') showAddPatientForm();
            else if (activeContent === 'todo') showTodoList();
        } else setDefault();
        
        function setDefault() {
            const area = document.getElementById('studentContentArea');
            if (area) area.innerHTML = '<p style="text-align:center; color:#2b9e5e;">اختر أحد الأزرار أعلاه</p>';
        }
        
        function showPatientsList() {
            const area = document.getElementById('studentContentArea');
            if (unsubscribePatients) unsubscribePatients();
            unsubscribePatients = db.collection("patients").where("studentId", "==", student.id).onSnapshot(snapshot => {
                const patients = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                if (patients.length === 0) {
                    area.innerHTML = '<div class="card"><p>لا يوجد مرضى مسجلون. اضغط على "أضف مريض".</p></div>';
                    return;
                }
                let html = '<div class="card"><h3>📋 قائمة مرضاي</h3><div class="table-responsive"><table>';
                html += '<thead><tr><th>الاسم</th><th>التشخيص</th><th>رقم واتساب</th><th>إجراءات</th></thead><tbody>';
                patients.forEach(p => {
                    html += `<tr>
                                  <td>${escapeHtml(p.name)}</td>
                                  <td>${escapeHtml(p.diagnosis)}</td>
                                  <td>${escapeHtml(p.phone)}</td>
                                  <td style="white-space: nowrap;">
                                      <button class="btn-primary btn-whatsapp" onclick="window.sendWhatsapp('${p.phone}', '${p.name}')">📱 واتساب</button>
                                      <button class="btn-primary btn-danger" onclick="window.deletePatientById('${p.id}')">🗑 حذف</button>
                                  </td>
                              </tr>`;
                });
                html += '</tbody></table></div></div>';
                area.innerHTML = html;
            });
        }
        
        function showAddPatientForm() {
            const area = document.getElementById('studentContentArea');
            area.innerHTML = `
                <div class="card">
                    <h3>➕ إضافة مريض جديد</h3>
                    <div style="display:flex; gap:8px; flex-wrap:wrap;">
                        <input type="text" id="newPatName" placeholder="اسم المريض" style="flex:2; padding:8px; border-radius:30px;">
                        <input type="tel" id="newPatPhone" placeholder="رقم واتساب" style="flex:2; padding:8px; border-radius:30px;">
                        <input type="text" id="newPatDiag" placeholder="التشخيص" style="flex:2; padding:8px; border-radius:30px;">
                        <button id="confirmAddPatient" class="btn-primary">إضافة</button>
                    </div>
                </div>
            `;
            document.getElementById('confirmAddPatient').addEventListener('click', async () => {
                const name = document.getElementById('newPatName').value.trim();
                const phone = document.getElementById('newPatPhone').value.trim();
                const diag = document.getElementById('newPatDiag').value.trim();
                if (name && phone) {
                    await addPatientToStudent(student.id, name, phone, diag);
                    alert('تمت إضافة المريض');
                    activeContent = 'patients';
                    showPatientsList();
                } else alert('يرجى إدخال الاسم ورقم الهاتف');
            });
        }
        
        function showAssistant() {
            const area = document.getElementById('studentContentArea');
            area.innerHTML = `
                <div class="card">
                    <h3>🚑 مساعدي الذكي للطوارئ (50+ حالة)</h3>
                    <div class="emergency-grid" id="studentEmergencyGrid"></div>
                    <div class="chat-area" style="margin-top:1rem;"><div id="studentChatMessages" style="height:200px; overflow-y:auto;"></div></div>
                </div>
            `;
            buildEmergencyGrid('studentEmergencyGrid', 'studentChatMessages');
        }
        
        function showTodoList() {
            const area = document.getElementById('studentContentArea');
            if (unsubscribeTodos) unsubscribeTodos();
            unsubscribeTodos = db.collection("todos").where("studentId", "==", student.id).onSnapshot(snapshot => {
                const todos = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                let html = `<div class="card"><h3>📝 قائمة المهام اليومية (ماذا لدينا من أعمال)</h3>
                            <div style="display: flex; gap: 8px; margin-bottom: 1rem;">
                                <input type="text" id="newTodoText" placeholder="أضف مهمة جديدة..." style="flex:1; padding:8px; border-radius:30px;">
                                <button id="addTodoBtn" class="btn-primary">➕ أضف</button>
                            </div><div id="todosList">`;
                if (todos.length === 0) html += '<p>لا توجد مهام اليوم. أضف مهمة جديدة.</p>';
                else {
                    html += '<ul style="list-style: none;">';
                    todos.forEach(todo => {
                        html += `<li class="todo-item">
                                    <span class="todo-text ${todo.completed ? 'completed' : ''}">${escapeHtml(todo.text)}</span>
                                    <div class="todo-actions">
                                        <button title="إنجاز" onclick="window.toggleTodoItem('${todo.id}', ${todo.completed})">✅</button>
                                        <button title="حذف" onclick="window.deleteTodoItem('${todo.id}')">🗑️</button>
                                    </div>
                                 </li>`;
                    });
                    html += '</ul>';
                }
                html += `</div></div>`;
                area.innerHTML = html;
                document.getElementById('addTodoBtn').addEventListener('click', async () => {
                    const newText = document.getElementById('newTodoText').value.trim();
                    if (newText) {
                        await addTodo(student.id, newText);
                        document.getElementById('newTodoText').value = '';
                    }
                });
            });
        }
    }
    
    function buildEmergencyGrid(gridId, chatId) {
        const grid = document.getElementById(gridId);
        if (!grid) return;
        grid.innerHTML = '';
        emergencyCases.forEach(c => {
            const card = document.createElement('div');
            card.className = 'emergency-card';
            card.innerHTML = `<strong>${c.title}</strong>`;
            card.addEventListener('click', () => {
                const response = getEmergencyResponse(c.title);
                const chatDiv = document.getElementById(chatId);
                if (chatDiv) {
                    const msg = document.createElement('div');
                    msg.className = 'message-bubble';
                    msg.innerHTML = `<strong>🔔 ${c.title}:</strong><br>${response}`;
                    chatDiv.appendChild(msg);
                    chatDiv.scrollTop = chatDiv.scrollHeight;
                }
            });
            grid.appendChild(card);
        });
        const chatDiv = document.getElementById(chatId);
        if (chatDiv && chatDiv.children.length === 0) {
            const welcome = document.createElement('div');
            welcome.className = 'message-bubble';
            welcome.innerHTML = "🤖 اختر حالة طوارئ من البطاقات أعلاه لتحصل على الإرشادات.";
            chatDiv.appendChild(welcome);
        }
    }
    
    // دوال مساعدة
    function escapeHtml(str) { 
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }
    window.sendWhatsapp = (phone, name) => {
        window.open(`https://wa.me/${phone}?text=${encodeURIComponent(`مرحباً ${name}، تذكير بموعدك في عيادة الأسنان. شكراً.`)}`, '_blank');
    };
    window.deletePatientById = async (patientId) => {
        if (confirm('حذف المريض؟')) {
            await deletePatient(patientId);
        }
    };
    window.toggleTodoItem = async (todoId, completed) => {
        await toggleTodo(todoId, completed);
    };
    window.deleteTodoItem = async (todoId) => {
        if (confirm('حذف المهمة؟')) {
            await deleteTodo(todoId);
        }
    };
    
    // ------------------- إدارة الدخول -------------------
    function showAdminLogin() { document.getElementById('adminLoginFields').style.display = 'block'; document.getElementById('studentLoginFields').style.display = 'none'; }
    function showStudentLogin() { document.getElementById('adminLoginFields').style.display = 'none'; document.getElementById('studentLoginFields').style.display = 'block'; }
    
    document.getElementById('adminRoleBtn').addEventListener('click', () => {
        document.getElementById('adminRoleBtn').classList.add('active');
        document.getElementById('studentRoleBtn').classList.remove('active');
        showAdminLogin();
        document.getElementById('registerForm').style.display = 'none';
    });
    document.getElementById('studentRoleBtn').addEventListener('click', () => {
        document.getElementById('studentRoleBtn').classList.add('active');
        document.getElementById('adminRoleBtn').classList.remove('active');
        showStudentLogin();
        document.getElementById('registerForm').style.display = 'none';
    });
    
    document.getElementById('loginActionBtn').addEventListener('click', async () => {
        const isAdmin = document.getElementById('adminRoleBtn').classList.contains('active');
        if (isAdmin) {
            const email = document.getElementById('adminEmail').value;
            const pass = document.getElementById('adminPassword').value;
            try {
                const userCred = await auth.signInWithEmailAndPassword(email, pass);
                // تحقق من وجود حساب المدير في Firestore (نفترض أن المدير لديه دور admin)
                const userDoc = await db.collection("admins").doc(userCred.user.uid).get();
                if (!userDoc.exists) {
                    await auth.signOut();
                    throw new Error('غير مصرح لك كمدير');
                }
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('appMain').style.display = 'block';
                document.getElementById('userRoleLabel').innerText = 'لوحة المدير';
                renderAdminDashboard();
            } catch (error) {
                document.getElementById('loginError').innerText = 'بيانات المدير غير صحيحة أو غير مصرح به';
            }
        } else {
            const email = document.getElementById('studentEmail').value;
            const pass = document.getElementById('studentPassword').value;
            try {
                const userCred = await auth.signInWithEmailAndPassword(email, pass);
                const studentDoc = await db.collection("students").doc(userCred.user.uid).get();
                if (!studentDoc.exists || studentDoc.data().status !== 'active') {
                    await auth.signOut();
                    throw new Error('الحساب معطل أو غير موجود');
                }
                const student = { id: userCred.user.uid, ...studentDoc.data() };
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('appMain').style.display = 'block';
                document.getElementById('userRoleLabel').innerHTML = `طالب: ${student.name}`;
                renderStudentDashboard(student);
            } catch (error) {
                document.getElementById('loginError').innerText = 'البريد أو كلمة السر غير صحيحة أو الحساب معطل';
            }
        }
    });
    
    // التسجيل الذاتي للطلاب
    let registerVisible = false;
    document.getElementById('showRegisterBtn').addEventListener('click', () => {
        const form = document.getElementById('registerForm');
        registerVisible = !registerVisible;
        form.style.display = registerVisible ? 'block' : 'none';
    });
    document.getElementById('doRegisterBtn').addEventListener('click', async () => {
        const name = document.getElementById('regName').value.trim();
        const phone = document.getElementById('regPhone').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const pwd = document.getElementById('regPassword').value.trim();
        if (!name || !phone || !email || !pwd) {
            document.getElementById('regError').innerText = '❌ يرجى ملء جميع الحقول';
            return;
        }
        const success = await addStudent(name, phone, email, pwd);
        if (success) {
            alert('تم التسجيل بنجاح! يمكنك الدخول الآن.');
            document.getElementById('regName').value = '';
            document.getElementById('regPhone').value = '';
            document.getElementById('regEmail').value = '';
            document.getElementById('regPassword').value = '';
            document.getElementById('registerForm').style.display = 'none';
            registerVisible = false;
            document.getElementById('studentRoleBtn').click();
            document.getElementById('studentEmail').value = email;
            document.getElementById('studentPassword').value = pwd;
        } else {
            document.getElementById('regError').innerText = '❌ البريد الإلكتروني موجود مسبقاً أو حدث خطأ';
        }
    });
    
    document.getElementById('logoutBtn').addEventListener('click', async () => {
        await auth.signOut();
        location.reload();
    });
    
    // ------------------- إعداد مستخدم المدير في Firebase (يجب تشغيله مرة واحدة) -------------------
    // يمكنك إنشاء حساب المدير يدوياً من Firebase Console، أو تعليمة لإنشائه.
    // لتجنب التعقيد، سننشئه عبر الكود إذا لم يكن موجوداً (قد يتطلب السماح بإنشاء المستخدم)
    (async () => {
        try {
            // إنشاء حساب المدير إذا لم يكن موجوداً (ضع بريد وكلمة سر من اختيارك)
            const adminEmail = "admin@sdassistant.com";
            const adminPass = "salem1959";
            try {
                const userCred = await auth.createUserWithEmailAndPassword(adminEmail, adminPass);
                await db.collection("admins").doc(userCred.user.uid).set({ role: "admin" });
                console.log("تم إنشاء حساب المدير بنجاح");
            } catch (err) {
                // إذا كان المستخدم موجوداً مسبقاً، نتجاهل الخطأ
                if (err.code !== 'auth/email-already-in-use') console.error(err);
            }
        } catch (e) { console.error(e); }
    })();
</script>
</body>
</html>
