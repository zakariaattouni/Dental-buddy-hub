<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DS ASSISTANCE</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
        body{background:#ecf9f0;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px;}
        .card{background:white;border-radius:48px;padding:2rem;max-width:500px;margin:auto;box-shadow:0 20px 40px rgba(0,0,0,0.1);}
        .btn{background:#2b9e5e;color:white;border:none;padding:12px;border-radius:60px;width:100%;font-weight:bold;cursor:pointer;margin:8px 0;}
        input{width:100%;padding:12px;margin:8px 0;border-radius:60px;border:1px solid #ccc;}
        .error{color:red;text-align:center;margin-top:10px;}
        .flex{display:flex;gap:8px;flex-wrap:wrap;}
        .hidden{display:none;}
        hr{margin:15px 0;}
        .status-dot{width:20px;height:20px;border-radius:50%;display:inline-block;margin-left:10px;}
        .status-green{background-color:#2b9e5e;}
        .status-red{background-color:#e76f51;}
    </style>
</head>
<body>
<div id="auth" class="card">
    <div class="flex" style="justify-content:space-between;">
        <h2>🦷 DS ASSISTANCE</h2>
        <div><span id="statusDot" class="status-dot status-red"></span></div>
    </div>
    <p>مساعد الطالب الطبيب</p>
    <input type="email" id="email" placeholder="البريد الإلكتروني">
    <input type="password" id="password" placeholder="كلمة السر">
    <button id="loginBtn" class="btn">دخول</button>
    <hr>
    <button id="registerBtn" class="btn" style="background:#888;">تسجيل حساب جديد</button>
    <div id="error" class="error"></div>
</div>

<div id="adminPanel" class="card hidden">
    <div class="flex" style="justify-content:space-between;">
        <h3>لوحة المدير</h3>
        <div><span id="adminStatusDot" class="status-dot status-red"></span><button id="logoutBtn" class="btn" style="width:auto;background:#e76f51;">خروج</button></div>
    </div>
    <hr>
    <h4>إضافة طالب</h4>
    <input type="text" id="studentName" placeholder="الاسم">
    <input type="email" id="studentEmail" placeholder="البريد">
    <input type="text" id="studentPhone" placeholder="رقم الهاتف">
    <input type="password" id="studentPass" placeholder="كلمة السر">
    <button id="addStudentBtn" class="btn">إضافة طالب</button>
    <h4>قائمة الطلاب</h4>
    <div id="studentsList"></div>
</div>

<div id="studentPanel" class="card hidden">
    <div class="flex" style="justify-content:space-between;">
        <h3 id="welcomeName"></h3>
        <div><span id="studentStatusDot" class="status-dot status-red"></span><button id="logoutStudentBtn" class="btn" style="width:auto;background:#e76f51;">خروج</button></div>
    </div>
    <hr>
    <div class="flex">
        <button id="myPatientsBtn" class="btn" style="width:auto;">مرضاي</button>
        <button id="emergencyBtn" class="btn" style="width:auto;">طوارئ</button>
        <button id="addPatientBtn" class="btn" style="width:auto;">إضافة مريض</button>
        <button id="myTodosBtn" class="btn" style="width:auto;">مهامي</button>
    </div>
    <div id="content" style="margin-top:20px; min-height:200px;"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDy9SjXIhlI-18G4kI2Uwj9FrNIf9-YzPw",
        authDomain: "ds-assistant.firebaseapp.com",
        projectId: "ds-assistant",
        storageBucket: "ds-assistant.firebasestorage.app",
        messagingSenderId: "1098833652254",
        appId: "1:1098833652254:web:5f894ffdaae4de4b8f9c0f"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    let currentStudentId = null;
    const ADMIN_EMAIL = "zakariaattouni@gmail.com";
    const ADMIN_PASS = "salem1959";
    
    function updateStatusDots(connected) {
        const dots = document.querySelectorAll('.status-dot');
        dots.forEach(dot => {
            dot.classList.remove('status-green', 'status-red');
            dot.classList.add(connected ? 'status-green' : 'status-red');
        });
    }
    
    auth.onAuthStateChanged(user => {
        updateStatusDots(true); // افترض الاتصال قائم
    });
    
    async function ensureAdmin() {
        try {
            await auth.signInWithEmailAndPassword(ADMIN_EMAIL, ADMIN_PASS);
            const user = auth.currentUser;
            const doc = await db.collection("users").doc(user.uid).get();
            if (!doc.exists) await db.collection("users").doc(user.uid).set({ role: "admin" });
            await auth.signOut();
        } catch(e) {
            if (e.code === "auth/user-not-found") {
                const user = await auth.createUserWithEmailAndPassword(ADMIN_EMAIL, ADMIN_PASS);
                await db.collection("users").doc(user.user.uid).set({ role: "admin" });
                await auth.signOut();
            }
        }
    }
    ensureAdmin();
    
    document.getElementById('loginBtn').onclick = async () => {
        const email = document.getElementById('email').value;
        const pwd = document.getElementById('password').value;
        try {
            const user = await auth.signInWithEmailAndPassword(email, pwd);
            const doc = await db.collection("users").doc(user.user.uid).get();
            if (!doc.exists) throw new Error("لا توجد بيانات");
            if (doc.data().role === "admin") {
                document.getElementById('auth').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                loadStudents();
            } else {
                currentStudentId = user.user.uid;
                document.getElementById('auth').classList.add('hidden');
                document.getElementById('studentPanel').classList.remove('hidden');
                document.getElementById('welcomeName').innerText = "مرحباً " + doc.data().name;
                showPatients();
            }
        } catch(e) {
            document.getElementById('error').innerText = e.message;
        }
    };
    
    document.getElementById('registerBtn').onclick = async () => {
        const email = prompt("البريد الإلكتروني:");
        const pwd = prompt("كلمة السر:");
        const name = prompt("الاسم الكامل:");
        const phone = prompt("رقم الهاتف:");
        if (!email || !pwd || !name || !phone) return;
        try {
            const user = await auth.createUserWithEmailAndPassword(email, pwd);
            await db.collection("users").doc(user.user.uid).set({
                name, email, phone, role: "student", status: "active"
            });
            alert("تم التسجيل، يمكنك الدخول الآن");
        } catch(e) { alert(e.message); }
    };
    
    async function loadStudents() {
        const snap = await db.collection("users").where("role", "==", "student").get();
        const container = document.getElementById('studentsList');
        container.innerHTML = '';
        snap.forEach(doc => {
            const s = doc.data();
            const div = document.createElement('div');
            div.style.border = "1px solid #ddd";
            div.style.borderRadius = "20px";
            div.style.padding = "10px";
            div.style.marginBottom = "10px";
            div.innerHTML = `
                <strong>${s.name}</strong> (${s.email})<br>
                هاتف: ${s.phone}<br>
                الحالة: ${s.status === 'active' ? 'نشط' : 'معطل'}<br>
                <button onclick="toggleStatus('${doc.id}', '${s.status}')" style="background:#e76f51; border:none; padding:5px 10px; border-radius:20px; color:white;">${s.status === 'active' ? 'تعطيل' : 'تفعيل'}</button>
                <button onclick="deleteUser('${doc.id}')" style="background:#888; border:none; padding:5px 10px; border-radius:20px; color:white;">حذف</button>
            `;
            container.appendChild(div);
        });
    }
    
    window.toggleStatus = async (uid, currentStatus) => {
        const newStatus = currentStatus === 'active' ? 'suspended' : 'active';
        await db.collection("users").doc(uid).update({ status: newStatus });
        loadStudents();
    };
    
    window.deleteUser = async (uid) => {
        if (confirm("حذف الطالب نهائياً؟")) {
            await db.collection("users").doc(uid).delete();
            loadStudents();
        }
    };
    
    document.getElementById('addStudentBtn').onclick = async () => {
        const name = document.getElementById('studentName').value.trim();
        const email = document.getElementById('studentEmail').value.trim();
        const phone = document.getElementById('studentPhone').value.trim();
        const pwd = document.getElementById('studentPass').value;
        if (!name || !email || !phone || !pwd) return alert("املأ الحقول");
        try {
            const user = await auth.createUserWithEmailAndPassword(email, pwd);
            await db.collection("users").doc(user.user.uid).set({
                name, email, phone, role: "student", status: "active"
            });
            alert("تمت الإضافة");
            loadStudents();
            document.getElementById('studentName').value = '';
            document.getElementById('studentEmail').value = '';
            document.getElementById('studentPhone').value = '';
            document.getElementById('studentPass').value = '';
        } catch(e) { alert(e.message); }
    };
    
    async function showPatients() {
        const snap = await db.collection("patients").where("userId", "==", currentStudentId).get();
        let html = "<ul style='list-style:none;'>";
        snap.forEach(doc => {
            const p = doc.data();
            html += `<li style="margin:10px 0; border-bottom:1px solid #ddd; padding:5px;"><strong>${p.name}</strong> - ${p.diagnosis || ''} - ${p.phone} <a href="https://wa.me/${p.phone}" target="_blank">📱</a> <button onclick="deletePatient('${doc.id}')">🗑️</button></li>`;
        });
        html += "</ul>";
        document.getElementById('content').innerHTML = html;
    }
    
    window.deletePatient = async (id) => {
        if (confirm("حذف المريض؟")) {
            await db.collection("patients").doc(id).delete();
            showPatients();
        }
    };
    
    function showEmergency() {
        const cases = [
            "نزيف حاد بعد القلع", "إغماء المريض", "كسر إبرة تخدير", "حساسية لاتكس",
            "انكسار أداة ضمن القناة", "ابتلاع أداة", "احتراق كيميائي", "طفل غير متعاون",
            "جرح لسان", "جرح شفة", "خدر العصب الوجهي", "انثقاب الجيب الفكي",
            "تجاوز ذروة السن", "خلع سن مؤقت", "كسر تاج سن حي", "تمزق أربطة الفك",
            "صدمة الحساسية", "نوبة صرع", "سكتة دماغية", "أزمة ربوية"
        ];
        const steps = {
            "نزيف حاد بعد القلع": "🩸 اضغط بشاش معقم 5 دقائق، استخدم إسفنجة جيلاتين",
            "إغماء المريض": "😵 افتح المجرى الهوائي، ارفع الرجلين، أرخِ الملابس",
            "كسر إبرة تخدير": "⚠️ لا تحاول الإخراج، استخدم ملقطاً معقماً، أشعة",
            "حساسية لاتكس": "🤚 أزل القفازات، استخدم قفازات خالية من اللاتكس",
            "انكسار أداة ضمن القناة": "🛠️ لا تحاول الإخراج بدون تصوير، أبلغ المشرف",
            "ابتلاع أداة": "⚠️ تهدئة المريض، لا تسبب تقيؤ، أشعة صدر وبطن",
            "احتراق كيميائي": "🔥 اغسل بكمية كبيرة من الماء 20 دقيقة",
            "طفل غير متعاون": "🧸 تقنية أخبر-أظهر-نفذ، كافئ السلوك",
            "جرح لسان": "👅 نظف بمحلول ملحي، اضغط بشاش، إذا عميق أرسل للمستشفى",
            "جرح شفة": "👄 نظف، ضغط بارد، إذا نافذ أرسل للمستشفى",
            "خدر العصب الوجهي": "😐 طمئن المريض، عادة مؤقت، راقب التنفس",
            "انثقاب الجيب الفكي": "🕳️ لا تنظف القناة، لا ضغط هواء، مضاد حيوي",
            "تجاوز ذروة السن": "📏 أشعة، لا تحاول الإزالة، أبلغ المشرف",
            "خلع سن مؤقت": "🦷 لا تقلعه، استشر المشرف لتركيب حافظ مسافة",
            "كسر تاج سن حي": "🦷 احفظ القطعة في حليب بارد، قم بتغطية السن",
            "تمزق أربطة الفك": "🦴 راحة، مضادات التهاب، أطعمة طرية",
            "صدمة الحساسية": "💉 أدرينالين فوراً، أكسجين، استلقاء، إسعاف",
            "نوبة صرع": "⚡ أزل الأدوات من الفم، ضع المريض على جانبه",
            "سكتة دماغية": "🧠 FAST: وجه، ذراع، كلام، وقت، إسعاف فوري",
            "أزمة ربوية": "🌬️ موسع قصبي (بخاخ)، أكسجين، وضعية الجلوس"
        };
        let html = `<div style="display:grid; gap:10px; grid-template-columns:repeat(auto-fill,minmax(170px,1fr));">`;
        cases.forEach(c => {
            const step = steps[c] || "استدع مشرفاً فوراً";
            html += `<div style="border:1px solid #2b9e5e; border-radius:20px; padding:10px; text-align:center; cursor:pointer;" onclick="alert('${step.replace(/'/g, "\\'")}')">${c}</div>`;
        });
        html += `</div>`;
        document.getElementById('content').innerHTML = html;
    }
    
    function showAddPatientForm() {
        document.getElementById('content').innerHTML = `
            <input type="text" id="patName" placeholder="اسم المريض">
            <input type="tel" id="patPhone" placeholder="رقم الواتساب">
            <input type="text" id="patDiag" placeholder="التشخيص">
            <button id="savePatient" class="btn" style="width:auto;">حفظ</button>
        `;
        document.getElementById('savePatient').onclick = async () => {
            const name = document.getElementById('patName').value.trim();
            const phone = document.getElementById('patPhone').value.trim();
            const diag = document.getElementById('patDiag').value.trim();
            if (!name || !phone) return alert("الاسم والرقم مطلوبان");
            await db.collection("patients").add({ userId: currentStudentId, name, phone, diagnosis: diag });
            alert("تم الحفظ");
            showPatients();
        };
    }
    
    async function showTodos() {
        const snap = await db.collection("todos").where("userId", "==", currentStudentId).get();
        let html = `<div><input type="text" id="newTodo" placeholder="مهمة جديدة"><button id="addTodoBtn">➕</button></div><ul style="list-style:none;">`;
        snap.forEach(doc => {
            const t = doc.data();
            html += `<li><input type="checkbox" ${t.completed ? 'checked' : ''} onchange="toggleTodo('${doc.id}', this.checked)"> ${t.text} <button onclick="deleteTodo('${doc.id}')">🗑️</button></li>`;
        });
        html += `</ul>`;
        document.getElementById('content').innerHTML = html;
        document.getElementById('addTodoBtn').onclick = async () => {
            const text = document.getElementById('newTodo').value.trim();
            if (text) await db.collection("todos").add({ userId: currentStudentId, text, completed: false });
            showTodos();
        };
    }
    
    window.toggleTodo = async (id, checked) => { await db.collection("todos").doc(id).update({ completed: checked }); };
    window.deleteTodo = async (id) => { if (confirm("حذف المهمة؟")) await db.collection("todos").doc(id).delete(); showTodos(); };
    
    document.getElementById('myPatientsBtn').onclick = showPatients;
    document.getElementById('emergencyBtn').onclick = showEmergency;
    document.getElementById('addPatientBtn').onclick = showAddPatientForm;
    document.getElementById('myTodosBtn').onclick = showTodos;
    
    document.getElementById('logoutBtn').onclick = () => auth.signOut().then(() => location.reload());
    document.getElementById('logoutStudentBtn').onclick = () => auth.signOut().then(() => location.reload());
</script>
</body>
</html>
