<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DS Assistant</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: Tahoma, Arial;
        background: #F7F7F7;
    }

    /* الشريط العلوي */
    .topbar {
        height: 56px;
        background: #F2F2F2;
        border-bottom: 1px solid #D9D9D9;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 14px;
    }

    /* أيقونة التطبيق */
    .app-icon {
        width: 38px;
        height: 38px;
        border-radius: 22px;
        background: #F2F2F2;
        border: 1px solid #C8C8C8;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
    }

    /* مؤشر الواي فاي */
    .wifi-icon {
        font-size: 18px;
        margin-right: 8px;
        transition: 0.3s;
    }

    /* زر الرئيسية */
    .home-icon {
        font-size: 22px;
        color: #3A3A3A;
    }

    /* الكارد الرئيسي */
    .card {
        width: 90%;
        margin: 50px auto;
        background: white;
        border-radius: 12px;
        padding: 35px 20px;
        text-align: center;
        box-sizing: border-box;
    }

    .logo {
        font-size: 96px;
        margin-bottom: 15px;
    }

    .title-main {
        font-size: 22px;
        font-weight: bold;
        color: #1E1E1E;
        margin-bottom: 6px;
    }

    .title-sub {
        font-size: 16px;
        color: #3A3A3A;
        margin-bottom: 20px;
    }

    .desc {
        font-size: 14px;
        color: #3A3A3A;
        margin-bottom: 30px;
    }

    .btn {
        width: 100%;
        padding: 14px;
        margin: 8px 0;
        border: none;
        border-radius: 12px;
        background: #F4C542;
        color: #1E1E1E;
        font-size: 17px;
        transition: 0.2s;
    }

    .btn:hover {
        background: #e7b83d;
    }

    /* الفوتر */
    .footer {
        text-align: center;
        font-size: 12px;
        color: #777;
        margin-top: 40px;
        padding-bottom: 20px;
    }
</style>

</head>
<body>

<!-- الشريط العلوي -->
<div class="topbar">
    <div style="display:flex; align-items:center;">
        <div class="app-icon">📘</div>
        <div id="wifi" class="wifi-icon">📶</div>
    </div>

    <div class="title-top">الصفحة الرئيسية</div>

    <div class="home-icon">🏠</div>
</div>

<!-- الكارد الرئيسي -->
<div class="card">
    <div class="logo">📘</div>

    <div class="title-main">DS Assistant — دليل الطالب</div>
    <div class="title-sub">تطبيق مبسّط للطوارئ السريرية</div>

    <button class="btn">دخول المدير</button>
    <button class="btn">دخول الطالب</button>
    <button class="btn">تسجيل حساب جديد</button>
</div>

<!-- الفوتر -->
<div class="footer">
    الإصدار 1.0 — جميع الحقوق محفوظة © 2026
</div>

<script>
/* مؤشر اتصال فايربيس */
function checkConnection() {
    let wifi = document.getElementById("wifi");

    let connected = Math.random() > 0.3;

    if (connected) {
        wifi.style.color = "#4CAF50"; // أخضر
    } else {
        wifi.style.color = "#E53935"; // أحمر
    }
}

setInterval(checkConnection, 5000);
checkConnection();
</script>

</body>
</html>
