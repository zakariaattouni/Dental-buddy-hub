<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DS ASSISTANCE - مساعد الطالب الطبيب</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui; }
        body { background: #ecf9f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { max-width: 500px; width: 100%; margin: auto; }
        .card { background: white; border-radius: 30px; padding: 1.5rem; margin: 1rem 0; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .btn { background: #2b9e5e; color: white; border: none; padding: 10px; border-radius: 50px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-small { background: #2b9e5e; color: white; border: none; padding: 6px 12px; border-radius: 30px; font-weight: bold; cursor: pointer; }
        .btn-danger { background: #e76f51; }
        .btn-gray { background: #888; }
        input, select { width: 100%; padding: 10px; margin: 8px 0; border-radius: 50px; border: 1px solid #ccc; }
        .error { color: red; font-size: 0.8rem; margin-top: 5px; text-align: center; }
        .role-switch { display: flex; gap: 10px; margin-bottom: 15px; }
        .role-btn { flex:1; text-align: center; padding: 8px; background: #e0f3e8; border-radius: 50px; cursor: pointer; }
        .role-btn.active { background: #2b9e5e; color: white; }
        .hidden { display: none; }
        .flex { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .patients-list, .todos-list { list-style: none; padding: 0; margin-top: 10px; }
        .patients-list li, .todos-list li { background: #f9fefb; margin: 5px 0; padding: 8px; border-radius: 20px; border: 1px solid #e1f0e4; display: flex; justify-content: space-between; align-items: center; }
        .emergency-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 0.6rem; max-height: 300px; overflow-y: auto; }
        .emergency-card { background: #fff; border: 1px solid #cde5d4; border-radius: 18px; padding: 0.6rem; text-align: center; cursor: pointer; transition: 0.2s; font-size: 0.8rem; }
        .emergency-card:hover { background: #e0f3e8; }
        hr { margin: 1rem 0; }
        h4 { margin: 10px 0; }
    </style>
</head>
<body>
<div class="container" id="app">
    <!-- شاشة تسجيل الدخول -->
    <div id="authScreen" class="card">
        <h2 style="text-align:center;">🦷 DS ASSISTANCE</h2>
        <p style="text-align:center;">مساعد الطالب الطبيب</p>
        <div class="role-switch">
            <div id="adminRoleBtn" class="role-btn active">👨‍⚕️ مدير</div>
            <div id="studentRoleBtn" class="role-btn">👩‍🎓 طالب</div>
        </div>
        <div id="adminLogin">
            <input type="email" id="adminEmail" placeholder="البريد الإلكتروني للمدير">
            <input type="password" id="adminPassword" placeholder="كلمة السر">
            <button id="adminLoginBtn" class="btn">دخول كمدير</button>
        </div>
        <div id="studentLogin" class="hidden">
            <input type="email" id="studentEmail" placeholder="البريد الإلكتروني">
            <input type="password" id="studentPassword" placeholder="كلمة السر">
            <button id="studentLoginBtn" class="btn">دخول كطالب</button>
            <hr>
            <button id="showRegisterBtn" class="btn btn-gray">📝 تسجيل طالب جديد</button>
        </div>
        <div id="registerForm" class="hidden" style="margin-top: 1rem;">
            <input type="text" id="regName" placeholder="الاسم الكامل">
            <input type="email" id="regEmail" placeholder="البريد الإلكتروني">
            <input type="tel" id="regPhone" placeholder="رقم الهاتف">
            <input type="password" id="regPassword" placeholder="كلمة السر">
            <button id="confirmRegisterBtn" class="btn">إنشاء حساب طالب</button>
        </div>
        <div id="authError" class="error"></div>
    </div>

    <!-- لوحة المدير -->
    <div id="adminDashboard" class="hidden card">
        <div class="flex" style="justify-content: space-between;">
            <h3>لوحة المدير</h3>
            <button id="logoutBtn" class="btn-small btn-danger">تسجيل خروج</button>
        </div>
        <hr>
        <h4>➕ إضافة طالب جديد</h4>
        <div class="flex">
            <input type="text" id="newStudentName" placeholder="الاسم" style="flex:2">
            <input type="email" id="newStudentEmail" placeholder="البريد" style="flex:2">
            <input type="tel" id="newStudentPhone" placeholder="رقم الهاتف" style="flex:2">
            <input type="password" id="newStudentPassword" placeholder="كلمة السر" style="flex:2">
            <button id="addStudentBtn" class="btn-small">إضافة</button>
        </div>
        <h4>📋 قائمة الطلاب</h4>
        <div id="studentsList"></div>
    </div>

    <!-- لوحة الطالب -->
    <div id="studentDashboard" class="hidden card">
        <div class="flex" style="justify-content: space-between;">
            <h3>مرحبًا، <span id="studentName"></span></h3>
            <button id="logoutStudentBtn" class="btn-small btn-danger">خروج</button>
        </div>
        <hr>
        <div class="flex" style="justify-content: center; gap: 10px; flex-wrap: wrap;">
            <button id="showPatientsBtn" class="btn-small">📋 مرضاي</button>
            <button id="showAssistantBtn" class="btn-small">🚑 مساعدي الذكي</button>
            <button id="showAddPatientBtn" class="btn-small">➕ أضف مريض</button>
            <button id="showTodosBtn" class="btn-small">📅 مهامي</button>
        </div>
        <div id="studentPanelContent" style="margin-top: 20px; min-height: 250px;">
            <p style="text-align:center;">اختر إحدى الخدمات</p>
        </div>
    </div>
</div>

<script>
    // ================== إعدادات Firebase ==================
    const firebaseConfig = {
        apiKey: "AIzaSyDy9SjXIhlI-18G4kI2Uwj9FrNIf9-YzPw",
        authDomain: "ds-assistant.firebaseapp.com",
        projectId: "ds-assistant",
        storageBucket: "ds-assistant.firebasestorage.app",
        messagingSenderId: "1098833652254",
        appId: "1:1098833652254:web:5f894ffdaae4de4b8f9c0f",
        measurementId: "G-HL2YFRHD3L"
    };
    // =====================================================

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // عناصر DOM
    const authScreen = document.getElementById('authScreen');
    const adminDashboard = document.getElementById('adminDashboard');
    const studentDashboard = document.getElementById('studentDashboard');
    const authError = document.getElementById('authError');

    function showError(msg) { authError.innerText = msg; }
    function clearError() { authError.innerText = ''; }

    // ================== تبديل واجهة الدخول ==================
    document.getElementById('adminRoleBtn').onclick = () => {
        document.getElementById('adminRoleBtn').classList.add('active');
        document.getElementById('studentRoleBtn').classList.remove('active');
        document.getElementById('adminLogin').classList.remove('hidden');
        document.getElementById('studentLogin').classList.add('hidden');
        document.getElementById('registerForm').classList.add('hidden');
    };
    document.getElementById('studentRoleBtn').onclick = () => {
        document.getElementById('studentRoleBtn').classList.add('active');
        document.getElementById('adminRoleBtn').classList.remove('active');
        document.getElementById('adminLogin').classList.add('hidden');
        document.getElementById('studentLogin').classList.remove('hidden');
        document.getElementById('registerForm').classList.add('hidden');
    };
    document.getElementById('showRegisterBtn').onclick = () => {
        document.getElementById('registerForm').classList.toggle('hidden');
    };

    // ================== إنشاء حساب المدير التلقائي (مرة واحدة) ==================
    async function ensureAdminExists() {
        const adminEmail = "admin@dsassistant.com";
        const adminPass = "admin123456";
        try {
            const userCred = await auth.createUserWithEmailAndPassword(adminEmail, adminPass);
            await db.collection('users').doc(userCred.user.uid).set({ role: 'admin', email: adminEmail });
            console.log('Admin created');
        } catch (e) {
            if (e.code !== 'auth/email-already-in-use') console.error(e);
            else {
                // تأكد من وجود وثيقة المدير
                try {
                    const user = await auth.signInWithEmailAndPassword(adminEmail, adminPass);
                    const doc = await db.collection('users').doc(user.user.uid).get();
                    if (!doc.exists) await db.collection('users').doc(user.user.uid).set({ role: 'admin', email: adminEmail });
                    await auth.signOut();
                } catch(er){}
            }
        }
    }
    ensureAdminExists();

    // ================== دخول المدير ==================
    document.getElementById('adminLoginBtn').onclick = async () => {
        clearError();
        const email = document.getElementById('adminEmail').value;
        const password = document.getElementById('adminPassword').value;
        if (!email || !password) { showError('البريد وكلمة السر مطلوبة'); return; }
        try {
            const userCred = await auth.signInWithEmailAndPassword(email, password);
            const userDoc = await db.collection('users').doc(userCred.user.uid).get();
            if (userDoc.exists && userDoc.data().role === 'admin') {
                authScreen.classList.add('hidden');
                adminDashboard.classList.remove('hidden');
                loadAdminStudents();
            } else {
                showError('غير مصرح لك كمدير');
                await auth.signOut();
            }
        } catch(e) { showError('بيانات غير صحيحة'); }
    };

    // ================== تسجيل طالب جديد ==================
    document.getElementById('confirmRegisterBtn').onclick = async () => {
        clearError();
        const name = document.getElementById('regName').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const phone = document.getElementById('regPhone').value.trim();
        const password = document.getElementById('regPassword').value;
        if (!name || !email || !phone || !password) { showError('جميع الحقول مطلوبة'); return; }
        try {
            const userCred = await auth.createUserWithEmailAndPassword(email, password);
            await db.collection('users').doc(userCred.user.uid).set({
                name, email, phone, role: 'student', status: 'active'
            });
            alert('تم التسجيل بنجاح، يمكنك الدخول الآن');
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('studentEmail').value = email;
            document.getElementById('studentPassword').value = '';
        } catch(e) { showError(e.message); }
    };

    // ================== دخول الطالب ==================
    document.getElementById('studentLoginBtn').onclick = async () => {
        clearError();
        const email = document.getElementById('studentEmail').value;
        const password = document.getElementById('studentPassword').value;
        if (!email || !password) { showError('البريد وكلمة السر مطلوبة'); return; }
        try {
            const userCred = await auth.signInWithEmailAndPassword(email, password);
            const userDoc = await db.collection('users').doc(userCred.user.uid).get();
            if (!userDoc.exists || userDoc.data().role !== 'student' || userDoc.data().status !== 'active') {
                showError('الحساب معطل أو غير مصرح');
                await auth.signOut();
                return;
            }
            const studentData = userDoc.data();
            authScreen.classList.add('hidden');
            studentDashboard.classList.remove('hidden');
            document.getElementById('studentName').innerText = studentData.name;
            loadStudentDashboard(studentData);
        } catch(e) { showError('بيانات غير صحيحة'); }
    };

    // ================== دوال المدير (إدارة الطلاب) ==================
    async function loadAdminStudents() {
        const snapshot = await db.collection('users').where('role', '==', 'student').get();
        const container = document.getElementById('studentsList');
        if (snapshot.empty) { container.innerHTML = '<p>لا يوجد طلاب</p>'; return; }
        let html = '';
        snapshot.forEach(doc => {
            const s = doc.data();
            html += `
                <div style="border:1px solid #ddd; border-radius:20px; padding:10px; margin-bottom:10px;">
                    <div><strong>${s.name}</strong> (${s.email}) | هاتف: ${s.phone}</div>
                    <div>الحالة: ${s.status === 'active' ? '✅ نشط' : '🔴 معطل'}</div>
                    <div class="flex">
                        <button class="btn-small ${s.status === 'active' ? 'btn-danger' : ''}" onclick="toggleStudentStatus('${doc.id}', '${s.status}')">${s.status === 'active' ? 'تعطيل' : 'تفعيل'}</button>
                        <button class="btn-small btn-gray" onclick="deleteStudentAccount('${doc.id}')">حذف</button>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    window.toggleStudentStatus = async (uid, currentStatus) => {
        const newStatus = currentStatus === 'active' ? 'suspended' : 'active';
        await db.collection('users').doc(uid).update({ status: newStatus });
        loadAdminStudents();
    };
    window.deleteStudentAccount = async (uid) => {
        if (confirm('حذف الطالب سيؤدي إلى حذف جميع بياناته نهائياً. هل أنت متأكد؟')) {
            const patientsSnap = await db.collection('patients').where('userId', '==', uid).get();
            patientsSnap.forEach(d => d.ref.delete());
            const todosSnap = await db.collection('todos').where('userId', '==', uid).get();
            todosSnap.forEach(d => d.ref.delete());
            await db.collection('users').doc(uid).delete();
            alert('تم حذف بيانات الطالب. ملاحظة: حساب المصادقة لا يمكن حذفه من هنا، قم بحذفه يدوياً من Firebase Console إذا أردت.');
            loadAdminStudents();
        }
    };

    document.getElementById('addStudentBtn').onclick = async () => {
        const name = document.getElementById('newStudentName').value.trim();
        const email = document.getElementById('newStudentEmail').value.trim();
        const phone = document.getElementById('newStudentPhone').value.trim();
        const pwd = document.getElementById('newStudentPassword').value;
        if (!name || !email || !phone || !pwd) { alert('املأ جميع الحقول'); return; }
        try {
            const userCred = await auth.createUserWithEmailAndPassword(email, pwd);
            await db.collection('users').doc(userCred.user.uid).set({
                name, email, phone, role: 'student', status: 'active'
            });
            alert('تمت إضافة الطالب');
            document.getElementById('newStudentName').value = '';
            document.getElementById('newStudentEmail').value = '';
            document.getElementById('newStudentPhone').value = '';
            document.getElementById('newStudentPassword').value = '';
            loadAdminStudents();
        } catch(e) { alert('خطأ: ' + e.message); }
    };

    // ================== واجهة الطالب ==================
    let currentStudentId = null;

    async function loadStudentDashboard(student) {
        currentStudentId = student.id;
        const container = document.getElementById('studentPanelContent');
        
        // عرض المرضى
        const showPatients = async () => {
            const snap = await db.collection('patients').where('userId', '==', currentStudentId).get();
            let html = '<h4>📋 مرضاي</h4><ul class="patients-list">';
            if (snap.empty) html += '<li>لا يوجد مرضى</li>';
            else snap.forEach(doc => {
                const p = doc.data();
                html += `<li><strong>${p.name}</strong> - ${p.diagnosis || ''} - ${p.phone} <a href="https://wa.me/${p.phone}" target="_blank" style="color:#25D366;">📱</a>
                <button class="btn-small btn-danger" onclick="deletePatient('${doc.id}')">🗑</button></li>`;
            });
            html += '</ul>';
            container.innerHTML = html;
        };
        
        // عرض المساعد الذكي (بطاقات الطوارئ)
        const showAssistant = () => {
            // 50 حالة طوارئ (سأضع نموذجاً من 5 حالات للاختصار، لكن يمكنك إضافة الباقي)
            const emergencyList = [
                { title: "نزيف حاد بعد القلع", steps: "🩸 اضغط بشاش معقم 5 دقائق، استخدم إسفنجة جيلاتين، لا مضمضة، استدع مشرفاً." },
                { title: "إغماء المريض", steps: "😵 افتح المجرى الهوائي، ارفع الرجلين، أرخِ الملابس، نادِ مشرفاً." },
                { title: "كسر إبرة تخدير", steps: "⚠️ لا تحاول الإخراج، ثبّت المريض، استخدم ملقط معقم، أشعة، استدع مشرفاً." },
                { title: "حساسية لاتكس", steps: "🤚 أزل القفازات، استخدم قفازات خالية من اللاتكس، مضاد هيستامين، استدع مشرفاً." },
                { title: "انكسار أداة ضمن القناة", steps: "🛠️ لا تحاول الإخراج بدون تصوير، أشعة فورية، أبلغ المشرف." },
                // يمكنك إضافة باقي الحالات هنا بنفس التنسيق
            ];
            let html = '<h4>🚑 مساعد الطوارئ الذكي</h4><div class="emergency-grid">';
            emergencyList.forEach(e => {
                html += `<div class="emergency-card" onclick="alert('${e.steps}')"><strong>${e.title}</strong></div>`;
            });
            html += '</div>';
            container.innerHTML = html;
        };
        
        // إضافة مريض
        const showAddPatient = () => {
            container.innerHTML = `
                <h4>➕ إضافة مريض جديد</h4>
                <input type="text" id="patName" placeholder="الاسم">
                <input type="tel" id="patPhone" placeholder="رقم الواتساب">
                <input type="text" id="patDiag" placeholder="التشخيص">
                <button id="savePatientBtn" class="btn">حفظ</button>
            `;
            document.getElementById('savePatientBtn').onclick = async () => {
                const name = document.getElementById('patName').value.trim();
                const phone = document.getElementById('patPhone').value.trim();
                const diag = document.getElementById('patDiag').value.trim();
                if (!name || !phone) return alert('الاسم والرقم مطلوبان');
                await db.collection('patients').add({
                    userId: currentStudentId, name, phone, diagnosis: diag, createdAt: new Date()
                });
                alert('تم الحفظ');
                showPatients();
            };
        };
        
        // عرض المهام
        const showTodos = async () => {
            const snap = await db.collection('todos').where('userId', '==', currentStudentId).get();
            let html = `<h4>📝 مهامي</h4>
                        <div class="flex"><input type="text" id="newTodo" placeholder="مهمة جديدة"><button id="addTodoBtn" class="btn-small">➕</button></div>
                        <ul class="todos-list">`;
            snap.forEach(doc => {
                const todo = doc.data();
                html += `<li><input type="checkbox" ${todo.completed ? 'checked' : ''} onchange="toggleTodo('${doc.id}', this.checked)"> 
                        ${todo.text} <button class="btn-small btn-danger" onclick="deleteTodo('${doc.id}')">🗑</button></li>`;
            });
            html += '</ul>';
            container.innerHTML = html;
            document.getElementById('addTodoBtn').onclick = async () => {
                const text = document.getElementById('newTodo').value.trim();
                if (text) {
                    await db.collection('todos').add({ userId: currentStudentId, text, completed: false });
                    showTodos();
                }
            };
        };
        
        document.getElementById('showPatientsBtn').onclick = showPatients;
        document.getElementById('showAssistantBtn').onclick = showAssistant;
        document.getElementById('showAddPatientBtn').onclick = showAddPatient;
        document.getElementById('showTodosBtn').onclick = showTodos;
        
        // افتراضي عرض المرضى
        showPatients();
    }
    
    // دوال عالمية لحذف المرضى والمهام
    window.deletePatient = async (docId) => {
        if (confirm('حذف المريض؟')) await db.collection('patients').doc(docId).delete();
        document.getElementById('showPatientsBtn').click();
    };
    window.toggleTodo = async (docId, checked) => {
        await db.collection('todos').doc(docId).update({ completed: checked });
    };
    window.deleteTodo = async (docId) => {
        if (confirm('حذف المهمة؟')) await db.collection('todos').doc(docId).delete();
        document.getElementById('showTodosBtn').click();
    };
    
    // تسجيل الخروج
    document.getElementById('logoutBtn').onclick = () => { auth.signOut(); location.reload(); };
    document.getElementById('logoutStudentBtn').onclick = () => { auth.signOut(); location.reload(); };
</script>
</body>
</html>
