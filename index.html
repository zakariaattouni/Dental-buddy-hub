<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DS ASSISTANCE - مساعد الطالب الطبيب</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: #ecf9f0; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .wrapper { max-width: 1400px; width: 100%; margin: 0 auto; }
        
        /* شاشة الدخول */
        .login-card {
            background: white;
            border-radius: 48px;
            max-width: 400px;
            margin: 2rem auto;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .role-buttons { display: flex; gap: 1rem; margin: 1rem 0; }
        .role-btn { flex: 1; padding: 12px; border-radius: 60px; border: none; background: #e0f3e8; color: #1f6e43; font-weight: bold; cursor: pointer; }
        .role-btn.active { background: #2b9e5e; color: white; }
        .login-field { display: none; margin-top: 1rem; }
        .login-field input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 60px; border: 1px solid #cbdfd1; }
        .register-field { margin-top: 1rem; border-top: 1px solid #cbdfd1; padding-top: 1rem; }
        .btn { background: #2b9e5e; border: none; padding: 12px; border-radius: 50px; color: white; font-weight: bold; width: 100%; cursor: pointer; margin-top: 8px; }
        .btn-outline { background: transparent; border: 1px solid #2b9e5e; color: #2b9e5e; }
        .error { color: #c5452f; margin-top: 8px; font-size: 0.85rem; }
        
        /* التطبيق الرئيسي */
        .app-main { background: white; border-radius: 40px; overflow: hidden; display: none; }
        .header { background: linear-gradient(135deg,#e0f3e8,#c8e6d9); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .logo h1 { color: #1f6e43; font-size: 1.8rem; display: flex; align-items: center; gap: 8px; }
        .logo h1::before { content: "🦷"; }
        .logout-btn { background: none; border: none; color: #c5452f; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .tabs { display: flex; gap: 0.25rem; background: #f9fefb; padding: 0.5rem 2rem 0 2rem; border-bottom: 1px solid #cde5d4; flex-wrap: wrap; }
        .tab-btn { background: none; border: none; padding: 0.7rem 1.6rem; font-weight: 600; color: #4a6a5e; border-radius: 30px 30px 0 0; cursor: pointer; }
        .tab-btn.active { background: white; color: #1f6e43; border-bottom: 3px solid #2b9e5e; }
        .tab-content { display: none; padding: 2rem; animation: fade 0.2s; }
        .tab-content.active { display: block; }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
        .card { background: #fff; border: 1px solid #e1f0e4; border-radius: 28px; padding: 1.5rem; margin-bottom: 1.8rem; }
        .card-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #def0e2; padding-bottom: 0.7rem; margin-bottom: 1.2rem; flex-wrap: wrap; gap: 10px; }
        .btn-primary { background: #2b9e5e; padding: 12px 20px; border-radius: 40px; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 1rem; min-width: 120px; }
        .btn-danger { background: #e76f51; }
        .btn-whatsapp { background: #25D366; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 8px; border-bottom: 1px solid #eef3ec; text-align: right; }
        .user-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #deecdf; flex-wrap: wrap; gap: 10px; }
        .badge { background: #f4e9cd; padding: 5px 12px; border-radius: 30px; font-size: 0.8rem; }
        footer { background: #e9f3ec; text-align: center; padding: 1rem; font-size: 0.7rem; margin-top: 1rem; }
        
        /* بطاقات الطوارئ */
        .emergency-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; margin-top: 1rem; }
        .emergency-card { background: #f9fefb; border: 1px solid #cde5d4; border-radius: 20px; padding: 1rem; text-align: center; cursor: pointer; transition: 0.2s; }
        .emergency-card:hover { background: #e0f3e8; transform: translateY(-3px); }
        .emergency-card h4 { color: #1f6e43; margin-bottom: 0.5rem; }
        .chat-area { background: #f8fefb; border-radius: 24px; padding: 1rem; margin-top: 1.5rem; }
        .message-bubble { background: #eef6f2; border-radius: 20px; padding: 12px 16px; margin: 8px 0; }
        @media (max-width: 700px) { .tabs { padding: 0 1rem; } .tab-btn { padding: 0.5rem 0.8rem; } .emergency-grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>
<div class="wrapper">
    <!-- شاشة الدخول الموحدة -->
    <div id="loginScreen" class="login-card">
        <h2>DS ASSISTANCE</h2>
        <p>مساعد الطالب الطبيب</p>
        <div class="role-buttons">
            <button id="adminRoleBtn" class="role-btn active">👨‍⚕️ مدير</button>
            <button id="studentRoleBtn" class="role-btn">👩‍🎓 طالب</button>
        </div>
        <div id="adminLoginFields" class="login-field">
            <input type="password" id="adminPassword" placeholder="كلمة السر">
        </div>
        <div id="studentLoginFields" class="login-field" style="display:none;">
            <input type="tel" id="studentPhone" placeholder="رقم الهاتف">
            <input type="password" id="studentPassword" placeholder="كلمة السر">
        </div>
        <button id="loginActionBtn" class="btn">دخول</button>
        <div id="loginError" class="error"></div>
        
        <!-- قسم تسجيل طالب جديد -->
        <div class="register-field">
            <button id="showRegisterBtn" class="btn btn-outline">📝 تسجيل طالب جديد</button>
            <div id="registerForm" style="display: none; margin-top: 1rem;">
                <input type="text" id="regName" placeholder="الاسم الكامل" style="width:100%; padding:10px; margin:5px 0; border-radius:40px; border:1px solid #ccc;">
                <input type="tel" id="regPhone" placeholder="رقم الهاتف" style="width:100%; padding:10px; margin:5px 0; border-radius:40px; border:1px solid #ccc;">
                <input type="password" id="regPassword" placeholder="كلمة السر" style="width:100%; padding:10px; margin:5px 0; border-radius:40px; border:1px solid #ccc;">
                <button id="doRegisterBtn" class="btn">تسجيل</button>
                <div id="regError" class="error"></div>
            </div>
        </div>
    </div>

    <!-- التطبيق الرئيسي -->
    <div id="appMain" class="app-main">
        <div class="header">
            <div class="logo"><h1>DS ASSISTANCE</h1><small id="userRoleLabel"></small></div>
            <button class="logout-btn" id="logoutBtn">🚪 خروج</button>
        </div>
        <div id="dynamicContent"></div>
        <footer>نظام إدارة العيادة | مساعد طوارئ ذكي محلي | دعم 13+ حالة طوارئ</footer>
    </div>
</div>

<script>
    // ------------------- بيانات التخزين (محاكاة قاعدة بيانات) -------------------
    let students = JSON.parse(localStorage.getItem('ds_students')) || [];
    let patientsDB = JSON.parse(localStorage.getItem('ds_patients')) || {};
    
    function saveStudents() { localStorage.setItem('ds_students', JSON.stringify(students)); }
    function savePatients() { localStorage.setItem('ds_patients', JSON.stringify(patientsDB)); }
    
    // إضافة طالب (للمدير أو التسجيل الذاتي)
    function addStudent(name, phone, password, status = 'active') {
        if (students.find(s => s.phone === phone)) return false;
        const id = 's_' + Date.now();
        students.push({ id, name, phone, password, status });
        saveStudents();
        if (!patientsDB[id]) patientsDB[id] = [];
        savePatients();
        return true;
    }
    
    function deleteStudent(id) {
        students = students.filter(s => s.id !== id);
        delete patientsDB[id];
        saveStudents();
        savePatients();
    }
    
    function toggleSuspend(id) {
        const student = students.find(s => s.id === id);
        if (student) student.status = student.status === 'active' ? 'suspended' : 'active';
        saveStudents();
    }
    
    // دوال إدارة المرضى (خاصة بالطالب)
    function addPatientToStudent(studentId, name, phone, diagnosis) {
        if (!patientsDB[studentId]) patientsDB[studentId] = [];
        patientsDB[studentId].push({ name, phone, diagnosis: diagnosis || '', addedAt: new Date() });
        savePatients();
    }
    
    function deletePatient(studentId, index) {
        if (patientsDB[studentId]) {
            patientsDB[studentId].splice(index, 1);
            savePatients();
        }
    }
    
    // ------------------- قاعدة بيانات المساعد الذكي -------------------
    const emergencyCases = [
        { title: "نزيف حاد", steps: "🩸 اضغط بشاش معقم 5 دقائق، استخدم إسفنجة جيلاتين، لا مضمضة. استدع مشرفاً إذا استمر." },
        { title: "إغماء", steps: "😵 افتح المجرى الهوائي، ارفع الرجلين، أرخِ الملابس، نادِ مشرفاً." },
        { title: "كسر إبرة تخدير", steps: "⚠️ لا تحاول الإخراج، ثبّت المريض، استخدم ملقط معقم، أشعة، استدع مشرفاً." },
        { title: "حساسية لاتكس", steps: "🤚 أزل القفازات، استخدم قفازات خالية من اللاتكس، مضاد هيستامين، استدع مشرفاً." },
        { title: "انكسار أداة ضمن القناة", steps: "🛠️ لا تحاول الإخراج بدون تصوير، أشعة فورية، أبلغ المشرف، لا تكمل العلاج." },
        { title: "ابتلاع أداة", steps: "⚠️ تهدئة المريض، لا تسبب تقيؤ، أشعة صدر وبطن فوراً، استدع مشرفاً." },
        { title: "احتراق كيميائي", steps: "🔥 اغسل بكمية كبيرة من الماء 20 دقيقة، انزع القفازات الملوثة، استدع مشرفاً." },
        { title: "طفل غير متعاون", steps: "🧸 تقنية أخبر-أظهر-نفذ، كافئ السلوك، قد تحتاج تثبيت بلطف، استدع مشرفاً." },
        { title: "جرح لسان", steps: "👅 نظف بمحلول ملحي، اضغط بشاش، إذا كان عميقاً أرسل للمستشفى." },
        { title: "جرح شفة", steps: "👄 نظف، ضغط بارد، إذا كان نافذاً أرسل للمستشفى." },
        { title: "خدر العصب الوجهي", steps: "😐 طمئن المريض، عادة مؤقت، راقب التنفس، أبلغ المشرف." },
        { title: "تجاوز ذروة السن بالمواد", steps: "📏 أشعة، لا تحاول الإزالة، أبلغ المشرف، راقب الأعراض." },
        { title: "انثقاب الجيب الفكي", steps: "🕳️ لا تنظف القناة، لا ضغط هواء، مضاد حيوي، تجنب العطس، أرسل للمشرف." }
    ];
    
    function getEmergencyResponse(title) {
        const found = emergencyCases.find(e => e.title === title);
        return found ? found.steps : "لم نتعرف على الحالة.";
    }
    
    // ------------------- دوال بناء الواجهة حسب الدور -------------------
    let currentUser = null;
    
    function renderAdminDashboard() {
        const container = document.getElementById('dynamicContent');
        container.innerHTML = `
            <div class="tabs" id="adminTabs">
                <button class="tab-btn active" data-tab="adminStudents">👥 إدارة الطلاب</button>
                <button class="tab-btn" data-tab="adminAssistant">🚨 المساعد الذكي</button>
            </div>
            <div id="adminTabContents">
                <div class="tab-content active" id="adminStudents">
                    <div class="card">
                        <div class="card-header"><h3>➕ إضافة طالب جديد</h3></div>
                        <div style="display:flex; gap:10px; flex-wrap:wrap;">
                            <input type="text" id="stdName" placeholder="الاسم" style="flex:1; padding:10px; border-radius:40px;">
                            <input type="tel" id="stdPhone" placeholder="رقم الهاتف" style="flex:1; padding:10px; border-radius:40px;">
                            <input type="password" id="stdPassword" placeholder="كلمة السر" style="flex:1; padding:10px; border-radius:40px;">
                            <button id="addStudentBtn" class="btn-primary">إضافة</button>
                        </div>
                        <div id="addResult" style="margin-top:10px;"></div>
                    </div>
                    <div class="card">
                        <div class="card-header"><h3>📋 قائمة الطلاب</h3></div>
                        <div id="studentsListAdmin"></div>
                    </div>
                </div>
                <div class="tab-content" id="adminAssistant">
                    <div class="card">
                        <div class="card-header"><h3>🚑 المساعد الذكي للطوارئ</h3></div>
                        <div class="emergency-grid" id="emergencyGridAdmin"></div>
                        <div class="chat-area" id="chatAreaAdmin">
                            <div id="chatMessagesAdmin" style="height:200px; overflow-y:auto; margin-bottom:10px;"></div>
                        </div>
                    </div>
                </div>
            </div>
        `;
        buildEmergencyGrid('emergencyGridAdmin', 'chatMessagesAdmin');
        refreshStudentsListAdmin();
        
        document.querySelectorAll('#adminTabs .tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tabId = btn.dataset.tab;
                document.querySelectorAll('#adminTabContents .tab-content').forEach(tc => tc.classList.remove('active'));
                document.getElementById(tabId).classList.add('active');
                document.querySelectorAll('#adminTabs .tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });
        
        document.getElementById('addStudentBtn').addEventListener('click', () => {
            const name = document.getElementById('stdName').value.trim();
            const phone = document.getElementById('stdPhone').value.trim();
            const pass = document.getElementById('stdPassword').value.trim();
            if (name && phone && pass) {
                if (addStudent(name, phone, pass)) {
                    document.getElementById('addResult').innerHTML = '<span style="color:green;">✅ تم الإضافة</span>';
                    document.getElementById('stdName').value = '';
                    document.getElementById('stdPhone').value = '';
                    document.getElementById('stdPassword').value = '';
                    refreshStudentsListAdmin();
                } else {
                    document.getElementById('addResult').innerHTML = '<span style="color:red;">❌ الرقم موجود مسبقاً</span>';
                }
            } else {
                document.getElementById('addResult').innerHTML = '<span style="color:red;">❌ املأ جميع الحقول</span>';
            }
        });
    }
    
    function refreshStudentsListAdmin() {
        const container = document.getElementById('studentsListAdmin');
        if (!container) return;
        if (students.length === 0) { container.innerHTML = '<p>لا يوجد طلاب</p>'; return; }
        let html = '';
        students.forEach(s => {
            html += `
                <div class="user-row">
                    <div><strong>${escapeHtml(s.name)}</strong> (📞 ${s.phone}) <span class="badge">${s.status === 'active' ? '✅ نشط' : '🔴 مُرقن'}</span></div>
                    <div>
                        <button class="btn-primary btn-danger" onclick="window.toggleSuspendStudent('${s.id}')" style="margin-left:8px;">${s.status === 'active' ? '🔴 ترقين' : '🟢 تفعيل'}</button>
                        <button class="btn-primary" style="background:#aaa;" onclick="window.deleteStudentById('${s.id}')">🗑 حذف</button>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }
    
    function renderStudentDashboard(student) {
        const container = document.getElementById('dynamicContent');
        container.innerHTML = `
            <div class="tabs" id="studentTabs">
                <button class="tab-btn active" data-tab="studentPatients">📋 مرضاي</button>
                <button class="tab-btn" data-tab="studentAssistant">🚨 المساعد الذكي</button>
            </div>
            <div id="studentTabContents">
                <div class="tab-content active" id="studentPatients">
                    <div class="card">
                        <div class="card-header"><h3>➕ إضافة مريض جديد</h3></div>
                        <div style="display:flex; gap:10px; flex-wrap:wrap;">
                            <input type="text" id="patName" placeholder="اسم المريض" style="flex:2; padding:10px; border-radius:40px;">
                            <input type="tel" id="patPhone" placeholder="رقم واتساب" style="flex:2; padding:10px; border-radius:40px;">
                            <input type="text" id="patDiag" placeholder="التشخيص" style="flex:2; padding:10px; border-radius:40px;">
                            <button id="addPatientBtn" class="btn-primary">إضافة</button>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-header"><h3>📋 قائمة مرضاي</h3></div>
                        <div id="patientsListStudent"></div>
                    </div>
                </div>
                <div class="tab-content" id="studentAssistant">
                    <div class="card">
                        <div class="card-header"><h3>🚑 المساعد الذكي للطوارئ</h3></div>
                        <div class="emergency-grid" id="emergencyGridStudent"></div>
                        <div class="chat-area" id="chatAreaStudent">
                            <div id="chatMessagesStudent" style="height:200px; overflow-y:auto; margin-bottom:10px;"></div>
                        </div>
                    </div>
                </div>
            </div>
        `;
        buildEmergencyGrid('emergencyGridStudent', 'chatMessagesStudent');
        refreshPatientsList(student.id);
        
        document.querySelectorAll('#studentTabs .tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tabId = btn.dataset.tab;
                document.querySelectorAll('#studentTabContents .tab-content').forEach(tc => tc.classList.remove('active'));
                document.getElementById(tabId).classList.add('active');
                document.querySelectorAll('#studentTabs .tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });
        
        document.getElementById('addPatientBtn').addEventListener('click', () => {
            const name = document.getElementById('patName').value.trim();
            const phone = document.getElementById('patPhone').value.trim();
            const diag = document.getElementById('patDiag').value.trim();
            if (name && phone) {
                addPatientToStudent(student.id, name, phone, diag);
                refreshPatientsList(student.id);
                document.getElementById('patName').value = '';
                document.getElementById('patPhone').value = '';
                document.getElementById('patDiag').value = '';
            } else alert('يرجى إدخال اسم المريض ورقم الهاتف');
        });
    }
    
    function refreshPatientsList(studentId) {
        const container = document.getElementById('patientsListStudent');
        if (!container) return;
        const patients = patientsDB[studentId] || [];
        if (patients.length === 0) { container.innerHTML = '<p>لا يوجد مرضى مسجلون</p>'; return; }
        let html = '<table><thead><tr><th>اسم المريض</th><th>التشخيص</th><th>رقم واتساب</th><th>إجراءات</th></thead><tbody>';
        patients.forEach((p, idx) => {
            html += `<tr>
                        <td>${escapeHtml(p.name)}</td>
                        <td>${escapeHtml(p.diagnosis)}</td>
                        <td>${escapeHtml(p.phone)}</td>
                        <td><button class="btn-primary btn-whatsapp" onclick="window.sendWhatsapp('${p.phone}', '${p.name}')">📱 واتساب</button>
                        <button class="btn-primary btn-danger" onclick="window.deletePatientById('${studentId}', ${idx})">🗑 حذف</button>
                         </td>
                    </tr>`;
        });
        html += '</tbody></table>';
        container.innerHTML = html;
    }
    
    function buildEmergencyGrid(gridId, chatId) {
        const grid = document.getElementById(gridId);
        if (!grid) return;
        grid.innerHTML = '';
        emergencyCases.forEach(c => {
            const card = document.createElement('div');
            card.className = 'emergency-card';
            card.innerHTML = `<h4>${c.title}</h4><p>اضغط للحصول على الخطوات</p>`;
            card.addEventListener('click', () => {
                const response = getEmergencyResponse(c.title);
                const chatDiv = document.getElementById(chatId);
                if (chatDiv) {
                    const msgDiv = document.createElement('div');
                    msgDiv.className = 'message-bubble';
                    msgDiv.innerHTML = `<strong>🔔 ${c.title}:</strong><br>${response}`;
                    chatDiv.appendChild(msgDiv);
                    chatDiv.scrollTop = chatDiv.scrollHeight;
                }
            });
            grid.appendChild(card);
        });
        const chatDiv = document.getElementById(chatId);
        if (chatDiv && chatDiv.children.length === 0) {
            const welcome = document.createElement('div');
            welcome.className = 'message-bubble';
            welcome.innerHTML = "<strong>🤖 المساعد الذكي:</strong> اختر حالة طوارئ من البطاقات أعلاه لتحصل على الإرشادات.";
            chatDiv.appendChild(welcome);
        }
    }
    
    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    
    // دوال عامة للعمليات
    window.toggleSuspendStudent = (id) => { toggleSuspend(id); refreshStudentsListAdmin(); };
    window.deleteStudentById = (id) => { if(confirm('حذف الطالب سيؤدي لحذف جميع مرضاه؟')) { deleteStudent(id); refreshStudentsListAdmin(); } };
    window.deletePatientById = (studentId, idx) => { if(confirm('حذف المريض؟')) { deletePatient(studentId, idx); refreshPatientsList(studentId); } };
    window.sendWhatsapp = (phone, name) => {
        const message = `مرحباً ${name}، تذكير بموعدك في عيادة الأسنان. الرجاء الحضور في الوقت المحدد. شكراً.`;
        const url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
        window.open(url, '_blank');
    };
    
    // ------------------- إدارة الدخول والتسجيل -------------------
    function showAdminLogin() { document.getElementById('adminLoginFields').style.display = 'block'; document.getElementById('studentLoginFields').style.display = 'none'; }
    function showStudentLogin() { document.getElementById('adminLoginFields').style.display = 'none'; document.getElementById('studentLoginFields').style.display = 'block'; }
    
    document.getElementById('adminRoleBtn').addEventListener('click', () => {
        document.getElementById('adminRoleBtn').classList.add('active');
        document.getElementById('studentRoleBtn').classList.remove('active');
        showAdminLogin();
        document.getElementById('registerForm').style.display = 'none';
    });
    document.getElementById('studentRoleBtn').addEventListener('click', () => {
        document.getElementById('studentRoleBtn').classList.add('active');
        document.getElementById('adminRoleBtn').classList.remove('active');
        showStudentLogin();
        document.getElementById('registerForm').style.display = 'none';
    });
    
    document.getElementById('loginActionBtn').addEventListener('click', () => {
        const isAdmin = document.getElementById('adminRoleBtn').classList.contains('active');
        if (isAdmin) {
            const pass = document.getElementById('adminPassword').value;
            if (pass === 'salem1959') {
                currentUser = { role: 'admin' };
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('appMain').style.display = 'block';
                document.getElementById('userRoleLabel').innerText = 'لوحة المدير';
                renderAdminDashboard();
            } else {
                document.getElementById('loginError').innerText = 'كلمة السر غير صحيحة';
            }
        } else {
            const phone = document.getElementById('studentPhone').value.trim();
            const pwd = document.getElementById('studentPassword').value.trim();
            const student = students.find(s => s.phone === phone && s.password === pwd && s.status === 'active');
            if (student) {
                currentUser = { role: 'student', id: student.id, name: student.name, phone: student.phone };
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('appMain').style.display = 'block';
                document.getElementById('userRoleLabel').innerHTML = `طالب: ${student.name}`;
                renderStudentDashboard(student);
            } else {
                document.getElementById('loginError').innerText = 'رقم الهاتف أو كلمة السر غير صحيحة، أو الحساب معطل';
            }
        }
    });
    
    // التسجيل الذاتي
    let registerFormVisible = false;
    document.getElementById('showRegisterBtn').addEventListener('click', () => {
        const form = document.getElementById('registerForm');
        registerFormVisible = !registerFormVisible;
        form.style.display = registerFormVisible ? 'block' : 'none';
    });
    document.getElementById('doRegisterBtn').addEventListener('click', () => {
        const name = document.getElementById('regName').value.trim();
        const phone = document.getElementById('regPhone').value.trim();
        const pwd = document.getElementById('regPassword').value.trim();
        if (!name || !phone || !pwd) {
            document.getElementById('regError').innerText = '❌ يرجى ملء جميع الحقول';
            return;
        }
        if (students.find(s => s.phone === phone)) {
            document.getElementById('regError').innerText = '❌ رقم الهاتف مسجل مسبقاً';
            return;
        }
        if (addStudent(name, phone, pwd, 'active')) {
            alert('تم التسجيل بنجاح! يمكنك الآن الدخول باستخدام رقم الهاتف وكلمة السر.');
            document.getElementById('regName').value = '';
            document.getElementById('regPhone').value = '';
            document.getElementById('regPassword').value = '';
            document.getElementById('registerForm').style.display = 'none';
            registerFormVisible = false;
            // تحويل إلى وضع الطالب وملء حقول الدخول
            document.getElementById('studentRoleBtn').click();
            document.getElementById('studentPhone').value = phone;
            document.getElementById('studentPassword').value = pwd;
            document.getElementById('loginError').innerText = '';
        } else {
            document.getElementById('regError').innerText = '❌ حدث خطأ، حاول مرة أخرى';
        }
    });
    
    document.getElementById('logoutBtn').addEventListener('click', () => {
        currentUser = null;
        location.reload();
    });
    
    // بيانات افتراضية أولية (للتجربة)
    if (students.length === 0) {
        addStudent('أحمد الطالب', '0512345678', '1234');
        addStudent('سارة الطالبة', '0598765432', '5678');
        const firstStudent = students[0];
        if (firstStudent) {
            addPatientToStudent(firstStudent.id, 'مريض تجريبي 1', '0501111111', 'حشو عصب');
            addPatientToStudent(firstStudent.id, 'مريض تجريبي 2', '0502222222', 'قلع ضرس');
        }
    }
</script>
</body>
