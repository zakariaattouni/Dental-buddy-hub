<!DOCTYPE html><html lang="ar" dir="rtl"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>مساعد طالب الأسنان</title>
<style>
body{margin:0;padding:0;font-family:Tahoma,Arial;background:#F7F7F7;}
.topbar{height:56px;background:#F2F2F2;border-bottom:1px solid #D9D9D9;display:flex;align-items:center;justify-content:space-between;padding:0 14px;}
.home-icon{font-size:22px;cursor:pointer;}
.container{width:90%;margin:20px auto;}
.btn{width:100%;padding:12px;border:none;border-radius:10px;font-size:16px;cursor:pointer;margin-top:10px;}
.btn-main{background:#F4C542;color:#1E1E1E;}
.btn-sec{background:#E0E0E0;color:#333;}
input,select{width:100%;padding:10px;border-radius:10px;border:1px solid #CCC;font-size:15px;margin:6px 0;}
h2{margin:10px 0;}
.card{background:#FFF;padding:18px;border-radius:12px;border:1px solid #DDD;margin-bottom:15px;box-shadow:0 2px 6px rgba(0,0,0,0.08);cursor:pointer;transition:.2s;}
.card:hover{transform:scale(1.02);}
.card-title{font-size:18px;font-weight:bold;margin-bottom:6px;color:#1E1E1E;}
.card-desc{font-size:14px;color:#555;margin-bottom:10px;}
.icons{display:flex;gap:12px;font-size:18px;}
footer{position:fixed;bottom:0;left:0;width:100%;background:#222;color:#eee;padding:10px;text-align:center;border-top:3px solid #F4C542;font-size:12px;line-height:1.6;}
.hidden{display:none;}
.section-title{text-align:center;font-weight:bold;margin:10px 0 20px;}
.case-title{font-size:22px;font-weight:bold;margin-bottom:15px;text-align:center;color:#1E1E1E;}
.case-card{background:#FFF;padding:16px;border-radius:12px;border:1px solid #DDD;margin-bottom:12px;box-shadow:0 2px 6px rgba(0,0,0,0.06);}
.case-card-title{font-size:16px;font-weight:bold;margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.case-text{font-size:14px;line-height:1.7;color:#333;}
.search-box{width:100%;padding:12px;border-radius:12px;border:1px solid #CCC;font-size:16px;margin-bottom:20px;}
</style>
</head>
<body>

<div class="topbar">
  <div class="home-icon" onclick="showSection('mainLogin')">🏠</div>
  <div id="topbarTitle" style="font-weight:bold;">مساعد طالب الأسنان</div>
  <div></div>
</div>

<!-- شاشة البداية -->
<div id="mainLogin" class="container">
  <h2 class="section-title">اختر نوع الدخول</h2>
  <button class="btn btn-main" onclick="showSection('adminLogin')">دخول كمدير</button>
  <button class="btn btn-sec" onclick="showSection('studentLogin')">دخول كطالب</button>
</div>

<!-- دخول المدير -->
<div id="adminLogin" class="container hidden">
  <h2 class="section-title">دخول المدير</h2>
  <label>كلمة السر</label>
  <input id="adminPass" type="password" placeholder="••••••••">
  <button class="btn btn-main" onclick="loginAdmin()">دخول</button>
  <button class="btn btn-sec" onclick="showSection('mainLogin')">رجوع</button>
</div>

<!-- دخول الطالب -->
<div id="studentLogin" class="container hidden">
  <h2 class="section-title">دخول الطالب</h2>
  <label>البريد الإلكتروني</label>
  <input id="loginEmail" type="email">
  <label>كلمة المرور</label>
  <input id="loginPassword" type="password">
  <button class="btn btn-main" onclick="loginStudent()">دخول</button>
  <button class="btn btn-sec" onclick="showSection('registerSection')">إنشاء حساب جديد</button>
  <button class="btn btn-sec" onclick="showSection('mainLogin')">رجوع</button>
</div>

<!-- تسجيل طالب -->
<div id="registerSection" class="container hidden">
  <h2 class="section-title">تسجيل طالب جديد</h2>
  <label>الاسم الكامل</label>
  <input id="regName" type="text">
  <label>البريد الإلكتروني</label>
  <input id="regEmail" type="email">
  <label>كلمة المرور</label>
  <input id="regPassword" type="password">
  <button class="btn btn-main" onclick="registerStudent()">تسجيل</button>
  <button class="btn btn-sec" onclick="showSection('studentLogin')">رجوع</button>
</div>

<!-- لوحة الطالب -->
<div id="studentSection" class="container hidden">
  <h2 class="section-title">لوحة الطالب</h2>
  <button class="btn btn-main" onclick="openEmergency()">موسوعة الطوارئ</button>
  <button class="btn btn-sec" onclick="logout()">تسجيل الخروج</button>
</div>

<!-- لوحة المدير -->
<div id="adminSection" class="container hidden">
  <h2 class="section-title">لوحة المدير</h2>
  <p>مرحبًا بك يا دكتور زكريا…</p>
  <button class="btn btn-main" onclick="openEmergency()">موسوعة الطوارئ</button>
  <button class="btn btn-sec" onclick="logout()">تسجيل الخروج</button>
</div>

<!-- موسوعة الطوارئ -->
<div id="emergencySection" class="container hidden">
  <h2 class="section-title">موسوعة الطوارئ</h2>
  <input id="search" class="search-box" type="text" placeholder="ابحث عن حالة..." oninput="searchCases()">
  <div id="casesList"></div>
  <button class="btn btn-sec" onclick="backFromEmergency()">رجوع</button>
</div>

<!-- صفحة الحالة -->
<div id="caseSection" class="container hidden">
  <h2 class="section-title">تفاصيل الحالة</h2>
  <div id="caseTitle" class="case-title"></div>
  <div class="case-card"><div class="case-card-title">📘 التعريف</div><div id="caseDefinition" class="case-text"></div></div>
  <div class="case-card"><div class="case-card-title">⚠️ الأسباب</div><div id="caseCauses" class="case-text"></div></div>
  <div class="case-card"><div class="case-card-title">🩺 الأعراض</div><div id="caseSigns" class="case-text"></div></div>
  <div class="case-card"><div class="case-card-title">⛑️ الإسعافات</div><div id="caseAid" class="case-text"></div></div>
  <div class="case-card"><div class="case-card-title">📝 ملاحظات</div><div id="caseNotes" class="case-text"></div></div>
  <button class="btn btn-sec" onclick="showSection('emergencySection')">رجوع</button>
</div>

<footer>الإصدار 1.0 — جميع الحقوق محفوظة © 2026<br>تصميم وتطوير الدكتور زكريا محمد عطوني</footer>

<script>
let users=JSON.parse(localStorage.getItem("users")||"[]");
let currentUser=null;

// دخول المدير
function loginAdmin(){
  const pass=document.getElementById("adminPass").value.trim();
  if(pass==="salem1959"){
    currentUser={type:"admin",name:"المدير"};
    showSection("adminSection");
  }else alert("كلمة السر غير صحيحة");
}

// تسجيل طالب
function registerStudent(){
  const n=document.getElementById("regName").value.trim();
  const e=document.getElementById("regEmail").value.trim();
  const p=document.getElementById("regPassword").value.trim();
  if(!n||!e||!p){alert("املأ جميع الحقول");return;}
  if(users.find(u=>u.email===e)){alert("البريد مستخدم");return;}
  users.push({name:n,email:e,password:p,type:"student"});
  localStorage.setItem("users",JSON.stringify(users));
  alert("تم التسجيل");
  showSection("studentLogin");
}

// دخول الطالب
function loginStudent(){
  const e=document.getElementById("loginEmail").value.trim();
  const p=document.getElementById("loginPassword").value.trim();
  const u=users.find(x=>x.email===e&&x.password===p);
  if(!u){alert("بيانات غير صحيحة");return;}
  currentUser=u;
  showSection("studentSection");
}

// فتح الطوارئ
function openEmergency(){loadCases();showSection("emergencySection");}

// قاعدة بيانات الطوارئ
const emergencyCases=JSON.parse(localStorage.getItem("emergencyCases")||"[]");

// تحميل الحالات
function loadCases(){
  const list=document.getElementById("casesList");
  list.innerHTML="";
  emergencyCases.forEach(c=>{
    list.innerHTML+=`<div class="card" onclick="openCase(${c.id})">
      <div class="card-title">${c.name}</div>
      <div class="card-desc">${c.definition}</div>
      <div class="icons"><span>⚠️</span><span>🩺</span><span>⛑️</span></div>
    </div>`;
  });
}

// بحث
function searchCases(){
  const q=document.getElementById("search").value.trim();
  const list=document.getElementById("casesList");
  list.innerHTML="";
  emergencyCases.filter(c=>c.name.includes(q)||c.definition.includes(q))
  .forEach(c=>{
    list.innerHTML+=`<div class="card" onclick="openCase(${c.id})">
      <div class="card-title">${c.name}</div>
      <div class="card-desc">${c.definition}</div>
      <div class="icons"><span>⚠️</span><span>🩺</span><span>⛑️</span></div>
    </div>`;
  });
}

// فتح حالة
function openCase(id){
  const c=emergencyCases.find(x=>x.id===id);
  document.getElementById("caseTitle").innerText=c.name;
  document.getElementById("caseDefinition").innerText=c.definition;
  document.getElementById("caseCauses").innerText=c.causes;
  document.getElementById("caseSigns").innerText=c.signs;
  document.getElementById("caseAid").innerText=c.first_aid;
  document.getElementById("caseNotes").innerText=c.notes;
  showSection("caseSection");
}

// رجوع
function backFromEmergency(){
  if(currentUser?.type==="admin")showSection("adminSection");
  else showSection("studentSection");
}

// عرض قسم
function showSection(id){
  ["mainLogin","adminLogin","studentLogin","registerSection","studentSection","adminSection","emergencySection","caseSection"]
  .forEach(s=>document.getElementById(s).classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

// خروج
function logout(){currentUser=null;showSection("mainLogin");}
</script>

</body></html>
