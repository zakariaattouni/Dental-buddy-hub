<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>DS Assistant – النسخة النهائية</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    * { box-sizing:border-box; }
    body {
        margin:0;
        font-family: Tahoma, Arial;
        background: linear-gradient(135deg, #1e88e5, #42a5f5);
        min-height:100vh;
        padding-top:70px;
        padding-bottom:60px;
        display:flex;
        justify-content:center;
        align-items:flex-start;
    }

    /* الهيدر */
    header {
        position:fixed;
        top:0; left:0; right:0;
        height:60px;
        background:#0d47a1;
        color:#fff;
        display:flex;
        align-items:center;
        justify-content:space-between;
        padding:0 15px;
        font-size:18px;
        font-weight:bold;
        box-shadow:0 2px 8px rgba(0,0,0,0.3);
        z-index:10;
    }

    .header-left {
        display:flex;
        align-items:center;
        gap:10px;
    }

    .app-icon {
        width:32px;
        height:32px;
        background:#fff;
        border-radius:8px;
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:18px;
        color:#0d47a1;
        font-weight:bold;
    }

    /* مؤشر الاتصال */
    .wifi {
        width:18px;
        height:18px;
        border-radius:50%;
        background:#ccc;
    }

    footer {
        position:fixed;
        bottom:0; left:0; right:0;
        height:50px;
        background:#0d47a1;
        color:#bbdefb;
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:12px;
        box-shadow:0 -2px 8px rgba(0,0,0,0.3);
        z-index:10;
    }

    .card {
        width:100%;
        max-width:420px;
        background:#fff;
        padding:22px;
        border-radius:20px;
        box-shadow:0 10px 25px rgba(0,0,0,0.2);
        animation:fadeIn 0.4s ease;
        margin:10px;
    }

    @keyframes fadeIn {
        from { opacity:0; transform:translateY(20px); }
        to   { opacity:1; transform:translateY(0); }
    }

    h2 {
        margin:0 0 15px;
        text-align:center;
        color:#1565c0;
        font-size:22px;
    }

    h3 {
        margin:10px 0;
        color:#1565c0;
        font-size:18px;
    }

    input, textarea {
        width:100%;
        padding:11px;
        margin-top:8px;
        border-radius:12px;
        border:1px solid #b0bec5;
        font-size:14px;
    }

    button {
        width:100%;
        padding:11px;
        margin-top:10px;
        border:none;
        border-radius:12px;
        font-size:15px;
        cursor:pointer;
        font-weight:bold;
    }

    .btn-primary { background:#1e88e5; color:#fff; }
    .btn-secondary { background:#90a4ae; color:#fff; }
    .btn-danger { background:#e53935; color:#fff; }
    .btn-warning { background:#f9a825; color:#fff; }

    .hidden { display:none; }

    .row {
        background:#f5f5f5;
        padding:10px;
        border-radius:12px;
        margin-top:8px;
    }

    .title {
        font-weight:bold;
        color:#1565c0;
        margin-bottom:4px;
    }

    .badge {
        display:inline-block;
        padding:2px 8px;
        border-radius:10px;
        font-size:11px;
        color:#fff;
        margin-left:5px;
    }
    .badge-pending { background:#f9a825; }
    .badge-approved { background:#43a047; }
    .badge-rejected { background:#e53935; }

    .tabs {
        display:flex;
        gap:5px;
        margin-bottom:10px;
        margin-top:5px;
    }

    .tab-btn {
        flex:1;
        padding:8px;
        border:none;
        border-radius:10px;
        background:#bbdefb;
        font-size:13px;
        font-weight:bold;
    }

    .tab-btn.active {
        background:#1e88e5;
        color:#fff;
    }

    .small {
        font-size:12px;
        color:#607d8b;
    }

    .log-item {
        font-size:12px;
        background:#eceff1;
        padding:6px;
        border-radius:8px;
        margin-top:4px;
    }
</style>
</head>

<body>

<!-- الهيدر -->
<header>
    <div class="header-left">
        <div class="app-icon">📘🎧</div>
        DS Assistant
    </div>
    <div id="wifiIndicator" class="wifi"></div>
</header>

<!-- شاشة اختيار الدور -->
<div class="card" id="roleCard">
    <h2>DS Assistant</h2>
    <button class="btn-primary" onclick="showStudentLogin()">دخول الطالب</button>
    <button class="btn-secondary" onclick="showSubscription()">طلب اشتراك جديد</button>
    <button class="btn-secondary" onclick="showAdminLogin()">دخول المدير</button>
</div>

<!-- دخول الطالب -->
<div class="card hidden" id="studentLoginCard">
    <h2>دخول الطالب</h2>
    <input id="studentLoginName" placeholder="اسم الطالب">
    <input id="studentLoginPass" type="password" placeholder="الرقم السري">
    <button class="btn-primary" onclick="loginStudent()">دخول</button>
    <button class="btn-secondary" onclick="showSubscription()">طلب اشتراك جديد</button>
    <button class="btn-secondary" onclick="backToRole()">رجوع</button>
</div>

<!-- طلب اشتراك -->
<div class="card hidden" id="subscriptionCard">
    <h2>طلب اشتراك</h2>
    <input id="subName" placeholder="الاسم الكامل">
    <input id="subPass" type="password" placeholder="الرقم السري">
    <button class="btn-primary" onclick="sendSubscription()">إرسال الطلب</button>
    <button class="btn-secondary" onclick="backToRole()">رجوع</button>
</div>

<!-- واجهة الطالب بعد التفعيل -->
<div class="card hidden" id="studentArea">
    <h2>مرحباً <span id="studentNameLabel"></span></h2>
    <p class="small">تم تفعيل اشتراكك بنجاح.</p>
    <button class="btn-secondary" onclick="studentLogout()">خروج</button>
</div>

<!-- دخول المدير -->
<div class="card hidden" id="adminLoginCard">
    <h2>دخول المدير</h2>
    <input id="adminPass" type="password" placeholder="كلمة السر">
    <button class="btn-primary" onclick="loginAdmin()">دخول</button>
    <button class="btn-secondary" onclick="backToRole()">رجوع</button>
</div>

<!-- لوحة المدير -->
<div class="card hidden" id="adminPanel">
    <h2>لوحة المدير</h2>

    <div class="tabs">
        <button id="tabRequests" class="tab-btn active" onclick="showAdminSection('requestsSection')">طلبات الاشتراك</button>
        <button id="tabStudents" class="tab-btn" onclick="showAdminSection('studentsSection')">الطلاب</button>
        <button id="tabStats" class="tab-btn" onclick="showAdminSection('statsSection')">الإحصائيات</button>
        <button id="tabSettings" class="tab-btn" onclick="showAdminSection('settingsSection')">الإعدادات</button>
        <button id="tabLogs" class="tab-btn" onclick="showAdminSection('logsSection')">السجل</button>
    </div>

    <button class="btn-secondary" onclick="logoutAdmin()">تسجيل خروج</button>

    <!-- طلبات -->
    <div id="requestsSection">
        <h3>طلبات الاشتراك</h3>
        <button class="btn-primary" onclick="loadRequests()">تحديث</button>
        <div id="requestsList"></div>
    </div>

    <!-- الطلاب -->
    <div id="studentsSection" class="hidden">
        <h3>الطلاب المفعلون</h3>
        <button class="btn-primary" onclick="loadApprovedStudents()">تحديث</button>
        <div id="studentsList"></div>
    </div>

    <!-- الإحصائيات -->
    <div id="statsSection" class="hidden">
        <h3>الإحصائيات</h3>
        <div id="statsContent" class="small"></div>
    </div>

    <!-- الإعدادات -->
    <div id="settingsSection" class="hidden">
        <h3>إعدادات المدير</h3>
        <p class="small">كلمة السر الحالية: <b>salem1959</b></p>
    </div>

    <!-- السجل -->
    <div id="logsSection" class="hidden">
        <h3>سجل النشاط</h3>
        <div id="logsList" class="small"></div>
    </div>
</div>

<footer>DS Assistant – نسخة نهائية</footer>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
// إعداد Firebase
const firebaseConfig = {
  apiKey: "AIzaSyCb9VELSLmljq9IKmLZFfJgT3zvq9q22HE",
  authDomain: "diagnosis-6ea4b.firebaseapp.com",
  databaseURL: "https://diagnosis-6ea4b-default-rtdb.firebaseio.com",
  projectId: "diagnosis-6ea4b",
  storageBucket: "diagnosis-6ea4b.firebasestorage.app",
  messagingSenderId: "1014263737561",
  appId: "1:1014263737561:web:ca8affac416227be8862c8"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// مؤشر الاتصال
function checkConnection(){
    const wifi = document.getElementById("wifiIndicator");
    db.ref(".info/connected").on("value", snap=>{
        wifi.style.background = snap.val() ? "#43a047" : "#e53935";
    });
}
checkConnection();

// كلمة سر المدير
const ADMIN_PASSWORD = "salem1959";

// سجل النشاط
let logs = [];
function addLog(text){
    const time = new Date().toLocaleTimeString();
    logs.unshift(time + " - " + text);
    renderLogs();
}
function renderLogs(){
    const box = document.getElementById("logsList");
    box.innerHTML = logs.map(l=>`<div class="log-item">${l}</div>`).join("") || "لا يوجد نشاط.";
}

// إظهار/إخفاء
function hideAll(){
    ["roleCard","studentLoginCard","subscriptionCard","studentArea","adminLoginCard","adminPanel"]
    .forEach(id=>document.getElementById(id).classList.add("hidden"));
}
function backToRole(){ hideAll(); roleCard.classList.remove("hidden"); }
function showStudentLogin(){ hideAll(); studentLoginCard.classList.remove("hidden"); }
function showSubscription(){ hideAll(); subscriptionCard.classList.remove("hidden"); }
function showAdminLogin(){ hideAll(); adminLoginCard.classList.remove("hidden"); }

// إرسال طلب اشتراك
function sendSubscription(){
    const name = subName.value.trim();
    const pass = subPass.value.trim();
    if(!name || !pass){ alert("أدخل البيانات"); return; }
    db.ref("requests").push({name, password:pass, status:"pending"});
    addLog("طلب اشتراك جديد: " + name);
    alert("تم إرسال الطلب");
    backToRole();
}

// دخول الطالب
function loginStudent(){
    const name = studentLoginName.value.trim();
    const pass = studentLoginPass.value.trim();
    db.ref("requests").orderByChild("name").equalTo(name).once("value", snap=>{
        const data = snap.val();
        if(!data){ alert("لا يوجد طلب بهذا الاسم"); return; }
        let ok = false;
        Object.keys(data).forEach(id=>{
            if(data[id].password===pass && data[id].status==="approved") ok = true;
        });
        if(!ok){ alert("الطلب غير مفعل أو الرقم السري خطأ"); return; }
        hideAll();
        studentNameLabel.textContent = name;
        studentArea.classList.remove("hidden");
    });
}
function studentLogout(){ backToRole(); }

// دخول المدير
function loginAdmin(){
    if(adminPass.value===ADMIN_PASSWORD){
        hideAll();
        adminPanel.classList.remove("hidden");
        addLog("دخول المدير");
        showAdminSection('requestsSection');
        loadRequests();
        updateStats();
    } else alert("كلمة السر غير صحيحة");
}
function logoutAdmin(){ addLog("خروج المدير"); backToRole(); }

// تبويبات المدير
function showAdminSection(id){
    ["requestsSection","studentsSection","statsSection","settingsSection","logsSection"]
    .forEach(s=>document.getElementById(s).classList.add("hidden"));
    document.getElementById(id).classList.remove("hidden");

    ["tabRequests","tabStudents","tabStats","tabSettings","tabLogs"]
    .forEach(t=>document.getElementById(t).classList.remove("active"));
    document.getElementById("tab"+id.replace("Section","")).classList.add("active");
}

// تحميل الطلبات
function loadRequests(){
    requestsList.innerHTML = "جاري التحميل...";
    db.ref("requests").once("value", snap=>{
        const data = snap.val() || {};
        let html = "";
        Object.keys(data).forEach(id=>{
            const r = data[id];
            let badge = r.status==="approved" ? "badge-approved" :
                        r.status==="rejected" ? "badge-rejected" : "badge-pending";
            let text = r.status==="approved" ? "مفعل" :
                       r.status==="rejected" ? "مرقن" : "قيد المراجعة";
            html += `
            <div class="row">
                <div class="title">${r.name} <span class="badge ${badge}">${text}</span></div>
                <div class="small">رقم سري: ${r.password}</div>
                <button class="btn-primary" onclick="setRequestStatus('${id}','approved')">تفعيل</button>
                <button class="btn-warning" onclick="setRequestStatus('${id}','rejected')">ترقين</button>
                <button class="btn-danger" onclick="deleteRequest('${id}')">حذف</button>
            </div>`;
        });
        requestsList.innerHTML = html || "لا توجد طلبات";
        updateStats();
    });
}
function setRequestStatus(id, status){
    db.ref("requests/"+id+"/status").set(status);
    addLog("تغيير حالة طلب: "+id+" → "+status);
    loadRequests();
}
function deleteRequest(id){
    if(!confirm("حذف نهائي؟")) return;
    db.ref("requests/"+id).remove();
    addLog("حذف طلب: "+id);
    loadRequests();
}

// الطلاب المفعلون
function loadApprovedStudents(){
    studentsList.innerHTML = "جاري التحميل...";
    db.ref("requests").orderByChild("status").equalTo("approved").once("value", snap=>{
        const data = snap.val() || {};
        let html = "";
        Object.keys(data).forEach(id=>{
            html += `<div class="row"><div class="title">${data[id].name}</div></div>`;
        });
        studentsList.innerHTML = html || "لا يوجد طلاب";
    });
}

// الإحصائيات
function updateStats(){
    db.ref("requests").once("value", snap=>{
        const data = snap.val() || {};
        let total=0, pending=0, approved=0, rejected=0;
        Object.keys(data).forEach(id=>{
            total++;
            if(data[id].status==="pending") pending++;
            if(data[id].status==="approved") approved++;
            if(data[id].status==="rejected") rejected++;
        });
        statsContent.innerHTML = `
            <p>إجمالي الطلبات: <b>${total}</b></p>
            <p>قيد المراجعة: <b>${pending}</b></p>
            <p>مفعلون: <b>${approved}</b></p>
            <p>مرقنون: <b>${rejected}</b></p>
        `;
    });
}

// بدء الجلسة
addLog("بدء جلسة جديدة");
</script>

</body>
</html>
