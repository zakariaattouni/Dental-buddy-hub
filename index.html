<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Dental Buddy Hub - رفيق عيادة الأسنان</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: #ecf9f0; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .app-wrapper { max-width: 1400px; width: 100%; margin: 0 auto; }
        
        /* شاشة الدخول */
        .admin-login-box {
            background: white;
            border-radius: 48px;
            max-width: 400px;
            margin: 2rem auto;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .admin-login-box input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border-radius: 60px;
            border: 1px solid #cbdfd1;
            font-size: 1rem;
            text-align: center;
        }
        .btn { background: #2b9e5e; border: none; padding: 12px; border-radius: 50px; color: white; font-weight: bold; width: 100%; cursor: pointer; }
        
        /* التطبيق الرئيسي */
        .app-main { background: white; border-radius: 40px; overflow: hidden; display: none; }
        .header { background: linear-gradient(135deg,#e0f3e8,#c8e6d9); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo h1 { color: #1f6e43; font-size: 1.6rem; }
        .logout-btn { background: none; border: none; color: #c5452f; font-weight: bold; cursor: pointer; }
        .tabs { display: flex; gap: 0.25rem; background: #f9fefb; padding: 0.5rem 2rem 0 2rem; border-bottom: 1px solid #cde5d4; flex-wrap: wrap; }
        .tab-btn { background: none; border: none; padding: 0.7rem 1.6rem; font-weight: 600; color: #4a6a5e; border-radius: 30px 30px 0 0; cursor: pointer; }
        .tab-btn.active { background: white; color: #1f6e43; border-bottom: 3px solid #2b9e5e; }
        .tab-content { display: none; padding: 2rem; animation: fade 0.2s; }
        .tab-content.active { display: block; }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
        .card { background: #fff; border: 1px solid #e1f0e4; border-radius: 28px; padding: 1.5rem; margin-bottom: 1.8rem; }
        .card-header { display: flex; justify-content: space-between; border-bottom: 2px solid #def0e2; padding-bottom: 0.7rem; margin-bottom: 1.2rem; }
        .btn-primary { background: #2b9e5e; padding: 0.5rem 1.2rem; border-radius: 40px; border: none; color: white; font-weight: 600; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px 5px; border-bottom: 1px solid #eef3ec; text-align: right; }
        .whatsapp-btn { background: #25D366; border: none; color: white; padding: 4px 12px; border-radius: 40px; cursor: pointer; }
        .chat-area { background: #f9fefb; border-radius: 28px; padding: 1rem; }
        .message-bubble { background: #eef6f2; border-radius: 20px; padding: 10px 16px; margin: 8px 0; }
        .user-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #deecdf; }
        .admin-badge { background: #f4e9cd; padding: 2px 12px; border-radius: 30px; font-size: 0.75rem; }
        footer { background: #e9f3ec; text-align: center; padding: 1rem; font-size: 0.7rem; }
        @media (max-width: 700px) { .tabs { padding: 0 1rem; } .tab-btn { padding: 0.5rem 0.8rem; font-size: 0.8rem; } }
    </style>
</head>
<body>
<div class="app-wrapper">
    <!-- شاشة دخول المدير فقط بكلمة السر -->
    <div id="adminLoginScreen" class="admin-login-box">
        <h2>🦷 Dental Buddy Hub</h2>
        <p style="margin-bottom: 1rem;">دخول المدير فقط</p>
        <input type="password" id="adminPassword" placeholder="كلمة السر" autocomplete="off">
        <button class="btn" id="adminLoginBtn">دخول</button>
    </div>

    <!-- التطبيق الرئيسي (بعد الدخول) -->
    <div id="appMain" class="app-main">
        <div class="header">
            <div class="logo"><h1>🦷 Dental Buddy Hub</h1><small>رفيق عيادة الأسنان</small></div>
            <button class="logout-btn" id="logoutBtn">🚪 خروج</button>
        </div>
        <div class="tabs" id="tabsContainer"></div>
        <div id="tabContentsContainer"></div>
        <footer>نظام إدارة العيادة | مساعد طوارئ ذكي محلي</footer>
    </div>
</div>

<script>
    // كلمة السر الثابتة للمدير
    const ADMIN_PASS = "salem1959";
    
    // بيانات الطلاب (محاكاة) – بدون أسماء مسبقة
    let students = JSON.parse(localStorage.getItem('dental_students')) || [];
    // خزن المرضى لكل طالب (سنستخدم خريطة)
    let patientsDB = JSON.parse(localStorage.getItem('dental_patients')) || {}; // { studentId: [patient1, patient2] }
    
    let currentStudentId = null; // عند اختيار طالب من لوحة المدير
    
    // دوال حفظ
    function saveStudents() { localStorage.setItem('dental_students', JSON.stringify(students)); }
    function savePatients() { localStorage.setItem('dental_patients', JSON.stringify(patientsDB)); }
    
    // إضافة طالب جديد (تسجيل)
    function addStudent(name, phone) {
        let id = 's_' + Date.now();
        students.push({ id, name, phone, status: 'active', createdAt: new Date().toISOString() });
        saveStudents();
        if (!patientsDB[id]) patientsDB[id] = [];
        savePatients();
        return id;
    }
    
    // حذف طالب
    function deleteStudent(id) {
        students = students.filter(s => s.id !== id);
        delete patientsDB[id];
        saveStudents();
        savePatients();
        if (currentStudentId === id) currentStudentId = null;
    }
    
    // تبديل حالة الترقين
    function toggleSuspend(id) {
        let student = students.find(s => s.id === id);
        if (student) {
            student.status = student.status === 'active' ? 'suspended' : 'active';
            saveStudents();
        }
    }
    
    // ------------------ واجهة التطبيق (للمدير فقط) ------------------
    let currentTab = 'dashboard';
    
    function renderApp() {
        document.getElementById('adminLoginScreen').style.display = 'none';
        document.getElementById('appMain').style.display = 'block';
        buildTabsAndContents();
        activateTab(currentTab);
    }
    
    function buildTabsAndContents() {
        const tabsContainer = document.getElementById('tabsContainer');
        const contentsContainer = document.getElementById('tabContentsContainer');
        tabsContainer.innerHTML = '';
        contentsContainer.innerHTML = '';
        
        const tabs = [
            { id: 'dashboard', name: '📊 لوحة التحكم' },
            { id: 'patientsManager', name: '📋 سجل المرضى (لجميع الطلاب)' },
            { id: 'assistant', name: '🚨 المساعد الذكي للطوارئ' },
            { id: 'studentsPanel', name: '👥 إدارة الطلاب (ترقين/تفعيل)' }
        ];
        
        tabs.forEach(tab => {
            const btn = document.createElement('button');
            btn.classList.add('tab-btn');
            btn.innerText = tab.name;
            btn.setAttribute('data-tab', tab.id);
            btn.addEventListener('click', () => { activateTab(tab.id); });
            tabsContainer.appendChild(btn);
        });
        
        // إنشاء محتوى كل تبويب
        const dashboardDiv = createDashboardContent(); dashboardDiv.id = 'dashboard'; dashboardDiv.classList.add('tab-content');
        const patientsDiv = createPatientsManagerContent(); patientsDiv.id = 'patientsManager'; patientsDiv.classList.add('tab-content');
        const assistantDiv = createAssistantContent(); assistantDiv.id = 'assistant'; assistantDiv.classList.add('tab-content');
        const studentsDiv = createStudentsPanelContent(); studentsDiv.id = 'studentsPanel'; studentsDiv.classList.add('tab-content');
        
        contentsContainer.appendChild(dashboardDiv);
        contentsContainer.appendChild(patientsDiv);
        contentsContainer.appendChild(assistantDiv);
        contentsContainer.appendChild(studentsDiv);
    }
    
    function activateTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
        const target = document.getElementById(tabId);
        if (target) target.classList.add('active');
        document.querySelectorAll('.tab-btn').forEach(btn => {
            const t = btn.getAttribute('data-tab');
            if (t === tabId) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        currentTab = tabId;
    }
    
    // تبويب لوحة التحكم
    function createDashboardContent() {
        const div = document.createElement('div');
        div.innerHTML = `
            <div class="card">
                <div class="card-header"><h3>📈 ملخص العيادة</h3></div>
                <div style="display:flex; gap:1rem; flex-wrap:wrap;">
                    <div style="flex:1; background:#edf7f0; border-radius:24px; padding:1rem;"><h4>👥 عدد الطلاب</h4><p style="font-size:2rem;" id="statStudents">0</p></div>
                    <div style="flex:1; background:#edf7f0; border-radius:24px; padding:1rem;"><h4>🦷 إجمالي المرضى</h4><p style="font-size:2rem;" id="statPatientsTotal">0</p></div>
                </div>
            </div>
        `;
        const updateStats = () => {
            document.getElementById('statStudents') && (document.getElementById('statStudents').innerText = students.length);
            let totalPatients = 0;
            for (let id in patientsDB) totalPatients += patientsDB[id].length;
            document.getElementById('statPatientsTotal') && (document.getElementById('statPatientsTotal').innerText = totalPatients);
        };
        setTimeout(updateStats, 50);
        return div;
    }
    
    // تبويب إدارة المرضى (للمدير – يعرض كل مرضى كل طالب)
    function createPatientsManagerContent() {
        const div = document.createElement('div');
        div.innerHTML = `<div class="card"><div class="card-header"><h3>📋 قائمة جميع المرضى (حسب الطالب)</h3></div><div id="allPatientsList"></div></div>`;
        function renderAll() {
            const container = div.querySelector('#allPatientsList');
            if (!container) return;
            container.innerHTML = '';
            for (let sid of students) {
                const patients = patientsDB[sid.id] || [];
                const studentDiv = document.createElement('div');
                studentDiv.style.marginBottom = '1.5rem';
                studentDiv.style.border = '1px solid #e0f0e3';
                studentDiv.style.borderRadius = '20px';
                studentDiv.style.padding = '1rem';
                studentDiv.innerHTML = `<h4>👩‍⚕️ الطالب: ${sid.name} (رقم: ${sid.phone}) - ${sid.status === 'active' ? '✅ نشط' : '🔴 مُرقن'}</h4>`;
                if (patients.length === 0) {
                    studentDiv.innerHTML += '<p>لا يوجد مرضى مسجلين لهذا الطالب.</p>';
                } else {
                    let table = '<table><thead><tr><th>اسم المريض</th><th>التشخيص</th><th>رقم واتساب</th><th>إجراء</th></tr></thead><tbody>';
                    patients.forEach(p => {
                        table += `<tr><td>${p.name}</td><td>${p.diagnosis || '-'}</td><td>${p.phone}</td><td><button class="whatsapp-btn" data-phone="${p.phone}" data-name="${p.name}">📱 تذكير</button></td></tr>`;
                    });
                    table += '</tbody></table>';
                    studentDiv.innerHTML += table;
                }
                container.appendChild(studentDiv);
            }
            // إضافة أحداث أزرار الواتساب
            container.querySelectorAll('.whatsapp-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const name = btn.getAttribute('data-name');
                    alert(`📲 سيتم فتح واتساب لتذكير المريض ${name}`);
                });
            });
        }
        renderAll();
        // تحديث عند تغيير البيانات (سيتم استدعاء إعادة التصيير)
        const observer = new MutationObserver(() => renderAll());
        observer.observe(div, { childList: true, subtree: true });
        return div;
    }
    
    // المساعد الذكي (كما هو)
    function createAssistantContent() {
        const div = document.createElement('div');
        div.innerHTML = `
            <div class="card">
                <div class="card-header"><h3>🚑 مساعد الطوارئ الذكي (محلي، فصحى وعامية)</h3></div>
                <div id="assistantChat" style="background:#f8fefb; border-radius:24px; padding:1rem;">
                    <div id="chatMessages" style="height:200px; overflow-y:auto; margin-bottom:1rem;"></div>
                    <div style="display:flex;"><input type="text" id="emergencyInput" placeholder="مثال: المريض ينزف بشدة..." style="flex:1; padding:10px; border-radius:60px; border:1px solid #cde5d4;"><button id="sendEmergBtn" class="btn-primary">استشارة</button></div>
                    <div style="margin-top:10px; display:flex; gap:8px; flex-wrap:wrap;">
                        <button class="btn-outline-light" data-quick="نزيف حاد بعد القلع">🩸 نزيف</button>
                        <button class="btn-outline-light" data-quick="المريض غاب عن الوعي">😵 إغماء</button>
                        <button class="btn-outline-light" data-quick="كسر الإبرة داخل الفم">⚠️ كسر إبرة</button>
                    </div>
                </div>
            </div>
        `;
        const emergencyDB = [
            { keywords: ["نزيف","ينزف","دم"], steps: "🩸 اضغط بشاش معقم 5 دقائق، استخدم إسفنجة جيلاتين، لا للمضمضة. استدع مشرفاً إذا استمر." },
            { keywords: ["اغمى","غاب عن الوعي","فقد وعيه"], steps: "😵 افتح المجرى الهوائي، ارفع الرجلين، أرخِ الملابس، نادِ مشرفاً فوراً." },
            { keywords: ["كسر الإبرة","الأبرة اتكسرت"], steps: "⚠️ لا تحاول بالإصبع، ثبّت المريض، استخدم ملقط معقم، أشعة، استدعاء جراح." },
            { keywords: ["حساسية","لاتكس","تورم"], steps: "🤚 أزل القفازات، مضاد هيستامين، مراقبة التنفس، استدع مشرفاً." }
        ];
        function smartReply(text) {
            let lower = text.toLowerCase();
            for(let e of emergencyDB) {
                if(e.keywords.some(kw => lower.includes(kw))) return e.steps + "\n🏥 تابع الحالة واستشر مشرفاً.";
            }
            return "⚠️ لم نتعرف على الحالة. اشرح أكثر (نزيف/إغماء/كسر). إذا كانت خطيرة اتصل بالمشرف.";
        }
        const chatDiv = div.querySelector('#chatMessages');
        function addMsg(txt, isUser) {
            const msg = document.createElement('div');
            msg.className = 'message-bubble';
            msg.style.textAlign = isUser ? 'left' : 'right';
            msg.style.background = isUser ? '#daf4e4' : '#ffffff';
            msg.innerHTML = `<strong>${isUser ? 'أنت' : 'المساعد'}:</strong> ${txt}`;
            chatDiv.appendChild(msg);
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }
        const input = div.querySelector('#emergencyInput');
        const sendBtn = div.querySelector('#sendEmergBtn');
        const sendHandler = () => {
            let val = input.value.trim();
            if(!val) return;
            addMsg(val, true);
            const reply = smartReply(val);
            addMsg(reply, false);
            input.value = '';
        };
        sendBtn.addEventListener('click', sendHandler);
        input.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendHandler(); });
        div.querySelectorAll('[data-quick]').forEach(btn => {
            btn.addEventListener('click', () => {
                input.value = btn.getAttribute('data-quick');
                sendHandler();
            });
        });
        addMsg("مرحباً! أنا مساعد الطوارئ. صف المشكلة (نزيف، إغماء، كسر أداة...).", false);
        return div;
    }
    
    // تبويب إدارة الطلاب (ترقين/تفعيل + إضافة طالب)
    function createStudentsPanelContent() {
        const div = document.createElement('div');
        function renderStudents() {
            div.innerHTML = `
                <div class="card">
                    <div class="card-header"><h3>➕ إضافة طالب جديد</h3></div>
                    <div style="display:flex; gap:0.5rem; flex-wrap:wrap;">
                        <input type="text" id="newStudentName" placeholder="اسم الطالب" style="flex:1; padding:8px; border-radius:40px; border:1px solid #ccc;">
                        <input type="tel" id="newStudentPhone" placeholder="رقم الهاتف" style="flex:1; padding:8px; border-radius:40px; border:1px solid #ccc;">
                        <button id="addStudentBtn" class="btn-primary">إضافة</button>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header"><h3>👥 قائمة الطلاب (ترقين / تفعيل)</h3></div>
                    <div id="studentsList"></div>
                </div>
            `;
            const listDiv = div.querySelector('#studentsList');
            if (listDiv) {
                listDiv.innerHTML = '';
                students.forEach(std => {
                    const row = document.createElement('div');
                    row.className = 'user-row';
                    row.innerHTML = `
                        <div><strong>${std.name}</strong> (${std.phone}) <span class="admin-badge">${std.status === 'active' ? 'نشط' : 'مُرقن'}</span></div>
                        <div>
                            <button class="btn-primary" data-toggle="${std.id}" style="background:#e76f51; margin-left:6px;">${std.status === 'active' ? '🔴 ترقين' : '🟢 تفعيل'}</button>
                            <button class="btn-primary" data-delete="${std.id}" style="background:#aaa;">🗑 حذف</button>
                        </div>
                    `;
                    listDiv.appendChild(row);
                });
                // ربط الأحداث
                div.querySelectorAll('[data-toggle]').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const id = btn.getAttribute('data-toggle');
                        toggleSuspend(id);
                        renderStudents();
                    });
                });
                div.querySelectorAll('[data-delete]').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        if(confirm('حذف الطالب سيؤدي إلى حذف جميع مرضاه. هل أنت متأكد؟')) {
                            const id = btn.getAttribute('data-delete');
                            deleteStudent(id);
                            renderStudents();
                        }
                    });
                });
            }
            const addBtn = div.querySelector('#addStudentBtn');
            if(addBtn) {
                addBtn.addEventListener('click', () => {
                    const name = div.querySelector('#newStudentName').value.trim();
                    const phone = div.querySelector('#newStudentPhone').value.trim();
                    if(name && phone) {
                        addStudent(name, phone);
                        div.querySelector('#newStudentName').value = '';
                        div.querySelector('#newStudentPhone').value = '';
                        renderStudents();
                    } else alert('يرجى إدخال الاسم ورقم الهاتف');
                });
            }
        }
        renderStudents();
        return div;
    }
    
    // تسجيل الدخول
    document.getElementById('adminLoginBtn').addEventListener('click', () => {
        const pass = document.getElementById('adminPassword').value;
        if (pass === ADMIN_PASS) {
            renderApp();
        } else {
            alert('كلمة السر غير صحيحة');
        }
    });
    
    document.getElementById('logoutBtn')?.addEventListener('click', () => {
        localStorage.clear(); // اختياري، مسح الجلسة
        location.reload();
    });
    
    // إضافة بيانات تجريبية أولية (للتجربة فقط) - بدون أسماء حقيقية
    if (students.length === 0) {
        addStudent('طالب تجريبي 1', '0550000001');
        addStudent('طالب تجريبي 2', '0550000002');
        // إضافة بعض المرضى
        let s1 = students[0]?.id;
        let s2 = students[1]?.id;
        if(s1) patientsDB[s1] = [{ name: 'مريض أول', phone: '0501111111', diagnosis: 'حشو عصب' }];
        if(s2) patientsDB[s2] = [{ name: 'مريض ثان', phone: '0502222222', diagnosis: 'قلع ضرس' }];
        savePatients();
    }
</script>
</body>
</html>
