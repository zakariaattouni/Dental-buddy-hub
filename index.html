<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><title>DS Assistant</title><meta name="viewport" content="width=device-width,initial-scale=1"><style>
body{font-family:Tahoma,Arial;background:#e3edf7;margin:0;padding:16px}
.card{background:#e3edf7;padding:18px;margin-bottom:18px;border-radius:20px;box-shadow:8px 8px 16px #c2ccd8,-8px -8px 16px #fff}
h3{margin:0;color:#1e3a5f}
button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:12px;background:#1e88e5;color:#fff;font-size:15px;cursor:pointer;box-shadow:4px 4px 10px #c2ccd8,-4px -4px 10px #fff}
button:active{box-shadow:inset 4px 4px 10px #c2ccd8,inset -4px -4px 10px #fff}
input{width:100%;padding:10px;margin-top:8px;border-radius:12px;border:none;background:#e3edf7;box-shadow:inset 4px 4px 10px #c2ccd8,inset -4px -4px 10px #fff}
.hidden{display:none}
.app-shell{display:flex;gap:10px}
.sidebar{width:190px;min-height:100vh;background:#e3edf7;border-radius:20px;box-shadow:8px 8px 16px #c2ccd8,-8px -8px 16px #fff;padding:14px}
.logo-svg{width:70px;height:70px;margin-bottom:6px}
.logo-title{font-weight:bold;color:#1e3a5f;font-size:18px}
.badge{display:inline-block;padding:4px 10px;border-radius:999px;background:#1e88e5;color:#fff;font-size:11px;margin-top:6px}
.accordion-title{width:100%;background:#e3edf7;color:#1e3a5f;padding:10px;border-radius:12px;border:none;font-size:14px;cursor:pointer;box-shadow:4px 4px 10px #c2ccd8,-4px -4px 10px #fff}
.accordion-content{margin-top:6px;padding:10px;border-radius:12px;background:#e3edf7;box-shadow:inset 4px 4px 10px #c2ccd8,inset -4px -4px 10px #fff;font-size:13px;display:none}
</style></head><body>

<!-- حالة الاتصال -->
<div style="display:flex;align-items:center;gap:10px;margin-bottom:15px">
<div id="statusDot" style="width:14px;height:14px;border-radius:50%;background:#aaa"></div>
<span id="statusText" style="font-size:14px;color:#444">جاري التحقق من الاتصال...</span>
</div>

<!-- الصفحة الرئيسية -->
<div id="home" class="card">
<div style="text-align:center">
<svg class="logo-svg" viewBox="0 0 100 100">
<rect x="8" y="8" width="84" height="84" rx="22" fill="#e3edf7" stroke="#1e88e5" stroke-width="2"/>
<rect x="26" y="28" width="22" height="40" rx="3" fill="#fff" stroke="#1e88e5" stroke-width="1.5"/>
<rect x="52" y="28" width="22" height="40" rx="3" fill="#fff" stroke="#1e88e5" stroke-width="1.5"/>
</svg>
<div class="logo-title">DS Assistant</div>
</div>
<button onclick="showAdminLogin()">دخول المدير</button>
<button onclick="showUserLogin()">دخول الطالب</button>
<button onclick="showRegister()">تسجيل حساب جديد</button>
</div>

<!-- دخول المدير -->
<div id="adminLogin" class="card hidden">
<h3>دخول المدير</h3>
<input id="adminPass" type="password" placeholder="كلمة السر">
<button onclick="adminLogin()">دخول</button>
<button onclick="goHome()">رجوع</button>
</div>

<!-- دخول الطالب -->
<div id="userLogin" class="card hidden">
<h3>دخول الطالب</h3>
<input id="userEmail" type="email" placeholder="البريد الإلكتروني">
<input id="userPass" type="password" placeholder="كلمة السر">
<button onclick="loginUser()">دخول</button>
<button onclick="showRegister()">إنشاء حساب جديد</button>
<button onclick="goHome()">رجوع</button>
</div>

<!-- تسجيل طالب + زر اختبار -->
<div id="register" class="card hidden">
<h3>إنشاء حساب طالب</h3>

<input id="regName" placeholder="الاسم الكامل">
<input id="regEmail" type="email" placeholder="البريد الإلكتروني">
<input id="regPass" type="password" placeholder="كلمة السر">

<!-- زر الاختبار -->
<button onclick="alert('زر الاختبار يعمل ✔')">اختبار</button>

<button onclick="registerUser()">تسجيل</button>
<button onclick="showUserLogin()">رجوع</button>
</div>

<!-- غلاف التطبيق -->
<div id="appShell" class="app-shell hidden">
<div class="sidebar">
<svg class="logo-svg" viewBox="0 0 100 100">
<rect x="8" y="8" width="84" height="84" rx="22" fill="#e3edf7" stroke="#1e88e5" stroke-width="2"/>
<rect x="26" y="28" width="22" height="40" rx="3" fill="#fff" stroke="#1e88e5" stroke-width="1.5"/>
<rect x="52" y="28" width="22" height="40" rx="3" fill="#fff" stroke="#1e88e5" stroke-width="1.5"/>
</svg>
<button onclick="showSection('dashboard')">الرئيسية</button>
<button onclick="showSection('settings')">الإعدادات</button>
<button onclick="showSection('about')">عن التطبيق</button>
<button onclick="logout()">تسجيل الخروج</button>
</div>

<div style="flex:1">

<!-- لوحة المدير -->
<div id="adminPanel" class="hidden card">
<h3>لوحة المدير <span class="badge">Admin</span></h3>
<div id="requestsList"></div>
<button onclick="loadRequests()">تحديث الطلبات</button>
</div>

<!-- لوحة الطالب -->
<div id="studentPanel" class="hidden card">
<h3>لوحة الطالب <span class="badge">Student</span></h3>
<button onclick="toggleEmergencies()">موسوعة الطوارئ</button>
<div id="emergenciesCard" class="hidden">
<div id="accordionContainer"></div>
</div>
</div>

<!-- الإعدادات -->
<div id="settingsPage" class="hidden card">
<h3>الإعدادات</h3>
<div>اللغة: <b>العربية</b></div>
</div>

<!-- عن التطبيق -->
<div id="aboutPage" class="hidden card">
<h3>عن التطبيق</h3>
<div>تطبيق DS Assistant — دليل ذكي لطلاب طب الأسنان.</div>
</div>

</div>
</div>

<footer style="text-align:center;margin-top:20px;font-size:13px;color:#333">تصميم وتطوير الدكتور زكريا محمد عطوني</footer>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
// Firebase
firebase.initializeApp({
apiKey:"AIzaSyCb9VELSLmljq9IKmLZFfJgT3zvq9q22HE",
authDomain:"diagnosis-6ea4b.firebaseapp.com",
databaseURL:"https://diagnosis-6ea4b-default-rtdb.firebaseio.com",
projectId:"diagnosis-6ea4b",
storageBucket:"diagnosis-6ea4b.firebasestorage.app",
messagingSenderId:"1014263737561",
appId:"1:1014263737561:web:ca8affac416227be8862c8"
});
const db=firebase.database();

// اتصال
db.ref(".info/connected").on("value",s=>{
statusDot.style.background=s.val()?"#00c853":"#d50000";
statusText.textContent=s.val()?"متصل بـ Firebase":"غير متصل بـ Firebase";
});

// تنقل
function hideAll(){home.classList.add("hidden");adminLogin.classList.add("hidden");userLogin.classList.add("hidden");register.classList.add("hidden");appShell.classList.add("hidden")}
function goHome(){hideAll();home.classList.remove("hidden")}
function showAdminLogin(){hideAll();adminLogin.classList.remove("hidden")}
function showUserLogin(){hideAll();userLogin.classList.remove("hidden")}
function showRegister(){hideAll();register.classList.remove("hidden")}

// مدير
function adminLogin(){
if(adminPass.value==="salem1959"){
hideAll();appShell.classList.remove("hidden");adminPanel.classList.remove("hidden");loadRequests();
}else alert("خطأ في كلمة السر")
}

// تسجيل طالب
function registerUser(){
console.log("تم الضغط على زر التسجيل ✔");

const n=regName.value.trim(),e=regEmail.value.trim(),p=regPass.value.trim();
if(!n||!e||!p){alert("يرجى تعبئة جميع الحقول");return}

firebase.auth().createUserWithEmailAndPassword(e,p).then(c=>{
db.ref("DS-Assistant/requests/"+c.user.uid).set({name:n,email:e,status:"pending"}).then(()=>{
alert("تم إرسال طلب التسجيل");firebase.auth().signOut();showUserLogin();
});
}).catch(err=>alert("خطأ Firebase: "+err.message));
}

// دخول طالب
function loginUser(){
firebase.auth().signInWithEmailAndPassword(userEmail.value,userPass.value).then(c=>{
db.ref("DS-Assistant/users/"+c.user.uid).once("value",s=>{
if(s.exists()){
hideAll();appShell.classList.remove("hidden");studentPanel.classList.remove("hidden");buildEmergencies();
}else{
alert("بانتظار موافقة المدير");firebase.auth().signOut();
}
});
}).catch(err=>alert(err.message));
}

// طلبات
function loadRequests(){
requestsList.innerHTML="";
db.ref("DS-Assistant/requests").once("value",snap=>{
snap.forEach(ch=>{
const r=ch.val(),uid=ch.key;
requestsList.innerHTML+=`<div><b>${r.name}</b> (${r.email})<br>
<button onclick="approve('${uid}','${r.name}','${r.email}')">تفعيل</button>
<button onclick="delReq('${uid}')">حذف</button></div>`;
});
});
}
function approve(uid,n,e){
db.ref("DS-Assistant/users/"+uid).set({name:n,email:e,role:"student"});
db.ref("DS-Assistant/requests/"+uid).remove();
loadRequests();
}
function delReq(uid){db.ref("DS-Assistant/requests/"+uid).remove();loadRequests()}

// الطوارئ
const emergencies=[
{t:"صدمة تحسسية",d:"تورم وصعوبة تنفس"},
{t:"هبوط ضغط",d:"دوار وضعف"},
{t:"إغماء",d:"فقدان وعي"},
{t:"نوبة قلبية",d:"ألم صدري"},
{t:"سكتة دماغية",d:"ضعف مفاجئ"},
{t:"توقف تنفس",d:"انقطاع كامل"},
{t:"توقف قلب",d:"غياب النبض"},
{t:"نوبة ربو",d:"صفير وضيق"},
{t:"نزيف فموي",d:"نزيف بعد خلع"},
{t:"انسداد مجرى الهواء",d:"اختناق"}
];
function buildEmergencies(){
if(accordionContainer.dataset.built)return;
emergencies.forEach((x,i)=>{
accordionContainer.innerHTML+=`<button class="accordion-title" onclick="toggleAcc(${i})">${i+1}. ${x.t}</button><div id="acc${i}" class="accordion-content">${x.d}</div>`;
});
accordionContainer.dataset.built=1;
}
function toggleAcc(i){
document.querySelectorAll(".accordion-content").forEach(e=>e.style.display="none");
const c=document.getElementById("acc"+i);
c.style.display=c.style.display==="block"?"none":"block";
}
function toggleEmergencies(){emergenciesCard.classList.toggle("hidden")}

// خروج
function logout(){firebase.auth().signOut();goHome()}
</script>
</body></html>
