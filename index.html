<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DS ASSISTANCE - مساعد الطالب الطبيب</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: #ecf9f0; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .wrapper { max-width: 1400px; width: 100%; margin: 0 auto; }
        .login-card {
            background: white;
            border-radius: 48px;
            max-width: 400px;
            margin: 2rem auto;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .role-buttons { display: flex; gap: 1rem; margin: 1rem 0; }
        .role-btn { flex: 1; padding: 12px; border-radius: 60px; border: none; background: #e0f3e8; color: #1f6e43; font-weight: bold; cursor: pointer; }
        .role-btn.active { background: #2b9e5e; color: white; }
        .login-field { display: none; margin-top: 1rem; }
        .login-field input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 60px; border: 1px solid #cbdfd1; }
        .register-field { margin-top: 1rem; border-top: 1px solid #cbdfd1; padding-top: 1rem; }
        .btn { background: #2b9e5e; border: none; padding: 12px; border-radius: 50px; color: white; font-weight: bold; width: 100%; cursor: pointer; margin-top: 8px; }
        .btn-outline { background: transparent; border: 1px solid #2b9e5e; color: #2b9e5e; }
        .error { color: #c5452f; margin-top: 8px; font-size: 0.85rem; }
        .app-main { background: white; border-radius: 40px; overflow: hidden; display: none; }
        .header { background: linear-gradient(135deg,#e0f3e8,#c8e6d9); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .logo h1 { color: #1f6e43; font-size: 1.8rem; display: flex; align-items: center; gap: 8px; }
        .logo h1::before { content: "🦷"; }
        .logout-btn { background: none; border: none; color: #c5452f; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .student-dashboard { padding: 1.5rem; }
        .welcome { background: #e0f3e8; border-radius: 30px; padding: 1rem; text-align: center; margin-bottom: 1.5rem; }
        .big-buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.8rem; margin-bottom: 1.5rem; }
        .big-btn { background: white; border: 2px solid #2b9e5e; border-radius: 25px; padding: 1rem 0.3rem; text-align: center; cursor: pointer; transition: 0.2s; font-weight: bold; font-size: 1rem; color: #1f6e43; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .big-btn span:first-child { font-size: 1.6rem; }
        .big-btn:hover { background: #2b9e5e; color: white; transform: translateY(-2px); }
        .content-area { background: #f9fefb; border-radius: 30px; padding: 1rem; border: 1px solid #cde5d4; min-height: 300px; }
        .card { background: #fff; border: 1px solid #e1f0e4; border-radius: 24px; padding: 1rem; margin-bottom: 1rem; }
        .btn-primary { background: #2b9e5e; padding: 6px 12px; border-radius: 30px; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 0.8rem; }
        .btn-danger { background: #e76f51; }
        .btn-whatsapp { background: #25D366; }
        .table-responsive { overflow-x: auto; -webkit-overflow-scrolling: touch; margin-bottom: 0.5rem; }
        table { width: 100%; min-width: 500px; border-collapse: collapse; font-size: 0.85rem; }
        th, td { padding: 8px 6px; border-bottom: 1px solid #eef3ec; text-align: right; white-space: nowrap; }
        .emergency-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 0.6rem; margin-bottom: 1rem; max-height: 400px; overflow-y: auto; padding: 0.2rem; }
        .emergency-card { background: #fff; border: 1px solid #cde5d4; border-radius: 18px; padding: 0.6rem; text-align: center; cursor: pointer; transition: 0.2s; font-size: 0.8rem; }
        .emergency-card strong { display: block; }
        .message-bubble { background: #eef6f2; border-radius: 18px; padding: 8px 12px; margin: 6px 0; font-size: 0.85rem; }
        .todo-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #e1f0e4; }
        .todo-text { flex: 1; margin-right: 8px; font-size: 0.9rem; }
        .todo-text.completed { text-decoration: line-through; color: #888; }
        .todo-actions button { margin-right: 6px; background: none; border: none; cursor: pointer; font-size: 1rem; }
        footer { background: #e9f3ec; text-align: center; padding: 0.8rem; font-size: 0.7rem; margin-top: 1rem; }
        @media (max-width: 700px) {
            .student-dashboard { padding: 1rem; }
            .big-buttons { grid-template-columns: repeat(2, 1fr); gap: 0.6rem; }
            .big-btn { padding: 0.8rem 0.2rem; font-size: 0.9rem; }
            .big-btn span:first-child { font-size: 1.4rem; }
            .content-area { padding: 0.8rem; }
            table { font-size: 0.75rem; min-width: 450px; }
            .emergency-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); max-height: 350px; }
        }
    </style>
</head>
<body>
<div class="wrapper">
    <div id="loginScreen" class="login-card">
        <h2>DS ASSISTANCE</h2>
        <p>مساعد الطالب الطبيب</p>
        <div class="role-buttons">
            <button id="adminRoleBtn" class="role-btn active">👨‍⚕️ مدير</button>
            <button id="studentRoleBtn" class="role-btn">👩‍🎓 طالب</button>
        </div>
        <div id="adminLoginFields" class="login-field">
            <input type="password" id="adminPassword" placeholder="كلمة السر">
        </div>
        <div id="studentLoginFields" class="login-field" style="display:none;">
            <input type="tel" id="studentPhone" placeholder="رقم الهاتف">
            <input type="password" id="studentPassword" placeholder="كلمة السر">
        </div>
        <button id="loginActionBtn" class="btn">دخول</button>
        <div id="loginError" class="error"></div>
        <div class="register-field">
            <button id="showRegisterBtn" class="btn btn-outline">📝 تسجيل طالب جديد</button>
            <div id="registerForm" style="display: none; margin-top: 1rem;">
                <input type="text" id="regName" placeholder="الاسم الكامل" style="width:100%; padding:10px; margin:5px 0; border-radius:40px; border:1px solid #ccc;">
                <input type="tel" id="regPhone" placeholder="رقم الهاتف" style="width:100%; padding:10px; margin:5px 0; border-radius:40px; border:1px solid #ccc;">
                <input type="password" id="regPassword" placeholder="كلمة السر" style="width:100%; padding:10px; margin:5px 0; border-radius:40px; border:1px solid #ccc;">
                <button id="doRegisterBtn" class="btn">تسجيل</button>
                <div id="regError" class="error"></div>
            </div>
        </div>
    </div>

    <div id="appMain" class="app-main">
        <div class="header">
            <div class="logo"><h1>DS ASSISTANCE</h1><small id="userRoleLabel"></small></div>
            <button class="logout-btn" id="logoutBtn">🚪 خروج</button>
        </div>
        <div id="dynamicContent"></div>
        <footer>نظام إدارة العيادة | مساعد طوارئ ذكي محلي | دعم 50+ حالة</footer>
    </div>
</div>

<script>
    // ------------------- بيانات التخزين -------------------
    let students = JSON.parse(localStorage.getItem('ds_students')) || [];
    let patientsDB = JSON.parse(localStorage.getItem('ds_patients')) || {};
    let todosDB = JSON.parse(localStorage.getItem('ds_todos')) || {};
    
    function saveStudents() { localStorage.setItem('ds_students', JSON.stringify(students)); }
    function savePatients() { localStorage.setItem('ds_patients', JSON.stringify(patientsDB)); }
    function saveTodos() { localStorage.setItem('ds_todos', JSON.stringify(todosDB)); }
    
    function addStudent(name, phone, password, status = 'active') {
        if (students.find(s => s.phone === phone)) return false;
        const id = 's_' + Date.now();
        students.push({ id, name, phone, password, status });
        saveStudents();
        if (!patientsDB[id]) patientsDB[id] = [];
        if (!todosDB[id]) todosDB[id] = [];
        savePatients();
        saveTodos();
        return true;
    }
    
    function deleteStudent(id) {
        students = students.filter(s => s.id !== id);
        delete patientsDB[id];
        delete todosDB[id];
        saveStudents();
        savePatients();
        saveTodos();
    }
    
    function toggleSuspend(id) {
        const student = students.find(s => s.id === id);
        if (student) student.status = student.status === 'active' ? 'suspended' : 'active';
        saveStudents();
    }
    
    function addPatientToStudent(studentId, name, phone, diagnosis) {
        if (!patientsDB[studentId]) patientsDB[studentId] = [];
        patientsDB[studentId].push({ name, phone, diagnosis: diagnosis || '', addedAt: new Date() });
        savePatients();
    }
    
    function deletePatient(studentId, index) {
        if (patientsDB[studentId]) patientsDB[studentId].splice(index, 1);
        savePatients();
    }
    
    function addTodo(studentId, text) {
        if (!todosDB[studentId]) todosDB[studentId] = [];
        todosDB[studentId].push({ text: text, completed: false });
        saveTodos();
    }
    function toggleTodo(studentId, index) {
        if (todosDB[studentId] && todosDB[studentId][index]) {
            todosDB[studentId][index].completed = !todosDB[studentId][index].completed;
            saveTodos();
        }
    }
    function deleteTodo(studentId, index) {
        if (todosDB[studentId]) {
            todosDB[studentId].splice(index, 1);
            saveTodos();
        }
    }
    
    // ------------------- 50 حالة طوارئ -------------------
    const emergencyCases = [
        { title: "نزيف حاد بعد القلع", steps: "🩸 اضغط بشاش معقم بقوة 5 دقائق، استخدم إسفنجة جيلاتين، لا مضمضة، استدع مشرفاً إذا استمر." },
        { title: "إغماء المريض", steps: "😵 افتح المجرى الهوائي، ارفع الرجلين، أرخِ الملابس، نادِ مشرفاً، أعطِ أكسجين." },
        { title: "كسر إبرة تخدير", steps: "⚠️ لا تحاول الإخراج، ثبّت المريض، استخدم ملقط معقم إذا ظاهر، أشعة، استدع مشرفاً." },
        { title: "حساسية لاتكس", steps: "🤚 أزل القفازات، استخدم قفازات خالية من اللاتكس، مضاد هيستامين، راقب التنفس، استدع مشرفاً." },
        { title: "انكسار أداة ضمن القناة", steps: "🛠️ لا تحاول الإخراج بدون تصوير، أشعة فورية، أبلغ المشرف، لا تكمل العلاج." },
        { title: "ابتلاع أداة صغيرة", steps: "⚠️ تهدئة المريض، لا تسبب تقيؤ، أشعة صدر وبطن فوراً، استدع مشرفاً وجراحة." },
        { title: "احتراق كيميائي", steps: "🔥 اغسل بكمية كبيرة من الماء 20 دقيقة، انزع القفازات الملوثة، استدع مشرفاً، سجل المادة." },
        { title: "طفل غير متعاون", steps: "🧸 تقنية أخبر-أظهر-نفذ، كافئ السلوك، تثبيت لطيف مع موافقة ولي الأمر." },
        { title: "جرح لسان عميق", steps: "👅 نظف بمحلول ملحي، اضغط بشاش، إذا لا يتوقف نزيف أرسل للمستشفى لخياطة." },
        { title: "جرح شفة نافذ", steps: "👄 نظف، ضغط بارد، أرسل للمستشفى لخياطة إذا كان نافذاً." },
        { title: "خدر العصب الوجهي", steps: "😐 طمئن المريض، عادة مؤقت بسبب التخدير، راقب التنفس، أبلغ المشرف." },
        { title: "تجاوز ذروة السن بالمواد", steps: "📏 أشعة، لا تحاول الإزالة، أبلغ المشرف، راقب أعراض التهاب." },
        { title: "انثقاب الجيب الفكي", steps: "🕳️ لا تنظف القناة، لا ضغط هواء، مضاد حيوي، تجنب العطس، أرسل للمشرف." },
        { title: "خلع سن مؤقت في غير وقته", steps: "🦷 لا تقلعه، طمئن الطفل، طبّق ضغط بارد، استشر المشرف لتركيب حافظ مسافة." },
        { title: "كسر تاج سن حي", steps: "🦷 احفظ القطعة في حليب بارد، قم بتغطية السن بالكالسيوم هيدروكسيد، أرسل لترميم." },
        { title: "نزيف تحت اللسان (ورم دموي)", steps: "🩸 ضغط بارد، مراقبة مجرى الهواء، إذا كبر أرسل للمستشفى." },
        { title: "قلع ضرس مع جيوب صديدية", steps: "🦠 أعطِ مضاد حيوي قبل وبعد القلع، نظف الجيب بلطف، استدع مشرفاً." },
        { title: "كسر الفك السفلي المشتبه", steps: "🦴 ثبّت الفك برباط، ضغط بارد، أشعة بانورامية، إحالة فورية." },
        { title: "خلع جزئي للسن (النزوح)", steps: "🦷 حاول إعادة وضعه بلطف، ثبّته، أشعة، أرسل لأخصائي." },
        { title: "انسداد مجرى الهواء بجسم غريب", steps: "🚨 مناورة هايمليش، اتصل بالإسعاف، لا تترك المريض." },
        { title: "نوبة صرع داخل العيادة", steps: "⚡ أزل الأدوات من الفم، ضع المريض على جانبه، لا تضع شيئاً بين أسنانه، اتصل بالإسعاف." },
        { title: "صدمة الحساسية (Anaphylaxis)", steps: "💉 أدرينالين (حقنة) فوراً، أكسجين، استلقاء، إسعاف، إنعاش." },
        { title: "ارتفاع ضغط الدم الحاد", steps: "📈 أريح المريض، لا تعالج تحت الضغط، قس الضغط، استدع مشرفاً." },
        { title: "نقص سكر الدم (هبوط سكر)", steps: "🍬 أعط محلول سكري فموي إذا واعي، أو جلوكوز وريدي، استدع مشرفاً." },
        { title: "تفاعل وعائي مبهمي", steps: "😰 استلقِ وارفع الرجلين، سوائل وريدية، أتروبين إذا بطء قلب." },
        { title: "تخدير زائد (سمية المخدر)", steps: "💊 أكسجين، بنزوديازبين للتشنجات، دعم حيوي، استدع مشرفاً." },
        { title: "كسر طرف بروي داخل القناة", steps: "🦷 لا تحاول إزالتها بدون ميكروسكوب، أشعة، أحيل للمختص." },
        { title: "تمزق أربطة المفصل الفكي", steps: "🦴 راحة، أدوية مضادة للالتهاب، أطعمة طرية، تحويل لأخصائي الفك." },
        { title: "خلع جزئي للمفصل الفكي", steps: "🦷 لا تحاول الرد، ضماد داعم، استدع مشرفاً أو أخصائي." },
        { title: "نزيف من شرايين قاع الفم", steps: "🩸 ضغط قوي داخل الفم، استدع مشرفاً فوراً، جهز للجراحة." },
        { title: "حرق اللثة بالماء الساخن", steps: "🔥 ماء بارد، جل تبريد، مسكن ألم، متابعة." },
        { title: "دخول جسم غريب تحت اللثة", steps: "🔍 أشعة، إزالة بمشرط معقم، غسل بمحلول ملحي." },
        { title: "تمزق لجام الشفة العليا", steps: "👄 نظف، ضغط، إذا عميق خياطة، استدع مشرفاً." },
        { title: "تفتت ضرس العقل أثناء الخلع", steps: "🦷 أزل القطع الكبيرة، أشعة للبحث عن الباقي، استدع مشرفاً." },
        { title: "خراج حول اللثة حاد", steps: "🦠 بزل الضغط، مضاد حيوي، مسكن، استدع مشرفاً." },
        { title: "عدوى فيروس هربس بالشفاه", steps: "💊 مضاد فيروسي موضعي، تجنب اللمس، نظافة." },
        { title: "التهاب النسيج الخلوي للوجه", steps: "🦷 مضاد حيوي وريدي، أشعة، استدع مشرفاً فوراً." },
        { title: "ضعف تخثر الدم", steps: "💊 خذ تاريخاً دوائياً، استشر طبيب، تجنب الجراحة." },
        { title: "مرضى زراعة القلب (مضادات تخثر)", steps: "❤️ استشر طبيب القلب، أوقف وارفارين قبل الجراحة، غطِ بمضادات حيوية." },
        { title: "مرضى الصمام الصناعي", steps: "💊 غطاء مضاد حيوي قبل أي إجراء، استشر طبيب القلب." },
        { title: "الربو الحاد أثناء العلاج", steps: "🌬️ موسع قصبي (بخاخ)، أكسجين، وضعية الجلوس، طوارئ." },
        { title: "سكتة دماغية مشتبهة", steps: "🧠 FAST: وجه، ذراع، كلام، وقت. استدع إسعاف، لا تعالج." },
        { title: "كسر أداة تنظيف القناة", steps: "🛠️ لا تحاول الإزالة، أشعة، أحيل لأخصائي الجذور." },
        { title: "تمزق غشاء الفم المخاطي", steps: "🧻 نظف، مرهم مضاد حيوي، متابعة." },
        { title: "اختناق بسدادة مطاطية", steps: "🚨 استخدم ملقطاً طويلاً، هايمليش، إسعاف." },
        { title: "كسر الطرف السني للمشرط", steps: "🦷 لا تحاول الحفر، أشعة، أزل باستخدام الموجات فوق الصوتية." },
        { title: "نزيف من الوريد الحنكي", steps: "🩸 اضغط بشاش مرقئ، غرز إذا لزم، استدع مشرفاً." },
        { title: "تقيح العظم السنخي", steps: "🦷 صرف مضاد حيوي، كشط العظم، أرسل لعينة." },
        { title: "ورم دموي خلف المقلة", steps: "👁️ نادر، ضعف بصر، استدع إسعاف وجراحة فورية." },
        { title: "انزلاق الغضروف المفصلي للفك", steps: "🦷 راحة، كمادات دافئة، تمارين لطيفة، استدع أخصائي الفك." }
    ];
    
    function getEmergencyResponse(title) {
        const found = emergencyCases.find(e => e.title === title);
        return found ? found.steps : "لم نتعرف على الحالة. يرجى وصف الأعراض بدقة أكثر.";
    }
    
    // ------------------- واجهة المدير -------------------
    function renderAdminDashboard() {
        const container = document.getElementById('dynamicContent');
        container.innerHTML = `
            <div style="padding:1.5rem;">
                <div class="card">
                    <h3>👥 إدارة الطلاب</h3>
                    <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:1rem;">
                        <input type="text" id="stdName" placeholder="الاسم" style="flex:1; padding:8px; border-radius:30px;">
                        <input type="tel" id="stdPhone" placeholder="رقم الهاتف" style="flex:1; padding:8px; border-radius:30px;">
                        <input type="password" id="stdPassword" placeholder="كلمة السر" style="flex:1; padding:8px; border-radius:30px;">
                        <button id="addStudentBtn" class="btn-primary">إضافة</button>
                    </div>
                    <div id="studentsListAdmin"></div>
                </div>
                <div class="card">
                    <h3>🚑 المساعد الذكي (للمدير)</h3>
                    <div class="emergency-grid" id="emergencyGridAdmin"></div>
                    <div class="chat-area" style="margin-top:1rem;">
                        <div id="chatMessagesAdmin" style="height:200px; overflow-y:auto;"></div>
                    </div>
                </div>
            </div>
        `;
        refreshStudentsListAdmin();
        buildEmergencyGrid('emergencyGridAdmin', 'chatMessagesAdmin');
        document.getElementById('addStudentBtn').addEventListener('click', () => {
            const name = document.getElementById('stdName').value.trim();
            const phone = document.getElementById('stdPhone').value.trim();
            const pass = document.getElementById('stdPassword').value.trim();
            if (name && phone && pass) {
                if (addStudent(name, phone, pass)) {
                    alert('تمت الإضافة');
                    document.getElementById('stdName').value = '';
                    document.getElementById('stdPhone').value = '';
                    document.getElementById('stdPassword').value = '';
                    refreshStudentsListAdmin();
                } else alert('رقم الهاتف موجود مسبقاً');
            } else alert('املأ جميع الحقول');
        });
    }
    
    function refreshStudentsListAdmin() {
        const container = document.getElementById('studentsListAdmin');
        if (!container) return;
        if (students.length === 0) { container.innerHTML = '<p>لا يوجد طلاب</p>'; return; }
        let html = '';
        students.forEach(s => {
            html += `
                <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #ddd;">
                    <div><strong>${escapeHtml(s.name)}</strong> (${s.phone}) <span style="background:#f4e9cd; padding:2px 8px; border-radius:20px;">${s.status === 'active' ? 'نشط' : 'مُرقن'}</span></div>
                    <div>
                        <button class="btn-primary btn-danger" onclick="window.toggleSuspendStudent('${s.id}')" style="margin-left:5px;">${s.status === 'active' ? 'ترقين' : 'تفعيل'}</button>
                        <button class="btn-primary" style="background:#aaa;" onclick="window.deleteStudentById('${s.id}')">حذف</button>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }
    
    // ------------------- واجهة الطالب -------------------
    let currentStudent = null;
    let activeContent = 'welcome';
    
    function renderStudentDashboard(student) {
        currentStudent = student;
        const container = document.getElementById('dynamicContent');
        container.innerHTML = `
            <div class="student-dashboard">
                <div class="welcome">
                    <h2>✨ أهلاً بك، ${escapeHtml(student.name)} ✨</h2>
                </div>
                <div class="big-buttons">
                    <div class="big-btn" data-action="patients"><span>📋</span> <span>مرضاي</span></div>
                    <div class="big-btn" data-action="assistant"><span>🚑</span> <span>مساعدي الذكي</span></div>
                    <div class="big-btn" data-action="addPatient"><span>➕</span> <span>أضف مريض</span></div>
                    <div class="big-btn" data-action="todo"><span>📅</span> <span>ماذا اليوم</span></div>
                </div>
                <div id="studentContentArea" class="content-area">
                    <p style="text-align:center; color:#2b9e5e;">اختر أحد الأزرار أعلاه</p>
                </div>
            </div>
        `;
        
        document.querySelectorAll('.big-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const action = btn.dataset.action;
                activeContent = action;
                if (action === 'patients') showPatientsList();
                else if (action === 'assistant') showAssistant();
                else if (action === 'addPatient') showAddPatientForm();
                else if (action === 'todo') showTodoList();
            });
        });
        
        if (activeContent === 'welcome') setDefault();
        else if (activeContent === 'patients') showPatientsList();
        else if (activeContent === 'assistant') showAssistant();
        else if (activeContent === 'addPatient') showAddPatientForm();
        else if (activeContent === 'todo') showTodoList();
        else setDefault();
        
        function setDefault() {
            const area = document.getElementById('studentContentArea');
            if (area) area.innerHTML = '<p style="text-align:center; color:#2b9e5e;">اختر أحد الأزرار أعلاه</p>';
        }
        
        function showPatientsList() {
            const area = document.getElementById('studentContentArea');
            const patients = patientsDB[student.id] || [];
            if (patients.length === 0) {
                area.innerHTML = '<div class="card"><p>لا يوجد مرضى مسجلون. اضغط على "أضف مريض".</p></div>';
                return;
            }
            let html = '<div class="card"><h3>📋 قائمة مرضاي</h3><div class="table-responsive"><tr>';
            html += '<thead><tr><th>اسم المريض</th><th>التشخيص</th><th>رقم واتساب</th><th>إجراءات</th></tr></thead><tbody>';
            patients.forEach((p, idx) => {
                html += `<tr>
                             <td>${escapeHtml(p.name)}</td>
                             <td>${escapeHtml(p.diagnosis)}</td>
                             <td>${escapeHtml(p.phone)}</td>
                             <td style="white-space: nowrap;">
                                 <button class="btn-primary btn-whatsapp" onclick="window.sendWhatsapp('${p.phone}', '${p.name}')">📱 واتساب</button>
                                 <button class="btn-primary btn-danger" onclick="window.deletePatientFromStudent('${student.id}', ${idx})">🗑 حذف</button>
                             </td>
                          </tr>`;
            });
            html += '</tbody></table></div></div>';
            area.innerHTML = html;
        }
        
        function showAddPatientForm() {
            const area = document.getElementById('studentContentArea');
            area.innerHTML = `
                <div class="card">
                    <h3>➕ إضافة مريض جديد</h3>
                    <div style="display:flex; gap:8px; flex-wrap:wrap; margin-top:1rem;">
                        <input type="text" id="newPatName" placeholder="اسم المريض" style="flex:2; padding:8px; border-radius:30px;">
                        <input type="tel" id="newPatPhone" placeholder="رقم واتساب" style="flex:2; padding:8px; border-radius:30px;">
                        <input type="text" id="newPatDiag" placeholder="التشخيص" style="flex:2; padding:8px; border-radius:30px;">
                        <button id="confirmAddPatient" class="btn-primary">إضافة</button>
                    </div>
                </div>
            `;
            document.getElementById('confirmAddPatient').addEventListener('click', () => {
                const name = document.getElementById('newPatName').value.trim();
                const phone = document.getElementById('newPatPhone').value.trim();
                const diag = document.getElementById('newPatDiag').value.trim();
                if (name && phone) {
                    addPatientToStudent(student.id, name, phone, diag);
                    alert('تمت إضافة المريض');
                    showPatientsList();
                    activeContent = 'patients';
                } else alert('يرجى إدخال الاسم ورقم الهاتف');
            });
        }
        
        function showAssistant() {
            const area = document.getElementById('studentContentArea');
            area.innerHTML = `
                <div class="card">
                    <h3>🚑 مساعدي الذكي للطوارئ (50+ حالة)</h3>
                    <div class="emergency-grid" id="studentEmergencyGrid"></div>
                    <div class="chat-area" style="margin-top:1rem;">
                        <div id="studentChatMessages" style="height:200px; overflow-y:auto;"></div>
                    </div>
                </div>
            `;
            buildEmergencyGrid('studentEmergencyGrid', 'studentChatMessages');
        }
        
        function showTodoList() {
            const area = document.getElementById('studentContentArea');
            const render = () => {
                const currentTodos = todosDB[student.id] || [];
                let html = `
                    <div class="card">
                        <h3>📝 قائمة المهام اليومية (ماذا لدينا من أعمال)</h3>
                        <div style="display: flex; gap: 8px; margin-bottom: 1rem;">
                            <input type="text" id="newTodoText" placeholder="أضف مهمة جديدة..." style="flex:1; padding:8px; border-radius:30px;">
                            <button id="addTodoBtn" class="btn-primary">➕ أضف</button>
                        </div>
                        <div id="todosList">
                `;
                if (currentTodos.length === 0) {
                    html += '<p>لا توجد مهام اليوم. أضف مهمة جديدة.</p>';
                } else {
                    html += '<ul style="list-style: none;">';
                    currentTodos.forEach((todo, idx) => {
                        html += `
                            <li class="todo-item">
                                <span class="todo-text ${todo.completed ? 'completed' : ''}">${escapeHtml(todo.text)}</span>
                                <div class="todo-actions">
                                    <button title="إنجاز" onclick="window.toggleTodoItem('${student.id}', ${idx})">✅</button>
                                    <button title="حذف" onclick="window.deleteTodoItem('${student.id}', ${idx})">🗑️</button>
                                </div>
                            </li>
                        `;
                    });
                    html += '</ul>';
                }
                html += `</div></div>`;
                area.innerHTML = html;
                document.getElementById('addTodoBtn').addEventListener('click', () => {
                    const newText = document.getElementById('newTodoText').value.trim();
                    if (newText) {
                        addTodo(student.id, newText);
                        showTodoList();
                    }
                });
            };
            render();
        }
    }
    
    function buildEmergencyGrid(gridId, chatId) {
        const grid = document.getElementById(gridId);
        if (!grid) return;
        grid.innerHTML = '';
        emergencyCases.forEach(c => {
            const card = document.createElement('div');
            card.className = 'emergency-card';
            card.innerHTML = `<strong>${c.title}</strong>`;
            card.addEventListener('click', () => {
                const response = getEmergencyResponse(c.title);
                const chatDiv = document.getElementById(chatId);
                if (chatDiv) {
                    const msg = document.createElement('div');
                    msg.className = 'message-bubble';
                    msg.innerHTML = `<strong>🔔 ${c.title}:</strong><br>${response}`;
                    chatDiv.appendChild(msg);
                    chatDiv.scrollTop = chatDiv.scrollHeight;
                }
            });
            grid.appendChild(card);
        });
        const chatDiv = document.getElementById(chatId);
        if (chatDiv && chatDiv.children.length === 0) {
            const welcome = document.createElement('div');
            welcome.className = 'message-bubble';
            welcome.innerHTML = "🤖 اختر حالة طوارئ من البطاقات أعلاه (50+ حالة) لتحصل على الإرشادات.";
            chatDiv.appendChild(welcome);
        }
    }
    
    function escapeHtml(str) { 
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m){ 
            if(m==='&') return '&amp;'; 
            if(m==='<') return '&lt;'; 
            if(m==='>') return '&gt;'; 
            return m;
        }); 
    }
    
    window.toggleSuspendStudent = (id) => { toggleSuspend(id); refreshStudentsListAdmin(); };
    window.deleteStudentById = (id) => { if(confirm('حذف الطالب سيؤدي لحذف جميع مرضاه ومهامه؟')) { deleteStudent(id); refreshStudentsListAdmin(); } };
    window.deletePatientFromStudent = (studentId, idx) => { if(confirm('حذف المريض؟')) { deletePatient(studentId, idx); if (currentStudent && currentStudent.id === studentId) renderStudentDashboard(currentStudent); else refreshStudentsListAdmin(); } };
    window.sendWhatsapp = (phone, name) => {
        const message = `مرحباً ${name}، تذكير بموعدك في عيادة الأسنان. شكراً.`;
        window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`, '_blank');
    };
    window.toggleTodoItem = (studentId, idx) => { toggleTodo(studentId, idx); if (currentStudent && currentStudent.id === studentId) renderStudentDashboard(currentStudent); };
    window.deleteTodoItem = (studentId, idx) => { deleteTodo(studentId, idx); if (currentStudent && currentStudent.id === studentId) renderStudentDashboard(currentStudent); };
    
    // ------------------- إدارة الدخول والتسجيل -------------------
    function showAdminLogin() { document.getElementById('adminLoginFields').style.display = 'block'; document.getElementById('studentLoginFields').style.display = 'none'; }
    function showStudentLogin() { document.getElementById('adminLoginFields').style.display = 'none'; document.getElementById('studentLoginFields').style.display = 'block'; }
    
    document.getElementById('adminRoleBtn').addEventListener('click', () => {
        document.getElementById('adminRoleBtn').classList.add('active');
        document.getElementById('studentRoleBtn').classList.remove('active');
        showAdminLogin();
        document.getElementById('registerForm').style.display = 'none';
    });
    document.getElementById('studentRoleBtn').addEventListener('click', () => {
        document.getElementById('studentRoleBtn').classList.add('active');
        document.getElementById('adminRoleBtn').classList.remove('active');
        showStudentLogin();
        document.getElementById('registerForm').style.display = 'none';
    });
    
    document.getElementById('loginActionBtn').addEventListener('click', () => {
        const isAdmin = document.getElementById('adminRoleBtn').classList.contains('active');
        if (isAdmin) {
            const pass = document.getElementById('adminPassword').value;
            if (pass === 'salem1959') {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('appMain').style.display = 'block';
                document.getElementById('userRoleLabel').innerText = 'لوحة المدير';
                renderAdminDashboard();
            } else {
                document.getElementById('loginError').innerText = 'كلمة السر غير صحيحة';
            }
        } else {
            const phone = document.getElementById('studentPhone').value.trim();
            const pwd = document.getElementById('studentPassword').value.trim();
            const student = students.find(s => s.phone === phone && s.password === pwd && s.status === 'active');
            if (student) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('appMain').style.display = 'block';
                document.getElementById('userRoleLabel').innerHTML = `طالب: ${student.name}`;
                renderStudentDashboard(student);
            } else {
                document.getElementById('loginError').innerText = 'بيانات غير صحيحة أو الحساب معطل';
            }
        }
    });
    
    let registerVisible = false;
    document.getElementById('showRegisterBtn').addEventListener('click', () => {
        const form = document.getElementById('registerForm');
        registerVisible = !registerVisible;
        form.style.display = registerVisible ? 'block' : 'none';
    });
    document.getElementById('doRegisterBtn').addEventListener('click', () => {
        const name = document.getElementById('regName').value.trim();
        const phone = document.getElementById('regPhone').value.trim();
        const pwd = document.getElementById('regPassword').value.trim();
        if (!name || !phone || !pwd) {
            document.getElementById('regError').innerText = '❌ يرجى ملء جميع الحقول';
            return;
        }
        if (students.find(s => s.phone === phone)) {
            document.getElementById('regError').innerText = '❌ رقم الهاتف مسجل مسبقاً';
            return;
        }
        if (addStudent(name, phone, pwd, 'active')) {
            alert('تم التسجيل بنجاح! يمكنك الدخول الآن.');
            document.getElementById('regName').value = '';
            document.getElementById('regPhone').value = '';
            document.getElementById('regPassword').value = '';
            document.getElementById('registerForm').style.display = 'none';
            registerVisible = false;
            document.getElementById('studentRoleBtn').click();
            document.getElementById('studentPhone').value = phone;
            document.getElementById('studentPassword').value = pwd;
        } else {
            document.getElementById('regError').innerText = '❌ حدث خطأ';
        }
    });
    
    document.getElementById('logoutBtn').addEventListener('click', () => {
        location.reload();
    });
    
    // بيانات افتراضية
    if (students.length === 0) {
        addStudent('أحمد الطالب', '0512345678', '1234');
        addStudent('سارة الطالبة', '0598765432', '5678');
        const first = students[0];
        if (first) {
            addPatientToStudent(first.id, 'سومر', '09865542387', 'نخر نافذ في الرحى الأولى السفلية');
            addPatientToStudent(first.id, 'مريض تجريبي 2', '0502222222', 'قلع ضرس');
            addTodo(first.id, 'مراجعة جدول العيادة');
            addTodo(first.id, 'تجهيز مواد التعقيم');
        }
    }
</script>
