        // تعريف الكائنات العامة للوظائف
        window.showEmergencyModal = (title, instructions) => {
            document.getElementById("emergencyModalTitle").innerText = title;
            document.getElementById("emergencyModalBody").innerText = instructions;
            document.getElementById("emergencyModal").style.display = "flex";
        };
        window.closeEmergencyModal = () => {
            document.getElementById("emergencyModal").style.display = "none";

        // ---------------------- متغيرات وإدارة الحالة ------------------
        let currentUserObj = null;
        let currentUserRole = null;
        let currentUserId = null;
        
        // دوال تسجيل النشاط
        window.logActivity = async (studentId, action, details) => {
            try {
                await addDoc(collection(db, "activities"), {
                    studentId: studentId,
                    action: action,
                    details: details,
                    timestamp: Timestamp.now()
                });
            } catch(e) { console.error("log error", e); }
        };
        
        // تحميل واجهات
        function showLoginScreen() { document.getElementById("loginContainer").style.display = "flex"; document.getElementById("appContainer").style.display = "none"; }
        function showAppScreen() { document.getElementById("loginContainer").style.display = "none"; document.getElementById("appContainer").style.display = "block"; }
        
        // تسجيل الدخول
        window.loginUser = async () => {
            const email = document.getElementById("loginEmail").value.trim();
            const password = document.getElementById("loginPassword").value;
            if(!email || !password) { alert("يرجى إدخال البريد وكلمة المرور"); return; }
            try {
                const cred = await signInWithEmailAndPassword(auth, email, password);
                // التحقق من حالة الحظر أو الحذف المنطقي
                const userDoc = await getDoc(doc(db, "users", cred.user.uid));
                if(userDoc.exists() && (userDoc.data().suspended === true || userDoc.data().deleted === true)) {
                    await signOut(auth);
                    alert("هذا الحساب موقوف أو محذوف، يرجى التواصل مع المدير.");
                    return;
                }
            } catch(e) { alert("فشل تسجيل الدخول: "+ e.message); }
        };
        
        // تسجيل طالب جديد
        window.registerStudent = async () => {
            const email = document.getElementById("regEmail").value.trim();
            const phone = document.getElementById("regPhone").value.trim();
            const password = document.getElementById("regPassword").value;
            if(!email || !password) { alert("البريد وكلمة المرور مطلوبة"); return; }
            try {
                const cred = await createUserWithEmailAndPassword(auth, email, password);
                await setDoc(doc(db, "users", cred.user.uid), {
                    email: email,
                    phone: phone || "",
                    role: "student",
                    suspended: false,
                    deleted: false,
                    createdAt: Timestamp.now()
                });
                await logActivity(cred.user.uid, "تسجيل حساب", "قام الطالب بتسجيل حسابه بنجاح");
                alert("تم التسجيل بنجاح، يمكنك الدخول");
                // تبديل إلى تبويب الدخول
                document.getElementById("loginTab").click();
            } catch(e) { alert("خطأ في التسجيل: "+ e.message); }
        };
        
        // عرض الواجهة الرئيسية حسب الدور
        function renderDashboardByRole(role, userId) {
            const adminPanel = document.getElementById("adminPanel");
            const studentPanel = document.getElementById("studentPanel");
            if(role === "admin") {
                adminPanel.style.display = "block";
                studentPanel.style.display = "none";
                loadAdminStudents();
                loadAdminActivitiesSummary();
            } else {
                adminPanel.style.display = "none";
                studentPanel.style.display = "block";
                loadPatientsRealTime(userId);
                loadTasksRealTime(userId);
                renderEmergencyGuide();
            }
        }
        
        // ---------------------- إدارة الطلاب من المدير ------------------
        async function loadAdminStudents() {
            const q = query(collection(db, "users"), where("role", "==", "student"));
            const snapshot = await getDocs(q);
            const tbody = document.getElementById("studentsTableBody");
            tbody.innerHTML = "";
            for(const docSnap of snapshot.docs) {
                const data = docSnap.data();
                if(data.deleted === true) continue;
                const studentId = docSnap.id;
                // جلب آخر نشاط
                const lastAct = await getLastActivity(studentId);
                const status = data.suspended ? "موقوف" : "نشط";
                const row = `<tr>
                    <td>${data.email}</td>
                    <td>${data.phone || "—"}</td>
                    <td>${status}</td>
                    <td>${lastAct || "لا يوجد"}</td>
                    <td>
                        <button class="action-btn suspend-btn" onclick="toggleSuspend('${studentId}', ${!data.suspended})">${data.suspended ? "تفعيل" : "تعليق"}</button>
                        <button class="action-btn delete-btn" onclick="deleteStudent('${studentId}')">حذف</button>
                    </td>
                </tr>`;
                tbody.innerHTML += row;
            }
        }
        
        async function getLastActivity(studentId) {
            const q = query(collection(db, "activities"), where("studentId", "==", studentId), orderBy("timestamp", "desc"));
            const snap = await getDocs(q);
            if(!snap.empty) {
                const last = snap.docs[0].data();
                return `${last.action} - ${last.timestamp?.toDate().toLocaleString() || ""}`;
            }
            return "—";
        }
        
        window.toggleSuspend = async (studentId, suspend) => {
            await updateDoc(doc(db, "users", studentId), { suspended: suspend });
            loadAdminStudents();
            loadAdminActivitiesSummary();
        };
        
        window.deleteStudent = async (studentId) => {
            if(confirm("هل أنت متأكد من حذف الطالب نهائياً؟ سيتم حظر حسابه منطقياً.")) {
                await updateDoc(doc(db, "users", studentId), { deleted: true, suspended: true });
                // تسجيل نشاط الحذف
                await logActivity(studentId, "حذف حساب", "تم حذف الحساب بواسطة المدير");
                loadAdminStudents();
                loadAdminActivitiesSummary();
            }
        };
        
        window.showAddStudentModal = () => {
            document.getElementById("addStudentModal").style.display = "flex";
        };
        window.closeAddStudentModal = () => {
            document.getElementById("addStudentModal").style.display = "none";
        };
        window.addStudentByAdmin = async () => {
            const email = document.getElementById("adminAddEmail").value.trim();
            const phone = document.getElementById("adminAddPhone").value.trim();
            const password = document.getElementById("adminAddPassword").value;
            if(!email || !password) { alert("املأ البريد وكلمة المرور"); return; }
            try {
                const cred = await createUserWithEmailAndPassword(auth, email, password);
                await setDoc(doc(db, "users", cred.user.uid), {
                    email: email,
                    phone: phone,
                    role: "student",
                    suspended: false,
                    deleted: false,
                    createdAt: Timestamp.now()
                });
                await logActivity(cred.user.uid, "إنشاء حساب", "تم إنشاء الحساب من قبل المدير");
                alert("تم إضافة الطالب");
                closeAddStudentModal();
                loadAdminStudents();
                loadAdminActivitiesSummary();
                document.getElementById("adminAddEmail").value = "";
                document.getElementById("adminAddPhone").value = "";
                document.getElementById("adminAddPassword").value = "";
            } catch(e) { alert("خطأ: "+e.message); }
        };
        
        async function loadAdminActivitiesSummary() {
            const q = query(collection(db, "activities"), orderBy("timestamp", "desc"), limit(20));
            const snap = await getDocs(q);
            const container = document.getElementById("activitySummary");
            container.innerHTML = "<h3>موجز النشاطات الأخيرة</h3><ul>";
            snap.forEach(d => {
                const data = d.data();
                const userName = data.studentId.slice(0,6);
                container.innerHTML += `<li>${data.action} - ${data.details} (${data.timestamp?.toDate().toLocaleString()})</li>`;
            });
            container.innerHTML += "</ul>";
        }
        
        // ---------------------- إدارة المرضى (الطالب) ------------------
        let patientsUnsubscribe = null;
        function loadPatientsRealTime(studentId) {
            if(patientsUnsubscribe) patientsUnsubscribe();
            const q = query(collection(db, "patients"), where("studentId", "==", studentId), orderBy("createdAt", "desc"));
            patientsUnsubscribe = onSnapshot(q, (snapshot) => {
                const tbody = document.getElementById("patientsTableBody");
                tbody.innerHTML = "";
                snapshot.forEach(docSnap => {
                    const p = docSnap.data();
                    const pid = docSnap.id;
                    const row = `<tr>
                        <td>${p.name || ""}</td>
                        <td>${p.age || ""}</td>
                        <td>${p.diagnosis || ""}</td>
                        <td>${p.phone || ""}</td>
                        <td>
                            <button class="action-btn whatsapp-btn" onclick="openWhatsapp('${p.phone}','${p.name}')">واتساب</button>
                            <button class="action-btn delete-btn" onclick="deletePatient('${pid}')">حذف</button>
                        </td>
                    </tr>`;
                    tbody.innerHTML += row;
                });
                if(snapshot.empty) tbody.innerHTML = "<tr><td colspan='5'>لا يوجد مرضى</td></tr>";
            });
        }
        
        window.openWhatsapp = (phone, name) => {
            if(!phone) { alert("لا يوجد رقم هاتف للمريض"); return; }
            let formatted = phone.replace(/\D/g, '');
            window.open(`https://wa.me/${formatted}?text=مرحباً ${name}، هذا تذكير طبي من مساعد الطالب.`, "_blank");
        };
        
        window.deletePatient = async (patientId) => {
            if(confirm("حذف المريض؟")) {
                await deleteDoc(doc(db, "patients", patientId));
                if(currentUserId) await logActivity(currentUserId, "حذف مريض", `تم حذف مريض`);
            }
        };
        
        window.showAddPatientModal = () => {
            document.getElementById("addPatientModal").style.display = "flex";
        };
        window.closeAddPatientModal = () => {
            document.getElementById("addPatientModal").style.display = "none";
            document.getElementById("patientName").value = "";
            document.getElementById("patientAge").value = "";
            document.getElementById("patientDiagnosis").value = "";
            document.getElementById("patientPhone").value = "";
        };
        window.addPatient = async () => {
            const name = document.getElementById("patientName").value.trim();
            const age = document.getElementById("patientAge").value.trim();
            const diagnosis = document.getElementById("patientDiagnosis").value.trim();
            const phone = document.getElementById("patientPhone").value.trim();
            if(!name) { alert("اسم المريض مطلوب"); return; }
            await addDoc(collection(db, "patients"), {
                studentId: currentUserId,
                name, age, diagnosis, phone,
                createdAt: Timestamp.now()
            });
            await logActivity(currentUserId, "إضافة مريض", `أضاف المريض ${name}`);
            closeAddPatientModal();
        };
        
        // ---------------------- المهام اليومية ------------------
        let tasksUnsubscribe = null;
        function loadTasksRealTime(studentId) {
            if(tasksUnsubscribe) tasksUnsubscribe();
            const q = query(collection(db, "tasks"), where("studentId", "==", studentId), orderBy("createdAt", "desc"));
            tasksUnsubscribe = onSnapshot(q, (snapshot) => {
                const container = document.getElementById("tasksList");
                container.innerHTML = "";
                snapshot.forEach(docSnap => {
                    const task = docSnap.data();
                    const tid = docSnap.id;
                    const completed = task.completed || false;
                    const div = document.createElement("div");
                    div.className = "task-item";
                    div.innerHTML = `
                        <input type="checkbox" ${completed ? "checked" : ""} onchange="toggleTask('${tid}', this.checked)">
                        <span style="${completed ? 'text-decoration:line-through; opacity:0.7' : ''}">${task.text}</span>
                        <button class="delete-task" onclick="deleteTask('${tid}')">🗑️</button>
                    `;
                    container.appendChild(div);
                });
                if(snapshot.empty) container.innerHTML = "<p>لا توجد مهام، أضف مهمة جديدة</p>";
            });
        }
        
        window.addTask = async () => {
            const text = document.getElementById("newTaskInput").value.trim();
            if(!text) return;
            await addDoc(collection(db, "tasks"), {
                studentId: currentUserId,
                text: text,
                completed: false,
                createdAt: Timestamp.now()
            });
            await logActivity(currentUserId, "إضافة مهمة", text);
            document.getElementById("newTaskInput").value = "";
        };
        
        window.toggleTask = async (taskId, completed) => {
            await updateDoc(doc(db, "tasks", taskId), { completed: completed });
            await logActivity(currentUserId, completed ? "إنجاز مهمة" : "إعادة مهمة", "");
        };
        
        window.deleteTask = async (taskId) => {
            await deleteDoc(doc(db, "tasks", taskId));
            await logActivity(currentUserId, "حذف مهمة", "");
        };
        
        // ---------------------- دليل الطوارئ ------------------
        function renderEmergencyGuide() {
            const grid = document.getElementById("emergencyGrid");
            if(!grid) return;
            grid.innerHTML = "";
            medicalEmergencies.forEach(emerg => {
                const card = document.createElement("div");
                card.className = "emergency-card";
                card.innerHTML = `<h4>${emerg.title}</h4><p>${emerg.instructions.substring(0,60)}...</p><button class="details-btn" onclick="showEmergencyModal('${emerg.title.replace(/'/g, "\\'")}', '${emerg.instructions.replace(/'/g, "\\'")}')">عرض الإرشادات</button>`;
                grid.appendChild(card);
            });
        }
        
        // ---------------------- مراقبة حالة المصادقة ------------------
        onAuthStateChanged(auth, async (user) => {
            if(user) {
                const userDocRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userDocRef);
                if(!userSnap.exists() || userSnap.data().deleted === true) {
                    await signOut(auth);
                    alert("حساب غير مصرح به أو محذوف");
                    showLoginScreen();
                    return;
                }
                const userData = userSnap.data();
                if(userData.suspended === true) {
                    await signOut(auth);
                    alert("تم تعليق حسابك، يرجى التواصل مع المدير");
                    showLoginScreen();
                    return;
                }
                currentUserObj = user;
                currentUserRole = userData.role;
                currentUserId = user.uid;
                showAppScreen();
                renderDashboardByRole(currentUserRole, currentUserId);
            } else {
                currentUserObj = null;
                showLoginScreen();
                if(patientsUnsubscribe) patientsUnsubscribe();
                if(tasksUnsubscribe) tasksUnsubscribe();
            }
        });
        
        // إنشاء مدير افتراضي في أول تشغيل (إذا لم يوجد أي مدير)
        async function ensureDefaultAdmin() {
            const q = query(collection(db, "users"), where("role", "==", "admin"));
            const snap = await getDocs(q);
            if(snap.empty) {
                try {
                    const adminEmail = "admin@example.com";
                    const adminPass = "salem1959";
                    const cred = await createUserWithEmailAndPassword(auth, adminEmail, adminPass);
                    await setDoc(doc(db, "users", cred.user.uid), {
                        email: adminEmail,
                        role: "admin",
                        suspended: false,
                        deleted: false,
                        phone: "admin",
                        createdAt: Timestamp.now()
                    });
                    console.log("تم إنشاء حساب المدير الافتراضي: admin@example.com / salem1959");
                } catch(e) { console.warn("خطأ إنشاء المدير الافتراضي:", e); }
            }
        }
        
        // تبويب لوحة الدخول/التسجيل
        window.showLoginTab = () => {
            document.getElementById("loginForm").style.display = "block";
            document.getElementById("registerForm").style.display = "none";
        };
        window.showRegisterTab = () => {
            document.getElementById("loginForm").style.display = "none";
            document.getElementById("registerForm").style.display = "block";
        };
        
        // تشغيل التطبيق بعد تحميل الصفحة
        window.addEventListener("DOMContentLoaded", () => {
            showLoginScreen();
            setTimeout(() => { ensureDefaultAdmin(); }, 1000);
            // ربط أزرار التبويب
            document.getElementById("loginTab").onclick = () => showLoginTab();
            document.getElementById("registerTab").onclick = () => showRegisterTab();
            showLoginTab();
        });
        
        window.openWhatsappGlobal = openWhatsapp;
        // إتاحة الدوال في النطاق العام
        window.toggleSuspend = toggleSuspend;
        window.deleteStudent = deleteStudent;
        window.closeEmergencyModal = closeEmergencyModal;
    </script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin:0; padding:0; }
        body { background: #f1f8f5; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        /* أنماط عامة */
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        button, .btn { background-color: #2c7a6e; color: white; border: none; border-radius: 8px; padding: 8px 16px; cursor: pointer; transition: 0.2s; }
        button:hover { background-color: #1e5a50; }
        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        h2 { color: #1e5a50; margin-bottom: 20px; border-right: 5px solid #2c7a6e; padding-right: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #ddd; }
        th { background: #e9f3f0; }
        .action-btn { margin: 0 5px; padding: 5px 12px; font-size: 0.85rem; }
        .whatsapp-btn { background: #25D366; }
        .delete-btn { background: #c7362b; }
        .suspend-btn { background: #f4a261; }
        /* واجهة الطالب */
        .patients-table, .tasks-section { overflow-x: auto; }
        .tasks-list { margin-top: 15px; }
        .task-item { background: #f9fdfb; padding: 10px 15px; margin: 8px 0; border-radius: 30px; display: flex; align-items: center; gap: 12px; }
        .task-item input { transform: scale(1.2); margin-left: 10px; }
        .task-item .delete-task { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #b91c1c; margin-right: auto; }
        .emergency-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 18px; margin-top: 20px; }
        .emergency-card { background: white; border-radius: 18px; padding: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.05); transition: 0.2s; border-right: 4px solid #2c7a6e; }
        .emergency-card h4 { color: #1e5a50; margin-bottom: 8px; }
        .emergency-card p { font-size: 0.85rem; color: #2c3e50; margin-bottom: 12px; }
        .details-btn { background: #2c7a6e; width: 100%; }
        /* نافذة منبثقة */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; max-width: 500px; width: 90%; border-radius: 28px; padding: 25px; animation: fadeIn 0.2s; text-align: center; }
        .login-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #eef7f3; }
        .login-card { width: 400px; max-width: 90%; background: white; border-radius: 32px; padding: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .tabs { display: flex; gap: 15px; margin-bottom: 25px; border-bottom: 2px solid #ddd; }
        .tab { cursor: pointer; padding: 8px 0; font-weight: bold; color: #7f8c8d; border-bottom: 3px solid transparent; }
        .tab.active { color: #2c7a6e; border-bottom-color: #2c7a6e; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 30px; border: 1px solid #ccc; font-size: 1rem; }
        @media (max-width: 768px) { th, td { font-size: 0.8rem; } .emergency-grid { gap: 12px; } }
        footer { text-align: center; margin-top: 30px; font-size: 0.8rem; color: #5a7a6e; }
    </style>
</head>
<body>
    <div id="loginContainer" class="login-container" style="display: flex;">
        <div class="login-card">
            <h2 style="text-align:center;">🩺 DS ASSISTANCE</h2>
            <div class="tabs">
                <div id="loginTab" class="tab active">تسجيل الدخول</div>
                <div id="registerTab" class="tab">حساب جديد</div>
            </div>
            <div id="loginForm">
                <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" autocomplete="email">
                <input type="password" id="loginPassword" placeholder="كلمة المرور">
                <button onclick="loginUser()" style="width:100%;">دخول</button>
            </div>
            <div id="registerForm" style="display:none;">
                <input type="email" id="regEmail" placeholder="البريد الإلكتروني" autocomplete="off">
                <input type="tel" id="regPhone" placeholder="رقم الهاتف (اختياري)">
                <input type="password" id="regPassword" placeholder="كلمة المرور">
                <button onclick="registerStudent()" style="width:100%;">تسجيل حساب طالب</button>
            </div>
        </div>
    </div>
    
    <div id="appContainer" style="display:none;">
        <div class="container">
            <div class="flex-between">
                <h1>🩺 مساعد الطالب الطبيب</h1>
                <button onclick="signOutUser()">تسجيل خروج</button>
            </div>
            <!-- لوحة المدير -->
            <div id="adminPanel" style="display:none;">
                <div class="card">
                    <div class="flex-between"><h2>📋 إدارة الطلاب</h2><button onclick="showAddStudentModal()">➕ إضافة طالب</button></div>
                    <table><thead><tr><th>البريد</th><th>الهاتف</th><th>الحالة</th><th>آخر نشاط</th><th>إجراءات</th></tr></thead><tbody id="studentsTableBody"></tbody></table>
                </div>
                <div class="card" id="activitySummary"></div>
            </div>
            <!-- لوحة الطالب -->
            <div id="studentPanel" style="display:none;">
                <div class="card">
                    <div class="flex-between"><h2>📋 إدارة المرضى</h2><button onclick="showAddPatientModal()">➕ إضافة مريض</button></div>
                    <div class="patients-table"><table><thead><tr><th>الاسم</th><th>العمر</th><th>التشخيص</th><th>الهاتف</th><th>إجراءات</th></tr></thead><tbody id="patientsTableBody"></tbody></table></div>
                </div>
                <div class="card tasks-section">
                    <h2>📅 المهام اليومية</h2>
                    <div style="display:flex; gap:10px;"><input id="newTaskInput" placeholder="أضف مهمة جديدة..."><button onclick="addTask()">إضافة</button></div>
                    <div id="tasksList" class="tasks-list"></div>
                </div>
                <div class="card">
                    <h2>🚑 دليل الطوارئ الطبي (50+ حالة)</h2>
                    <div id="emergencyGrid" class="emergency-grid"></div>
                </div>
            </div>
            <footer>نظام سحابي متكامل - مساعد الطالب الطبيب</footer>
        </div>
    </div>
    
    <!-- مودال الإرشادات -->
    <div id="emergencyModal" class="modal" style="display:none;" onclick="if(event.target===this) closeEmergencyModal()">
        <div class="modal-content">
            <h3 id="emergencyModalTitle"></h3>
            <p id="emergencyModalBody" style="text-align:right; margin:20px 0;"></p>
            <button onclick="closeEmergencyModal()">إغلاق</button>
        </div>
    </div>
    <!-- مودال إضافة طالب للمدير -->
    <div id="addStudentModal" class="modal" onclick="if(event.target===this) closeAddStudentModal()">
        <div class="modal-content"><h3>إضافة طالب جديد</h3><input id="adminAddEmail" placeholder="البريد الإلكتروني"><input id="adminAddPhone" placeholder="رقم الهاتف"><input id="adminAddPassword" type="password" placeholder="كلمة المرور"><button onclick="addStudentByAdmin()">إنشاء حساب</button><button onclick="closeAddStudentModal()">إلغاء</button></div>
    </div>
    <!-- مودال إضافة مريض -->
    <div id="addPatientModal" class="modal" onclick="if(event.target===this) closeAddPatientModal()">
        <div class="modal-content"><h3>إضافة مريض</h3><input id="patientName" placeholder="الاسم الكامل"><input id="patientAge" placeholder="العمر"><input id="patientDiagnosis" placeholder="التشخيص"><input id="patientPhone" placeholder="رقم الهاتف"><button onclick="addPatient()">حفظ</button><button onclick="closeAddPatientModal()">إلغاء</button></div>
    </div>
</body>
</html>
