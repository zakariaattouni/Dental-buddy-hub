<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DS Assistant</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: Tahoma, Arial;
        background: #F7F7F7;
    }

    /* الشريط العلوي */
    .topbar {
        height: 56px;
        background: #F2F2F2;
        border-bottom: 1px solid #D9D9D9;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 14px;
    }

    /* أيقونة التطبيق */
    .app-icon {
        width: 38px;
        height: 38px;
        border-radius: 22px;
        background: #F2F2F2;
        border: 1px solid #C8C8C8;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* مؤشر الواي فاي */
    .wifi-icon {
        font-size: 18px;
        margin-right: 8px;
        transition: 0.3s;
    }

    /* زر الرئيسية */
    .home-icon {
        font-size: 22px;
        color: #3A3A3A;
    }

    /* الكارد الرئيسي */
    .card {
        width: 90%;
        margin: 50px auto;
        background: white;
        border-radius: 12px;
        padding: 35px 20px;
        text-align: center;
        box-sizing: border-box;
    }

    .logo {
        width: 96px;
        height: 96px;
        margin: 0 auto 15px;
    }

    .title-main {
        font-size: 22px;
        font-weight: bold;
        color: #1E1E1E;
        margin-bottom: 6px;
    }

    .title-sub {
        font-size: 16px;
        color: #3A3A3A;
        margin-bottom: 20px;
    }

    .btn {
        width: 100%;
        padding: 14px;
        margin: 8px 0;
        border: none;
        border-radius: 12px;
        background: #F4C542;
        color: #1E1E1E;
        font-size: 17px;
        transition: 0.2s;
    }

    .btn:hover {
        background: #e7b83d;
    }

    .footer {
        text-align: center;
        font-size: 12px;
        color: #777;
        margin-top: 40px;
        padding-bottom: 20px;
    }
</style>

</head>
<body>

<!-- الشريط العلوي -->
<div class="topbar">
    <div style="display:flex; align-items:center;">
        <div class="app-icon">
            <!-- أيقونة كتاب + سماعة -->
            <svg width="26" height="26" viewBox="0 0 50 50">
                <!-- الكتاب نصف مفتوح يسار -->
                <path d="M10 10 L25 15 L25 40 L10 35 Z" fill="#F2F2F2" stroke="#C8C8C8" stroke-width="2"/>
                <!-- السماعة المنحنية -->
                <path d="M30 18 Q40 25 30 32" stroke="#F4C542" stroke-width="3" fill="none" stroke-linecap="round"/>
                <circle cx="30" cy="18" r="3" fill="#F4C542"/>
                <circle cx="30" cy="32" r="3" fill="#F4C542"/>
            </svg>
        </div>

        <div id="wifi" class="wifi-icon">📶</div>
    </div>

    <div class="title-top">الصفحة الرئيسية</div>

    <div class="home-icon">🏠</div>
</div>

<!-- الكارد الرئيسي -->
<div class="card">

    <!-- شعار كبير -->
    <div class="logo">
        <svg width="96" height="96" viewBox="0 0 50 50">
            <path d="M10 10 L25 15 L25 40 L10 35 Z" fill="#F2F2F2" stroke="#C8C8C8" stroke-width="2"/>
            <path d="M30 18 Q40 25 30 32" stroke="#F4C542" stroke-width="3" fill="none" stroke-linecap="round"/>
            <circle cx="30" cy="18" r="3" fill="#F4C542"/>
            <circle cx="30" cy="32" r="3" fill="#F4C542"/>
        </svg>
    </div>

    <div class="title-main">DS Assistant — دليل الطالب</div>
    <div class="title-sub">تطبيق مبسّط للطوارئ السريرية</div>

    <button class="btn" onclick="alert('دخول المدير')">دخول المدير</button>
    <button class="btn" onclick="alert('دخول الطالب')">دخول الطالب</button>
    <button class="btn" onclick="alert('تسجيل حساب جديد')">تسجيل حساب جديد</button>
</div>

<div class="footer">
    الإصدار 1.0 — جميع الحقوق محفوظة © 2026
</div>

<script>
/* مؤشر اتصال فايربيس */
function checkConnection() {
    let wifi = document.getElementById("wifi");
    let connected = Math.random() > 0.3;

    wifi.style.color = connected ? "#4CAF50" : "#E53935";
}

setInterval(checkConnection, 5000);
checkConnection();
</script>

</body>
</html>
