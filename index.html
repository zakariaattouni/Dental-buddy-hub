<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DS ASSISTANCE - مساعد الطالب الطبيب</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,sans-serif}
body{background:#ecf9f0;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
.wrapper{max-width:1400px;width:100%;margin:0 auto}
.login-card{background:#fff;border-radius:48px;max-width:400px;margin:2rem auto;padding:2rem;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,.1)}
.role-buttons{display:flex;gap:1rem;margin:1rem 0}
.role-btn{flex:1;padding:12px;border-radius:60px;border:none;background:#e0f3e8;color:#1f6e43;font-weight:bold;cursor:pointer;transition:.2s}
.role-btn.active{background:#2b9e5e;color:#fff}
.login-field{display:none;margin-top:1rem}
.login-field input{width:100%;padding:12px;margin:8px 0;border-radius:60px;border:1px solid #cbdfd1;font-size:1rem}
.register-field{margin-top:1rem;border-top:1px solid #cbdfd1;padding-top:1rem}
.btn{background:#2b9e5e;border:none;padding:12px;border-radius:50px;color:#fff;font-weight:bold;width:100%;cursor:pointer;margin-top:8px;font-size:1rem;transition:.2s}
.btn:hover{background:#238a4f}
.btn:disabled{background:#888;cursor:wait}
.btn-outline{background:transparent;border:1px solid #2b9e5e;color:#2b9e5e}
.error{color:#c5452f;margin-top:8px;font-size:.85rem;min-height:1.2rem}
.app-main{background:#fff;border-radius:40px;overflow:hidden;display:none;box-shadow:0 20px 40px rgba(0,0,0,.1)}
.header{background:linear-gradient(135deg,#e0f3e8,#c8e6d9);padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap}
.logo h1{color:#1f6e43;font-size:1.8rem;display:flex;align-items:center;gap:8px}
.logo h1::before{content:"🦷"}
.logout-btn{background:none;border:none;color:#c5452f;font-weight:bold;cursor:pointer;font-size:1rem;padding:8px 16px;border-radius:20px}
.logout-btn:hover{background:rgba(197,69,47,.1)}
.student-dashboard{padding:1.5rem}
.welcome{background:#e0f3e8;border-radius:30px;padding:1rem;text-align:center;margin-bottom:1.5rem}
.big-buttons{display:grid;grid-template-columns:repeat(4,1fr);gap:.8rem;margin-bottom:1.5rem}
.big-btn{background:#fff;border:2px solid #2b9e5e;border-radius:25px;padding:1rem .3rem;text-align:center;cursor:pointer;transition:.2s;font-weight:bold;font-size:1rem;color:#1f6e43;display:flex;flex-direction:column;align-items:center;gap:5px}
.big-btn span:first-child{font-size:1.6rem}
.big-btn:hover{background:#2b9e5e;color:#fff;transform:translateY(-2px);box-shadow:0 4px 12px rgba(43,158,94,.3)}
.content-area{background:#f9fefb;border-radius:30px;padding:1rem;border:1px solid #cde5d4;min-height:300px}
.card{background:#fff;border:1px solid #e1f0e4;border-radius:24px;padding:1rem;margin-bottom:1rem}
.btn-primary{background:#2b9e5e;padding:6px 12px;border-radius:30px;border:none;color:#fff;font-weight:bold;cursor:pointer;font-size:.8rem}
.btn-danger{background:#e76f51}
.btn-whatsapp{background:#25D366}
.table-responsive{overflow-x:auto}
table{width:100%;min-width:500px;border-collapse:collapse;font-size:.85rem}
th,td{padding:8px 6px;border-bottom:1px solid #eef3ec;text-align:right;white-space:nowrap}
.emergency-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.6rem;margin-bottom:1rem;max-height:400px;overflow-y:auto}
.emergency-card{background:#fff;border:1px solid #cde5d4;border-radius:18px;padding:.6rem;text-align:center;cursor:pointer;transition:.2s;font-size:.8rem}
.emergency-card:hover{background:#e0f3e8;border-color:#2b9e5e}
.emergency-card strong{display:block}
.message-bubble{background:#eef6f2;border-radius:18px;padding:8px 12px;margin:6px 0}
.todo-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #e1f0e4}
.todo-text{flex:1;margin-right:8px;font-size:.9rem}
.todo-text.completed{text-decoration:line-through;color:#888}.todo-actions button{margin-right:6px;background:none;border:none;cursor:pointer;font-size:1rem}
.accordion-item{border:1px solid #cde5d4;border-radius:20px;margin-bottom:1rem;overflow:hidden}
.accordion-header{background:#e0f3e8;padding:1rem;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-weight:bold}
.accordion-header:hover{background:#c8e6d9}
.accordion-content{display:none;padding:1rem;background:#fff;border-top:1px solid #cde5d4}
.accordion-content.open{display:block}
footer{background:#e9f3ec;text-align:center;padding:.8rem;font-size:.7rem;margin-top:1rem}
#loader{display:none;position:fixed;inset:0;background:rgba(236,249,240,.9);z-index:9999;justify-content:center;align-items:center;flex-direction:column}
.spinner{width:40px;height:40px;border:4px solid #ddd;border-top:4px solid #2b9e5e;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
@media(max-width:700px){.student-dashboard{padding:1rem}.big-buttons{grid-template-columns:repeat(2,1fr);gap:.6rem}.big-btn{padding:.8rem .2rem;font-size:.9rem}.big-btn span:first-child{font-size:1.4rem}.emergency-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}}
</style>
</head>
<body>
<div id="loader"><div class="spinner"></div><p style="margin-top:10px;color:#2b9e5e">جاري المزامنة...</p></div>

<div class="wrapper">
  <div id="loginScreen" class="login-card">
    <h2>DS ASSISTANCE</h2>
    <p>مساعد الطالب الطبيب | نظام سحابي حقيقي</p>
    <div class="role-buttons">
      <button id="btnAdminRole" class="role-btn active">👨‍⚕️ مدير</button>
      <button id="btnStudentRole" class="role-btn">👩‍🎓 طالب</button>
    </div>
    <div id="adminFields" class="login-field" style="display:block">
      <input type="password" id="adminPass" placeholder="كلمة سر المدير">
    </div>
    <div id="studentFields" class="login-field" style="display:none">
      <input type="tel" id="studPhone" placeholder="رقم الهاتف">
      <input type="password" id="studPass" placeholder="كلمة السر">
    </div>
    <button id="btnLogin" class="btn">دخول</button>
    <div id="loginErr" class="error"></div>
    <div class="register-field">
      <button id="btnShowReg" class="btn btn-outline">📝 تسجيل طالب جديد</button>
      <div id="regForm" style="display:none;margin-top:1rem">
        <input type="text" id="regName" placeholder="الاسم الكامل">
        <input type="tel" id="regPhone" placeholder="رقم الهاتف">
        <input type="password" id="regPass" placeholder="كلمة السر (6 أحرف على الأقل)">
        <button id="btnRegister" class="btn">تسجيل</button>
        <div id="regErr" class="error"></div>
      </div>
    </div>
  </div>

  <div id="appMain" class="app-main">
    <div class="header">
      <div class="logo"><h1>DS ASSISTANCE</h1><small id="userLabel"></small></div>
      <button id="btnLogout" class="logout-btn">🚪 خروج</button>
    </div>    <div id="mainContent"></div>
    <footer>نظام إدارة العيادة | سحابي آمن | دعم 50+ حالة</footer>
  </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
(function(){
  "use strict";
  
  // 🔑 1. ضع بيانات مشروعك هنا (موجودة في Firebase Console)
  const firebaseConfig = {
    apiKey: "AIzaSyD-YOUR_API_KEY_HERE",
    authDomain: "your-project.firebaseapp.com",
    projectId: "your-project-id",
    storageBucket: "your-project.appspot.com",
    messagingSenderId: "123456789",
    appId: "1:123456789:web:abcdef"
  };

  const loader = document.getElementById('loader');
  function showLoad(show){ loader.style.display = show ? 'flex' : 'none'; }

  // تهيئة Firebase
  let app, auth, db, isCloud = true;
  try {
    if(firebaseConfig.apiKey.includes("YOUR_API_KEY")) throw new Error("Config missing");
    app = firebase.initializeApp(firebaseConfig);
    auth = firebase.auth();
    db = firebase.firestore();
  } catch(e) {
    isCloud = false;
    console.warn("⚠️ Firebase غير مفعل. يعمل النظام محلياً فقط.");
  }

  const $ = id => document.getElementById(id);
  let currentUser = null; // {uid, name, phone, ...}
  let activeSection = 'welcome';

  // عناصر الواجهة
  const els = {
    btnAdminRole: $('btnAdminRole'), btnStudentRole: $('btnStudentRole'),
    adminFields: $('adminFields'), studentFields: $('studentFields'),
    adminPass: $('adminPass'), studPhone: $('studPhone'), studPass: $('studPass'),
    btnLogin: $('btnLogin'), loginErr: $('loginErr'), btnShowReg: $('btnShowReg'),
    regForm: $('regForm'), regName: $('regName'), regPhone: $('regPhone'), regPass: $('regPass'),    btnRegister: $('btnRegister'), regErr: $('regErr'),
    loginScreen: $('loginScreen'), appMain: $('appMain'), userLabel: $('userLabel'),
    mainContent: $('mainContent'), btnLogout: $('btnLogout')
  };

  // ===================== إدارة المصادقة =====================
  if(isCloud){
    auth.onAuthStateChanged(async user => {
      if(user){
        showLoad(true);
        try {
          const doc = await db.collection('users').doc(user.uid).get();
          if(doc.exists){
            currentUser = {uid: user.uid, ...doc.data()};
            loginSuccess(currentUser);
          } else { await auth.signOut(); }
        } catch(e){ await auth.signOut(); }
        showLoad(false);
      }
    });
  }

  function loginSuccess(user){
    currentUser = user;
    els.loginScreen.style.display = 'none';
    els.appMain.style.display = 'block';
    els.userLabel.innerHTML = `👩‍🎓 ${user.name}`;
    renderStudent();
  }

  els.btnAdminRole.onclick = () => {
    els.btnAdminRole.classList.add('active'); els.btnStudentRole.classList.remove('active');
    els.adminFields.style.display = 'block'; els.studentFields.style.display = 'none';
    els.regForm.style.display = 'none'; els.loginErr.textContent = '';
  };
  els.btnStudentRole.onclick = () => {
    els.btnStudentRole.classList.add('active'); els.btnAdminRole.classList.remove('active');
    els.studentFields.style.display = 'block'; els.adminFields.style.display = 'none';
    els.regForm.style.display = 'none'; els.loginErr.textContent = '';
  };

  els.btnLogin.onclick = async () => {
    els.loginErr.textContent = '';
    const isAdmin = els.btnAdminRole.classList.contains('active');
    
    if(isAdmin){
      const p = els.adminPass.value;
      // كلمة سر المدير محفوظة محلياً بأمان
      const stored = localStorage.getItem('ds_admin_pass');
      if(!stored){        if(p.length < 4){ els.loginErr.textContent = 'أدخل كلمة سر جديدة (4 أحرف على الأقل)'; return; }
        localStorage.setItem('ds_admin_pass', p);
        alert('✅ تم تعيين كلمة سر المدير');
      } else if(p !== stored){
        els.loginErr.textContent = 'كلمة السر غير صحيحة'; return;
      }
      els.loginScreen.style.display = 'none'; els.appMain.style.display = 'block';
      els.userLabel.textContent = '👨‍⚕️ المدير'; renderAdmin();
    } else {
      const phone = els.studPhone.value.trim();
      const pass = els.studPass.value.trim();
      if(!phone || !pass){ els.loginErr.textContent = 'أدخل الرقم وكلمة السر'; return; }
      
      showLoad(true);
      try {
        if(isCloud){
          // Firebase يستخدم البريد، نحوله تلقائياً للنظام
          const email = `${phone.replace(/\s/g,'')}@ds.secure`;
          await auth.signInWithEmailAndPassword(email, pass);
        } else {
          // وضع محلي احتياطي
          const mockUsers = JSON.parse(localStorage.getItem('ds_users_local') || '[]');
          const u = mockUsers.find(x => x.phone === phone && x.pass === pass);
          if(u) { currentUser = u; loginSuccess(u); showLoad(false); return; }
          throw new Error("بيانات خاطئة");
        }
      } catch(e){
        let msg = e.message.includes("user-not-found") || e.message.includes("wrong-password") 
          ? "رقم الهاتف أو كلمة السر غير صحيحة" : "خطأ في الاتصال";
        els.loginErr.textContent = msg;
      }
      showLoad(false);
    }
  };

  let regVisible = false;
  els.btnShowReg.onclick = () => { regVisible = !regVisible; els.regForm.style.display = regVisible ? 'block' : 'none'; els.regErr.textContent = ''; };
  
  els.btnRegister.onclick = async () => {
    els.regErr.textContent = '';
    const n = els.regName.value.trim(), p = els.regPhone.value.trim(), w = els.regPass.value.trim();
    if(!n || !p || !w){ els.regErr.textContent = '❌ املأ جميع الحقول'; return; }
    if(w.length < 6){ els.regErr.textContent = '❌ كلمة السر يجب أن تكون 6 أحرف على الأقل'; return; }
    
    showLoad(true);
    try {
      if(isCloud){
        const email = `${p.replace(/\s/g,'')}@ds.secure`;
        const cred = await auth.createUserWithEmailAndPassword(email, w);
        await db.collection('users').doc(cred.user.uid).set({ name: n, phone: p, createdAt: new Date() });        alert('✅ تم التسجيل بنجاح. يمكنك الدخول الآن.');
      } else {
        const id = 'local_' + Date.now();
        const u = {uid:id, name:n, phone:p, pass:w};
        const users = JSON.parse(localStorage.getItem('ds_users_local') || '[]');
        if(users.find(x=>x.phone===p)) throw new Error("موجود");
        users.push(u); localStorage.setItem('ds_users_local', JSON.stringify(users));
        alert('✅ تم التسجيل محلياً');
      }
      els.regName.value=''; els.regPhone.value=''; els.regPass.value='';
      els.regForm.style.display='none'; regVisible=false;
      els.studPhone.value=p; els.studPass.value=w;
      els.btnStudentRole.click();
    } catch(e){
      els.regErr.textContent = e.message.includes("email-already-in-use") || e.message.includes("موجود") 
        ? "❌ الرقم مسجل مسبقاً" : "❌ فشل التسجيل: " + e.message;
    }
    showLoad(false);
  };

  els.btnLogout.onclick = () => {
    if(isCloud) auth.signOut();
    location.reload();
  };

  // ===================== دوال البيانات (Firestore) =====================
  async function saveData(collection, data){
    if(isCloud) await db.collection('users').doc(currentUser.uid).collection(collection).add(data);
    else {
      const k = `ds_${collection}_${currentUser.uid}`;
      const arr = JSON.parse(localStorage.getItem(k)||'[]');
      arr.push({...data, id: Date.now()}); localStorage.setItem(k, JSON.stringify(arr));
    }
  }
  async function getData(collection){
    if(isCloud){
      const snap = await db.collection('users').doc(currentUser.uid).collection(collection).get();
      return snap.docs.map(d=>({id:d.id,...d.data()}));
    } else {
      return JSON.parse(localStorage.getItem(`ds_${collection}_${currentUser.uid}`)||'[]');
    }
  }
  async function updateData(collection, id, updates){
    if(isCloud) await db.collection('users').doc(currentUser.uid).collection(collection).doc(id).update(updates);
    else {
      const k = `ds_${collection}_${currentUser.uid}`;
      const arr = JSON.parse(localStorage.getItem(k)||'[]');
      const item = arr.find(x=>x.id==id);
      if(item) Object.assign(item, updates);
      localStorage.setItem(k, JSON.stringify(arr));    }
  }
  async function deleteData(collection, id){
    if(isCloud) await db.collection('users').doc(currentUser.uid).collection(collection).doc(id).delete();
    else {
      const k = `ds_${collection}_${currentUser.uid}`;
      const arr = JSON.parse(localStorage.getItem(k)||'[]').filter(x=>x.id!=id);
      localStorage.setItem(k, JSON.stringify(arr));
    }
  }

  // ===================== واجهة المدير =====================
  window.renderAdmin = function(){
    let h='<div style="padding:1.5rem"><div class="card"><h3>➕ إضافة طالب جديد</h3><div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">';
    h+='<input id="aName" placeholder="الاسم" style="flex:1;padding:8px;border-radius:30px;border:1px solid #ddd">';
    h+='<input id="aPhone" placeholder="الهاتف" style="flex:1;padding:8px;border-radius:30px;border:1px solid #ddd">';
    h+='<input id="aPass" type="password" placeholder="كلمة السر" style="flex:1;padding:8px;border-radius:30px;border:1px solid #ddd">';
    h+='<button id="aAddBtn" class="btn-primary">إضافة</button></div></div>';
    h+='<div class="card"><h3>📋 الطلاب (يتم إدارتهم محلياً)</h3><p style="padding:1rem;color:#666">في النظام السحابي، يُدار الطلاب ذاتياً عبر التسجيل.</p></div></div>';
    els.mainContent.innerHTML = h;
  };

  // ===================== واجهة الطالب =====================
  window.renderStudent = function(){
    let h='<div class="student-dashboard"><div class="welcome"><h2>✨ أهلاً '+currentUser.name+' ✨</h2></div><div class="big-buttons">';
    h+='<div class="big-btn" data-s="patients"><span>📋</span><span>مرضاي</span></div>';
    h+='<div class="big-btn" data-s="emergency"><span>🚑</span><span>طوارئ</span></div>';
    h+='<div class="big-btn" data-s="addPatient"><span>➕</span><span>مريض</span></div>';
    h+='<div class="big-btn" data-s="todos"><span>📅</span><span>مهام</span></div></div>';
    h+='<div id="secArea" class="content-area"><p style="text-align:center;color:#2b9e5e;padding:2rem">اختر من الأزرار أعلاه</p></div></div>';
    els.mainContent.innerHTML = h;
    els.mainContent.querySelectorAll('.big-btn').forEach(btn=>{
      btn.onclick = async () => {
        activeSection = btn.dataset.s;
        showLoad(true); await renderSection(); showLoad(false);
      };
    });
    if(activeSection!=='welcome') renderSection();
  };

  async function renderSection(){
    const area = $('secArea'); if(!area) return;
    if(activeSection==='patients') {
      const pts = await getData('patients');
      if(!pts.length){ area.innerHTML='<div class="card"><p style="text-align:center">📭 لا يوجد مرضى.</p></div>'; return; }
      let h='<div class="card"><h3>📋 مرضاي</h3><div class="table-responsive"><table><thead><tr><th>الاسم</th><th>التشخيص</th><th>واتساب</th><th></th></tr></thead><tbody>';
      pts.forEach(p=>{
        h+=`<tr><td>${esc(p.name)}</td><td><small>${esc(p.diagnosis||'-')}</small></td><td>${esc(p.phone)}</td>
             <td><button class="btn-primary btn-whatsapp" onclick="window.__wa('${p.phone}')">📱</button> 
             <button class="btn-primary btn-danger" onclick="window.__delPat('${p.id}')">🗑</button></td></tr>`;      });
      h+='</tbody></table></div></div>'; area.innerHTML=h;
    } else if(activeSection==='addPatient') {
      area.innerHTML=`<div class="card"><h3>➕ مريض جديد</h3><div style="display:flex;flex-direction:column;gap:10px;margin-top:10px">
        <input id="pN" placeholder="اسم المريض" style="padding:10px;border-radius:20px;border:1px solid #ddd">
        <input id="pP" type="tel" placeholder="رقم الواتساب" style="padding:10px;border-radius:20px;border:1px solid #ddd">
        <input id="pD" placeholder="التشخيص" style="padding:10px;border-radius:20px;border:1px solid #ddd">
        <button id="pSave" class="btn">حفظ</button></div></div>`;
      $('pSave').onclick = async () => {
        const n=$('pN').value.trim(), p=$('pP').value.trim(), d=$('pD').value.trim();
        if(n&&p){ await saveData('patients',{name:n,phone:p,diagnosis:d,ts:new Date()}); alert('✅ تم الحفظ سحابياً'); activeSection='patients'; renderSection(); }
        else alert('⚠️ الاسم والرقم مطلوبان');
      };
    } else if(activeSection==='emergency') {
      const ems=[{t:"نزيف حاد",s:"🩸 اضغط بشاش 5 دقائق، لا مضمضة، استدع مشرفاً."},{t:"إغماء",s:"😵 افتح المجرى الهوائي، ارفع الرجلين."},{t:"كسر إبرة",s:"⚠️ لا تحاول الإخراج، أشعة، استدع مشرفاً."},{t:"حساسية",s:"🤚 أزل اللاتكس، مضاد هيستامين."},{t:"انسداد مجرى",s:"🚨 مناورة هايمليش فوراً."},{t:"نوبة صرع",s:"⚡ أزل الأدوات، ضع على الجانب."},{t:"صدمة حساسية",s:"💉 أدرينالين، أكسجين، إسعاف."}];
      let h=`<div class="card"><h3>🚑 دليل الطوارئ</h3><div class="emergency-grid" id="emGrid"></div><div id="emChat" style="margin-top:1rem;max-height:200px;overflow-y:auto"></div></div>`;
      area.innerHTML=h; const grid=$('emGrid'), chat=$('emChat');
      ems.forEach(em=>{ const c=document.createElement('div'); c.className='emergency-card'; c.innerHTML=`<strong>${em.t}</strong>`; c.onclick=()=>{ chat.innerHTML+=`<div class="message-bubble"><strong>🔔 ${em.t}</strong><br>${em.s}</div>`; chat.scrollTop=chat.scrollHeight; }; grid.appendChild(c); });
      if(!chat.children.length) chat.innerHTML='<div class="message-bubble">🤖 اختر حالة</div>';
    } else if(activeSection==='todos') {
      const todos = await getData('todos'); let h='<div class="card"><h3>📝 مهامي</h3><div style="display:flex;gap:8px;margin:10px 0"><input id="newT" placeholder="مهمة جديدة..." style="flex:1;padding:8px;border-radius:20px;border:1px solid #ddd"><button id="addT" class="btn-primary">➕</button></div><div id="tList">';
      if(!todos.length) h+='<p style="color:#999;text-align:center">✅ لا مهام</p>';
      else { h+='<ul style="list-style:none">'; todos.forEach(t=>{ h+=`<li class="todo-item"><span class="todo-text${t.done?' completed':''}">${esc(t.text)}</span><div class="todo-actions"><button onclick="window.__togT('${t.id}')">✅</button><button onclick="window.__delT('${t.id}')" style="color:#c5452f">🗑</button></div></li>`; }); h+='</ul>'; }
      h+='</div></div>'; area.innerHTML=h;
      $('addT').onclick = async () => { const v=$('newT').value.trim(); if(v){ await saveData('todos',{text:v,done:false}); renderSection(); } };
    }
  }

  // دوال عامة
  window.__wa = ph => window.open('https://wa.me/'+ph+'?text='+encodeURIComponent('مرحباً، تذكير بموعدك في العيادة.'),'_blank');
  window.__delPat = async id => { if(confirm('حذف؟')){ await deleteData('patients',id); renderSection(); } };
  window.__togT = async id => { const t = (await getData('todos')).find(x=>x.id==id); if(t) await updateData('todos',id,{done:!t.done}); renderSection(); };
  window.__delT = async id => { await deleteData('todos',id); renderSection(); };
  function esc(s){ if(!s)return''; return s.replace(/[&<>"']/g,m=>({'&':'&','<':'<','>':'>','"':'"',"'":'''}[m])) }

})();
</script>
</body>
</html>
