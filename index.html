<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>DS Assistant</title>
<style>
    body { font-family: Tahoma, Arial; background:#e3f2fd; margin:0; padding:0; }
    .header { background:#1565c0; color:#fff; padding:15px; text-align:center; font-size:22px; font-weight:bold; }
    .container { padding:15px; }
    .card { background:#fff; padding:20px; border-radius:15px; margin-bottom:15px; box-shadow:0 4px 10px rgba(0,0,0,0.1); }
    input, textarea { width:100%; padding:10px; margin-top:8px; border-radius:10px; border:1px solid #90a4ae; }
    button { width:100%; padding:12px; border:none; border-radius:10px; margin-top:10px; font-size:16px; cursor:pointer; }
    .btn-primary { background:#1e88e5; color:#fff; }
    .btn-danger { background:#e53935; color:#fff; }
    .btn-secondary { background:#90a4ae; color:#fff; }
    .hidden { display:none; }
    .tabs { display:flex; gap:5px; margin-bottom:10px; }
    .tab-btn { flex:1; padding:10px; border:none; border-radius:10px; background:#bbdefb; }
    .tab-btn.active { background:#1e88e5; color:#fff; font-weight:bold; }
    .row { padding:10px; border-bottom:1px solid #e0e0e0; }
    .title { font-weight:bold; color:#1565c0; }
</style>
</head>

<body>

<div class="header">DS Assistant — لوحة الإدارة</div>

<div class="container">

<!-- شاشة دخول المدير -->
<div id="loginScreen" class="card">
    <h3>دخول المدير</h3>
    <input type="password" id="adminPass" placeholder="كلمة السر">
    <button class="btn-primary" onclick="loginAdmin()">دخول</button>
</div>

<!-- لوحة المدير -->
<div id="adminPanel" class="hidden">

    <div class="card">
        <h3>مرحباً دكتور زكريا</h3>
        <div class="tabs">
            <button id="tabStudents" class="tab-btn active" onclick="showSection('students')">الطلاب</button>
            <button id="tabCases" class="tab-btn" onclick="showSection('cases')">الحالات</button>
            <button id="tabInfo" class="tab-btn" onclick="showSection('info')">معلومات</button>
        </div>
        <button class="btn-secondary" onclick="logout()">تسجيل خروج</button>
    </div>

    <!-- الطلاب -->
    <div id="students" class="card">
        <h3>إدارة الطلاب</h3>
        <button class="btn-primary" onclick="loadStudents()">تحديث</button>
        <div id="studentsList"></div>
        <hr>
        <h4>إضافة طالب</h4>
        <input id="newStudentName" placeholder="اسم الطالب">
        <button class="btn-primary" onclick="addStudent()">إضافة</button>
    </div>

    <!-- الحالات -->
    <div id="cases" class="card hidden">
        <h3>إدارة الحالات</h3>
        <button class="btn-primary" onclick="loadCases()">تحديث</button>
        <div id="casesList"></div>
        <hr>
        <h4>إضافة حالة</h4>
        <input id="caseTitle" placeholder="عنوان الحالة">
        <textarea id="caseDetails" placeholder="تفاصيل الحالة"></textarea>
        <button class="btn-primary" onclick="addCase()">إضافة</button>
    </div>

    <!-- معلومات -->
    <div id="info" class="card hidden">
        <h3>معلومات التطبيق</h3>
        <p>DS Assistant — نسخة كاملة</p>
        <p>المدير بكلمة سر مستقلة</p>
        <p>الطلاب والحالات على Firebase Realtime Database</p>
    </div>

</div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
// إعداد Firebase
const firebaseConfig = {
  apiKey: "AIzaSyCb9VELSLmljq9IKmLZFfJgT3zvq9q22HE",
  authDomain: "diagnosis-6ea4b.firebaseapp.com",
  databaseURL: "https://diagnosis-6ea4b-default-rtdb.firebaseio.com",
  projectId: "diagnosis-6ea4b",
  storageBucket: "diagnosis-6ea4b.firebasestorage.app",
  messagingSenderId: "1014263737561",
  appId: "1:1014263737561:web:ca8affac416227be8862c8",
  measurementId: "G-RHHRFLZM2P"
};
firebase.initializeApp(firebaseConfig);

const db = firebase.database();

// كلمة سر المدير
const ADMIN_PASSWORD = "salem1959";

// دخول المدير
function loginAdmin() {
    if (adminPass.value === ADMIN_PASSWORD) {
        loginScreen.classList.add("hidden");
        adminPanel.classList.remove("hidden");
    } else alert("كلمة السر غير صحيحة");
}

// خروج
function logout() {
    adminPanel.classList.add("hidden");
    loginScreen.classList.remove("hidden");
    adminPass.value = "";
}

// تبويبات
function showSection(id) {
    students.classList.add("hidden");
    cases.classList.add("hidden");
    info.classList.add("hidden");

    document.getElementById(id).classList.remove("hidden");

    tabStudents.classList.remove("active");
    tabCases.classList.remove("active");
    tabInfo.classList.remove("active");

    if (id === "students") tabStudents.classList.add("active");
    if (id === "cases") tabCases.classList.add("active");
    if (id === "info") tabInfo.classList.add("active");
}

// تحميل الطلاب
function loadStudents() {
    db.ref("students").once("value", snap => {
        let data = snap.val() || {};
        let html = "";
        Object.keys(data).forEach(id => {
            html += `
                <div class="row">
                    <div class="title">${data[id].name}</div>
                    <button class="btn-danger" onclick="deleteStudent('${id}')">حذف</button>
                </div>`;
        });
        studentsList.innerHTML = html || "<p>لا يوجد طلاب.</p>";
    });
}

// إضافة طالب
function addStudent() {
    let name = newStudentName.value.trim();
    if (!name) return alert("أدخل اسم الطالب");
    db.ref("students").push({ name });
    newStudentName.value = "";
    loadStudents();
}

// حذف طالب
function deleteStudent(id) {
    if (confirm("حذف الطالب؟")) {
        db.ref("students/" + id).remove();
        loadStudents();
    }
}

// تحميل الحالات
function loadCases() {
    db.ref("cases").once("value", snap => {
        let data = snap.val() || {};
        let html = "";
        Object.keys(data).forEach(id => {
            html += `
                <div class="row">
                    <div class="title">${data[id].title}</div>
                    <div>${data[id].details}</div>
                    <button class="btn-danger" onclick="deleteCase('${id}')">حذف</button>
                </div>`;
        });
        casesList.innerHTML = html || "<p>لا توجد حالات.</p>";
    });
}

// إضافة حالة
function addCase() {
    let title = caseTitle.value.trim();
    let details = caseDetails.value.trim();
    if (!title || !details) return alert("أدخل كل البيانات");
    db.ref("cases").push({ title, details });
    caseTitle.value = "";
    caseDetails.value = "";
    loadCases();
}

// حذف حالة
function deleteCase(id) {
    if (confirm("حذف الحالة؟")) {
        db.ref("cases/" + id).remove();
        loadCases();
    }
}
</script>

</body>
</html>
